<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>DebtWizard Recovery</title>
<style>
:root{--ink:#243f49;--navy:#07516b;--cyan:#26b9d3;--line:#d9e7ea;--muted:#7b8b91;--bg:#f6fbfc}*{box-sizing:border-box}html,body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}button,input{font:inherit}button{cursor:pointer}#app{min-height:100dvh;padding-bottom:86px}.hero{padding:22px 18px;background:linear-gradient(180deg,#c9eff4,#e8fbfc)}.hero h1{margin:0;color:var(--navy);font-size:2.2rem;letter-spacing:-.06em}.hero p{margin:7px 0 0;color:#1a5d75}.main{max-width:700px;margin:auto;padding:16px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:10px}.card{overflow:hidden;border:1px solid var(--line);border-radius:17px;background:#fff;box-shadow:0 7px 16px rgba(10,70,90,.05)}.primary{padding:15px;color:#fff;background:linear-gradient(135deg,#087b98,#3ac9df)}.primary span,.tile span{display:block;font-size:.76rem}.primary b{display:block;margin:5px 0;font-size:1.6rem}.tile{padding:11px}.tile span{color:var(--muted)}.tile b{display:block;margin-top:5px;font-size:1.08rem}.stack{display:grid;gap:10px}.head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:18px;margin-bottom:10px}.head h2{margin:0;color:var(--navy);font-size:1.45rem;letter-spacing:-.04em}.head p{margin:4px 0 0;color:var(--muted);font-size:.8rem}.btn{min-height:42px;padding:0 13px;border:0;border-radius:12px;color:#fff;background:linear-gradient(135deg,#15aec8,#4bd0e4);font-weight:850}.btn.alt{color:#126c85;border:1px solid #bfe8ef;background:#edfafe}.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center;padding:13px;border-bottom:1px solid #e8f0f2}.row:last-child{border-bottom:0}.row b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row small{display:block;margin-top:4px;color:var(--muted)}.row strong{white-space:nowrap}.tabs{display:grid;grid-template-columns:repeat(3,1fr);margin:14px 0;border:1px solid #c7e7ec;border-radius:12px;overflow:hidden}.tabs button{min-height:40px;border:0;color:#54747e;background:#effcfd;font-weight:850}.tabs button.active{color:#095e76;background:#fff}.nav{position:fixed;z-index:10;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(6,1fr);height:78px;padding:7px 2px calc(7px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--line);background:rgba(255,255,255,.98)}.nav button{display:grid;place-items:center;gap:3px;border:0;color:#98a3a7;background:transparent;font-size:.6rem;font-weight:800}.nav .ico{font-size:1.22rem}.nav button.active{color:var(--cyan)}.status{margin-top:14px;padding:11px 12px;border:1px solid #c8e8d4;border-radius:12px;color:#217644;background:#effaf3;font-weight:800}.status.bad{border-color:#f0c7c2;color:#a3443d;background:#fff3f1}.debt{margin-bottom:10px;padding:14px;border-left:3px solid #ffcc43}.metrics{display:grid;grid-template-columns:1.25fr .8fr .8fr;gap:8px;margin-top:12px}.metrics span{display:block;color:var(--muted);font-size:.7rem}.metrics b{display:block;margin-top:4px}.month{display:grid;grid-template-columns:40px 1fr 40px;gap:8px;align-items:center;margin-top:15px}.month button{height:40px;border:1px solid #bae5ec;border-radius:50%;color:#0b6d86;background:#fff;font-size:1.5rem}.month div{padding:10px;border:1px solid #bae5ec;border-radius:12px;color:var(--navy);background:#ffffffb8;font-weight:850;text-align:center}.input{width:84px;min-height:38px;padding:5px 7px;border:1px solid #d5e4e7;border-radius:9px;text-align:right;font-size:16px;font-weight:800}.note{padding:13px;border:1px solid #ccebf0;border-radius:13px;color:#4d707a;background:#effbfe;font-size:.85rem}.empty{padding:25px;text-align:center;color:var(--muted)}.empty b{display:block;margin-bottom:6px;color:var(--navy)}
</style>
</head>
<body><div id="app"></div>
<script>
(()=>{
const KEY='debt-calculator-v2',BK='debtwizard-recovery-budget';const $=s=>document.querySelector(s),money=new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'});const n=x=>Number.isFinite(parseFloat(x))?parseFloat(x):0,c=x=>Math.round((n(x)+Number.EPSILON)*100)/100,id=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);const esc=x=>String(x??'').replace(/[&<>'"]/g,q=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[q]));const read=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}};let data=read(KEY,{debts:[],payments:[],settings:{}});data.debts=Array.isArray(data.debts)?data.debts:[];data.payments=Array.isArray(data.payments)?data.payments:[];data.settings=data.settings||{};let page='home',view='planned',month=new Date();const active=()=>data.debts.filter(d=>n(d.balance)>0);const min=()=>c(active().reduce((s,d)=>s+n(d.minimum),0));const total=()=>c(active().reduce((s,d)=>s+n(d.balance),0));const save=()=>localStorage.setItem(KEY,JSON.stringify(data));const mkey=()=>`${month.getFullYear()}-${String(month.getMonth()+1).padStart(2,'0')}`;const mlabel=()=>month.toLocaleDateString('en-US',{month:'long',year:'numeric'});const budget=()=>{let all=read(BK,{months:{}}),k=mkey();if(!all.months[k])all.months[k]={income:[],cats:['Giving','Savings','Rent / Mortgage','Utilities','Groceries','Dining Out','Fuel','Insurance','Personal','Subscriptions'].map(name=>({id:id(),name,planned:0,spent:0}))};localStorage.setItem(BK,JSON.stringify(all));return{all,b:all.months[k]}};const bsave=(fn)=>{let x=budget();fn(x.b);x.all.months[mkey()]=x.b;localStorage.setItem(BK,JSON.stringify(x.all))};const nav=()=>`<nav class="nav">${[['home','⌂','Home'],['debts','◔','Debts'],['budget','▦','Budget'],['strategy','✦','Strategy'],['plan','▤','Plan'],['track','✓','Track']].map(x=>`<button data-page="${x[0]}" class="${page===x[0]?'active':''}"><span class="ico">${x[1]}</span>${x[2]}</button>`).join('')}</nav>`;const hero=(t,s,e='')=>`<header class="hero"><div class="main"><h1>${t}</h1><p>${s}</p>${e}</div></header>`;function home(){return hero('Your plan','A clear view of your debt-free path.')+`<main class="main"><section class="grid"><div class="card primary"><span>Total debt</span><b>${money.format(total())}</b><small>${active().length} active debts</small></div><div class="stack"><div class="card tile"><span>Minimums</span><b>${money.format(min())}</b></div><div class="card tile"><span>Extra payoff</span><b>${money.format(n(data.settings.extra))}</b></div></div></section><div class="status">${active().length?`Current focus: ${esc([...active()].sort((a,b)=>n(a.balance)-n(b.balance))[0].name||'Unnamed debt')}`:'Add a debt to begin.'}</div><section class="head"><div><h2>Quick actions</h2><p>Go straight to your debt or monthly plan.</p></div></section><div class="card"><button class="row" data-page="debts"><span><b>Manage debts</b><small>Add or update balances, APRs, and minimums.</small></span><strong>›</strong></button><button class="row" data-page="budget"><span><b>Open budget</b><small>Plan income, spending, and debt payments.</small></span><strong>›</strong></button></div></main>`}function debts(){let list=active();return hero('Debts','Manage all of your debts in one place.')+`<main class="main"><section class="head"><div><h2>Debts (${list.length})</h2><p>Balance, minimum, APR, and due date.</p></div><button class="btn" data-act="addDebt">＋ Add</button></section>${list.length?list.map(d=>`<article class="card debt"><div class="row" style="padding:0;border:0"><span><b>${esc(d.name||d.nickname||'Unnamed debt')}</b><small>${esc(d.category||'Debt')} · Due day ${n(d.dueDay)||1}</small></span><button class="btn alt" data-act="pay" data-id="${esc(d.id)}">Pay</button></div><div class="metrics"><div><span>Balance</span><b>${money.format(n(d.balance))}</b></div><div><span>Minimum</span><b>${money.format(n(d.minimum))}</b></div><div><span>APR</span><b>${n(d.apr).toFixed(2)}%</b></div></div></article>`).join(''):'<div class="card empty"><b>No debts yet</b>Tap Add to create your first debt.</div>'}</main>`}function budgetPage(){let b=budget().b,income=c(b.income.reduce((s,x)=>s+n(x.amount),0)),planned=c(b.cats.reduce((s,x)=>s+n(x.planned),0)+min()+n(data.settings.extra)),spent=c(b.cats.reduce((s,x)=>s+n(x.spent),0)),val=view==='planned'?planned:view==='spent'?spent:Math.max(0,income-spent),label=view==='planned'?'Planned outflow':view==='spent'?'Spent so far':'Remaining to spend';return hero('Budget','Plan your month before the money is spent.',`<div class="month"><button data-act="prevMonth">‹</button><div>${mlabel()}</div><button data-act="nextMonth">›</button></div>`)+`<main class="main"><div class="tabs"><button data-view="planned" class="${view==='planned'?'active':''}">Planned</button><button data-view="spent" class="${view==='spent'?'active':''}">Spent</button><button data-view="remaining" class="${view==='remaining'?'active':''}">Remaining</button></div><section class="grid"><div class="card primary"><span>${label}</span><b>${money.format(val)}</b><small>Planned income ${money.format(income)}</small></div><div class="stack"><div class="card tile"><span>Debt payments</span><b>${money.format(min()+n(data.settings.extra))}</b></div><div class="card tile"><span>Left to budget</span><b>${money.format(income-planned)}</b></div></div></section><section class="head"><div><h2>Income</h2><p>Income expected for ${mlabel()}.</p></div><button class="btn alt" data-act="income">+ Income</button></section><div class="card">${b.income.length?b.income.map(x=>`<div class="row"><span><b>${esc(x.name)}</b><small>Planned income</small></span><input class="input" data-income="${x.id}" value="${n(x.amount)||''}" placeholder="0.00"></div>`).join(''):'<div class="empty">No income added yet.</div>'}</div><section class="head"><div><h2>Monthly plan</h2><p>Debt payments sync from the debt list.</p></div><button class="btn alt" data-act="cat">+ Item</button></section><div class="card">${b.cats.map(x=>{let v=view==='planned'?n(x.planned):view==='spent'?n(x.spent):Math.max(0,n(x.planned)-n(x.spent));return `<div class="row"><span><b>${esc(x.name)}</b><small>${view[0].toUpperCase()+view.slice(1)}</small></span><input class="input" data-cat="${x.id}" data-mode="${view}" value="${v||''}" placeholder="0.00"></div>`}).join('')}<div class="row"><span><b>Debt payments</b><small>Minimums plus extra payoff</small></span><strong>${money.format(min()+n(data.settings.extra))}</strong></div></div></main>`}function strategy(){return hero('Strategy','Choose how extra payments are assigned.')+`<main class="main"><div class="tabs"><button data-strategy="snowball" class="${(data.settings.strategy||'snowball')==='snowball'?'active':''}">Snowball</button><button data-strategy="avalanche" class="${data.settings.strategy==='avalanche'?'active':''}">Avalanche</button><button data-act="extra" class="active">Extra</button></div><div class="card" style="padding:14px"><b>${data.settings.strategy==='avalanche'?'Debt Avalanche':'Debt Snowball'}</b><p style="color:var(--muted);line-height:1.4">${data.settings.strategy==='avalanche'?'Highest APR balance receives extra money first.':'Smallest balance receives extra money first.'}</p><div class="note">Extra payment: <b>${money.format(n(data.settings.extra))}</b></div></div></main>`}function plan(){let o=[...active()].sort((a,b)=>data.settings.strategy==='avalanche'?n(b.apr)-n(a.apr):n(a.balance)-n(b.balance));return hero('Payoff plan','Your debt payoff order.')+`<main class="main"><div class="card">${o.length?o.map((d,i)=>`<div class="row"><span><b>Step ${i+1} · ${esc(d.name||d.nickname||'Debt')}</b><small>${money.format(n(d.balance))} · ${n(d.apr).toFixed(2)}% APR</small></span><strong>${i?'Minimum':'Focus'}</strong></div>`).join(''):'<div class="empty">Add a debt to create your payoff plan.</div>'}</div></main>`}function track(){return hero('Tracking','Record debt payments when they are made.')+`<main class="main"><section class="head"><div><h2>Upcoming payments</h2><p>Tap Pay to record a payment.</p></div></section><div class="card">${active().length?active().map(d=>`<button class="row" data-act="pay" data-id="${esc(d.id)}"><span><b>${esc(d.name||d.nickname||'Debt')}</b><small>Minimum payment</small></span><strong>${money.format(n(d.minimum))} ›</strong></button>`).join(''):'<div class="empty">No debts to track yet.</div>'}</div></main>`}function render(){let f={home,debts,budget:budgetPage,strategy,plan,track}[page]||home;$('#app').innerHTML=f()+nav()}document.addEventListener('click',e=>{let p=e.target.closest('[data-page]');if(p){page=p.dataset.page;render();return}let v=e.target.closest('[data-view]');if(v){view=v.dataset.view;render();return}let s=e.target.closest('[data-strategy]');if(s){data.settings.strategy=s.dataset.strategy;save();render();return}let a=e.target.closest('[data-act]');if(!a)return;let act=a.dataset.act;if(act==='addDebt'){let name=prompt('Debt name');if(!name)return;let bal=prompt('Current balance','0'),apr=prompt('APR %','0'),minimum=prompt('Minimum payment','0'),dueDay=prompt('Due day (1-28)','1');data.debts.push({id:id(),name,category:'Credit Card',balance:c(bal),apr:c(apr),minimum:c(minimum),dueDay:Math.min(28,Math.max(1,n(dueDay)||1))});save();render()}if(act==='pay'){let d=data.debts.find(x=>x.id===a.dataset.id),amount=prompt(`Payment to ${d?.name||'debt'}`,String(n(d?.minimum)));if(d&&amount!==null){d.balance=Math.max(0,c(n(d.balance)-n(amount)));data.payments.push({id:id(),debtId:d.id,amount:c(amount),date:new Date().toISOString().slice(0,10)});save();render()}}if(act==='income'){let name=prompt('Income name','Paycheck'),amount=prompt('Amount','0');if(name&&amount!==null){bsave(b=>b.income.push({id:id(),name,amount:c(amount)}));render()}}if(act==='cat'){let name=prompt('Budget item',''),amount=prompt('Planned amount','0');if(name&&amount!==null){bsave(b=>b.cats.push({id:id(),name,planned:c(amount),spent:0}));render()}}if(act==='extra'){let amount=prompt('Monthly extra payment',String(n(data.settings.extra)));if(amount!==null){data.settings.extra=Math.max(0,c(amount));save();render()}}if(act==='prevMonth'){month.setMonth(month.getMonth()-1);render()}if(act==='nextMonth'){month.setMonth(month.getMonth()+1);render()}});document.addEventListener('input',e=>{let i=e.target.dataset.income,cat=e.target.dataset.cat;if(!i&&!cat)return;bsave(b=>{if(i){let x=b.income.find(x=>x.id===i);if(x)x.amount=c(e.target.value)}if(cat){let x=b.cats.find(x=>x.id===cat);if(!x)return;if(e.target.dataset.mode==='planned')x.planned=c(e.target.value);if(e.target.dataset.mode==='spent')x.spent=c(e.target.value) }});});render()})();
</script></body></html>
