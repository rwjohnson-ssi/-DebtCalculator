<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>DebtWizard</title>
</head>
<body>
  <p id="loading" style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:40px 22px;color:#174a61">Opening DebtWizard…</p>
  <script>
    (async () => {
      try {
        const extra = location.search ? '&' + location.search.slice(1) : '';
        const response = await fetch(`mobile.html?v=48&runtime=${Date.now()}&strategyStyle=1${extra}`, { cache: 'no-store' });
        if (!response.ok) throw new Error('Unable to load mobile app shell.');
        let html = await response.text();
        html = html.replace(/paycheck-form-overlap-fix-v4\.js\?v=\d+/g, 'paycheck-form-overlap-fix-v4.js?v=39');
        html = html.replace('</body>', `<script>
          (() => {
            const STORE = 'debt-calculator-v2';
            const KEY = 'debtwizard-budget-mode';
            const modes = ['planned','spent','remaining'];
            const incomeTypes = [['paycheck','Paycheck'],['secondPaycheck','Second paycheck'],['sideIncome','Side income'],['otherIncome','Other income']];
            const categories = [['housing','Housing'],['utilities','Utilities'],['food','Food'],['transportation','Transportation'],['insurance','Insurance'],['subscriptions','Subscriptions'],['savings','Savings'],['giving','Giving'],['personal','Personal'],['other','Other']];
            const incomeLabels = Object.fromEntries(incomeTypes);
            const categoryLabels = Object.fromEntries(categories);
            let activeEdit = { kind: '', id: '', category: '' };
            const money = value => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(Number.isFinite(value) ? value : 0);
            const number = value => Number.isFinite(Number.parseFloat(value)) ? Number.parseFloat(value) : 0;
            const parseMoney = value => number(String(value || '').replace(/[^0-9.-]/g, ''));
            function uid() { return 'item-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8); }
            function mode() {
              try { const value = localStorage.getItem(KEY) || 'planned'; return modes.includes(value) ? value : 'planned'; }
              catch { return 'planned'; }
            }
            function save(value) { try { localStorage.setItem(KEY, modes.includes(value) ? value : 'planned'); } catch {} }
            function loadState() { try { return JSON.parse(localStorage.getItem(STORE)) || {}; } catch { return {}; } }
            function saveState(state) { localStorage.setItem(STORE, JSON.stringify(state)); }
            function currentMonth() {
              const text = document.querySelector('.hero-title')?.textContent?.trim() || '';
              const months = {january:'01',february:'02',march:'03',april:'04',may:'05',june:'06',july:'07',august:'08',september:'09',october:'10',november:'11',december:'12'};
              const match = text.match(/^([A-Za-z]+)\s+(20\d{2})$/);
              if (match && months[match[1].toLowerCase()]) return match[2] + '-' + months[match[1].toLowerCase()];
              const date = new Date();
              return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
            }
            function budgetFor(state) {
              state.settings = state.settings && typeof state.settings === 'object' ? state.settings : {};
              state.settings.monthlyBudgets = state.settings.monthlyBudgets && typeof state.settings.monthlyBudgets === 'object' ? state.settings.monthlyBudgets : {};
              const month = currentMonth();
              const budget = state.settings.monthlyBudgets[month] || (state.settings.monthlyBudgets[month] = { incomeSources: {}, budgetCategories: {}, bills: [], schedule: { buffer: 0, income: {}, budget: {} } });
              budget.incomeItems = Array.isArray(budget.incomeItems) ? budget.incomeItems : [];
              budget.bills = Array.isArray(budget.bills) ? budget.bills : [];
              state.settings.budgetTracking = state.settings.budgetTracking && typeof state.settings.budgetTracking === 'object' ? state.settings.budgetTracking : {};
              state.settings.budgetTracking[month] = state.settings.budgetTracking[month] && typeof state.settings.budgetTracking[month] === 'object' ? state.settings.budgetTracking[month] : {};
              return { month, budget, tracking: state.settings.budgetTracking[month] };
            }
            function trackingValue(kind, id) {
              if (!id) return 0;
              const state = loadState();
              const info = budgetFor(state);
              return Math.max(0, number(info.tracking[(kind === 'income' ? 'income:' : 'expense:') + id]));
            }
            function setTrackingValue(state, month, kind, id, value) {
              state.settings.budgetTracking = state.settings.budgetTracking && typeof state.settings.budgetTracking === 'object' ? state.settings.budgetTracking : {};
              state.settings.budgetTracking[month] = state.settings.budgetTracking[month] && typeof state.settings.budgetTracking[month] === 'object' ? state.settings.budgetTracking[month] : {};
              state.settings.budgetTracking[month][(kind === 'income' ? 'income:' : 'expense:') + id] = Math.max(0, number(value));
            }
            function syncBudgetTotals(state, budget) {
              const incomeSources = Object.fromEntries(incomeTypes.map(([key]) => [key, 0]));
              budget.incomeItems.forEach(item => { const key = incomeLabels[item.type] ? item.type : 'otherIncome'; incomeSources[key] += Math.max(0, number(item.amount)); });
              budget.incomeSources = incomeSources;
              budget.budgetCategories = Object.fromEntries(categories.map(([key]) => [key, 0]));
              budget.schedule = budget.schedule && typeof budget.schedule === 'object' ? budget.schedule : { buffer: 0, income: {}, budget: {} };
              budget.schedule.income = Object.fromEntries(incomeTypes.map(([key]) => [key, budget.incomeItems.filter(item => item.type === key && number(item.payDay) > 0).map(item => item.payDay).join(', ')]));
              state.settings.incomeSources = incomeSources;
              state.settings.budgetCategories = budget.budgetCategories;
              state.settings.budgetBills = budget.bills;
              state.settings.budgetSchedule = budget.schedule;
            }
            function label(active, title) { return /income/i.test(title || '') ? (active === 'spent' ? 'Received' : active === 'remaining' ? 'Remaining' : 'Planned') : (active === 'spent' ? 'Spent' : active === 'remaining' ? 'Remaining' : 'Planned'); }
            function noteText(active) {
              if (active === 'spent') return 'Spent view selected. Section totals show tracked spent or received.';
              if (active === 'remaining') return 'Remaining view selected. Section totals show planned minus tracked.';
              return 'Planned view selected. Section totals show planned amounts.';
            }
            function addStyle() {
              if (document.getElementById('budget-row-bar-style')) return;
              const style = document.createElement('style');
              style.id = 'budget-row-bar-style';
              style.textContent = '.budget-income-bar,.budget-assigned-bar{display:block;width:100%;height:10px;border-radius:999px;background:#d9e3e7;overflow:hidden;margin-top:12px}.budget-income-fill,.budget-assigned-fill{display:block;height:100%;border-radius:inherit;background:#0f516b;width:0%;transition:width .18s ease}.budget-income-fill.spent,.budget-assigned-fill.spent{background:#20bfd7}.budget-income-fill.planned,.budget-assigned-fill.planned{background:#0f7893}.budget-income-fill.remaining,.budget-assigned-fill.remaining{background:#0f516b}';
              document.head.appendChild(style);
            }
            function setHeaderLabel(scope, active, title) {
              if (!scope) return;
              const text = label(active, title);
              const target = scope.querySelector('.budget-section-total, .edp-cat-total');
              if (target) { target.textContent = text; return; }
              const head = scope.querySelector('.section-head, .edp-cat-head') || scope.firstElementChild;
              if (!head) return;
              const candidates = [...head.querySelectorAll('span,strong,div')].filter(item => /\$|Planned|Spent|Remaining|Received/.test(item.textContent || ''));
              const fallback = candidates[candidates.length - 1];
              if (fallback) fallback.textContent = text;
            }
            function updateLabels(active) {
              document.querySelectorAll('.section').forEach(section => {
                const title = section.querySelector('.section-title')?.textContent?.trim() || '';
                if (/^(Income|Assigned categories|Bills)/.test(title)) setHeaderLabel(section, active, title);
              });
              document.querySelectorAll('.edp-card').forEach(card => setHeaderLabel(card, active, card.querySelector('.edp-cat-title')?.textContent || ''));
              document.querySelectorAll('h2,.section-title').forEach(titleNode => {
                const title = titleNode.textContent?.trim() || '';
                if (/^(Income|Assigned categories|Bills)$/.test(title)) setHeaderLabel(titleNode.closest('.section') || titleNode.parentElement, active, title);
              });
            }
            function sectionByTitle(name) {
              return [...document.querySelectorAll('.section')].find(section => (section.querySelector('.section-title')?.textContent || '').trim().startsWith(name));
            }
            function incomeValues(row) {
              if (!row.dataset.incomePlanned) {
                const amountNode = row.querySelector('.edp-amount,.budget-bill-amount');
                row.dataset.incomePlanned = String(parseMoney(amountNode?.childNodes?.[0]?.textContent || amountNode?.textContent || '0'));
              }
              const planned = Math.max(0, number(row.dataset.incomePlanned));
              const received = Math.min(planned, trackingValue('income', row.dataset.id));
              return { planned, spent: received, remaining: Math.max(0, planned - received) };
            }
            function expenseValues(row) {
              if (!row.dataset.expensePlanned) {
                const amountNode = row.querySelector('.edp-amount,.budget-bill-amount');
                row.dataset.expensePlanned = String(parseMoney(amountNode?.childNodes?.[0]?.textContent || amountNode?.textContent || '0'));
              }
              const planned = Math.max(0, number(row.dataset.expensePlanned));
              const spent = Math.min(planned, trackingValue('expense', row.dataset.id));
              return { planned, spent, remaining: Math.max(0, planned - spent) };
            }
            function barWidth(values, active) {
              if (active === 'planned' && values.planned > 0) return '100%';
              const percent = values.planned > 0 ? Math.max(0, Math.min(100, values[active] / values.planned * 100)) : 0;
              return percent + '%';
            }
            function ensureIncomeBar(row) {
              const textCell = row.querySelector('span:first-child') || row;
              if (!textCell.querySelector('.budget-income-bar')) textCell.insertAdjacentHTML('beforeend', '<span class="budget-income-bar" aria-hidden="true"><span class="budget-income-fill"></span></span>');
            }
            function ensureAssignedBar(row) {
              const textCell = row.querySelector('span:first-child') || row;
              if (!textCell.querySelector('.budget-assigned-bar')) textCell.insertAdjacentHTML('beforeend', '<span class="budget-assigned-bar" aria-hidden="true"><span class="budget-assigned-fill"></span></span>');
            }
            function updateIncomeRows(active) {
              const section = sectionByTitle('Income');
              if (!section) return;
              section.querySelectorAll('.edp-item-row').forEach(row => {
                ensureIncomeBar(row);
                const values = incomeValues(row);
                const amountNode = row.querySelector('.edp-amount');
                if (amountNode) amountNode.innerHTML = money(values[active]) + '<small>Edit ›</small>';
                const fill = row.querySelector('.budget-income-fill');
                if (fill) { fill.className = 'budget-income-fill ' + active; fill.style.width = barWidth(values, active); }
              });
            }
            function updateAssignedRows(active) {
              const section = sectionByTitle('Assigned categories');
              if (!section) return;
              section.querySelectorAll('.edp-item-row').forEach(row => {
                ensureAssignedBar(row);
                const values = expenseValues(row);
                const amountNode = row.querySelector('.edp-amount');
                if (amountNode) amountNode.innerHTML = money(values[active]) + '<small>Edit ›</small>';
                const fill = row.querySelector('.budget-assigned-fill');
                if (fill) { fill.className = 'budget-assigned-fill ' + active; fill.style.width = barWidth(values, active); }
              });
            }
            function sumRows(rows, kind, active) {
              return rows.reduce((sum, row) => sum + (kind === 'income' ? incomeValues(row) : expenseValues(row))[active], 0);
            }
            function updateSectionTotals(active) {
              const income = sectionByTitle('Income');
              if (income) {
                const incomeTotal = income.querySelector('.budget-section-total');
                if (incomeTotal) incomeTotal.textContent = money(sumRows([...income.querySelectorAll('.edp-item-row')], 'income', active));
              }
              const assigned = sectionByTitle('Assigned categories');
              if (!assigned) return;
              assigned.querySelectorAll('.edp-card').forEach(card => {
                const total = sumRows([...card.querySelectorAll('.edp-item-row')], 'expense', active);
                const target = card.querySelector('.edp-cat-total');
                if (target) target.textContent = money(total);
              });
              const assignedHead = assigned.querySelector('.section-head');
              const assignedTotal = assignedHead?.querySelector('.budget-section-total') || assigned.querySelector('.budget-section-total');
              if (assignedTotal) assignedTotal.textContent = money(sumRows([...assigned.querySelectorAll('.edp-item-row')], 'expense', active));
            }
            function patchTrackingField() {
              const popup = document.querySelector('.edp-popup');
              if (!popup || popup.querySelector('#edp-tracked')) return;
              const isIncome = activeEdit.kind === 'income' || /income/i.test(popup.querySelector('.edp-title')?.textContent || '');
              const labelText = isIncome ? 'Received' : 'Spent';
              const value = trackingValue(isIncome ? 'income' : 'expense', activeEdit.id || '');
              const amountField = popup.querySelector('#edp-amount')?.closest('.edp-field');
              if (!amountField) return;
              amountField.insertAdjacentHTML('afterend', '<label class="edp-field" data-edp-tracked-field><span>' + labelText + '</span><input id="edp-tracked" type="number" min="0" step="0.01" inputmode="decimal" value="' + (value || '') + '" placeholder="0.00"></label>');
            }
            function saveTrackedPopup(popup) {
              const isIncome = activeEdit.kind === 'income' || /income/i.test(popup.querySelector('.edp-title')?.textContent || '');
              const name = document.getElementById('edp-name')?.value.trim() || '';
              const amount = Math.max(0, number(document.getElementById('edp-amount')?.value));
              if (!name || amount <= .004) return;
              const selectedDay = Math.max(0, Math.min(31, Math.floor(number(document.getElementById('edp-due')?.value))));
              const tracked = Math.max(0, number(document.getElementById('edp-tracked')?.value));
              const state = loadState();
              const info = budgetFor(state);
              const id = activeEdit.id || uid();
              const note = document.getElementById('edp-note')?.value.trim() || '';
              if (isIncome) {
                const next = { id, name, amount, note, type: incomeLabels[document.getElementById('edp-type')?.value] ? document.getElementById('edp-type').value : 'otherIncome', payDay: selectedDay };
                info.budget.incomeItems = [...info.budget.incomeItems.filter(item => item.id !== id), next];
                setTrackingValue(state, info.month, 'income', id, tracked);
              } else {
                const next = { id, name, amount, note, category: categoryLabels[document.getElementById('edp-type')?.value] ? document.getElementById('edp-type').value : (activeEdit.category || 'other'), dueDay: selectedDay };
                info.budget.bills = [...info.budget.bills.filter(item => item.id !== id), next];
                setTrackingValue(state, info.month, 'expense', id, tracked);
              }
              syncBudgetTotals(state, info.budget);
              try { localStorage.setItem('debtwizard-active-page', 'budget'); sessionStorage.setItem('debtwizard-active-page', 'budget'); } catch {}
              saveState(state);
              location.reload();
            }
            function apply() {
              addStyle();
              const form = document.getElementById('budget-form');
              if (!form) return;
              if (!form.querySelector('.budget-view-toggle')) form.insertAdjacentHTML('afterbegin', '<div class="budget-view-toggle" role="tablist" aria-label="Budget view"><button type="button" data-budget-view="planned">Planned</button><button type="button" data-budget-view="spent">Spent</button><button type="button" data-budget-view="remaining">Remaining</button></div><p class="budget-view-note"></p>');
              const active = mode();
              form.querySelectorAll('[data-budget-view]').forEach(button => button.classList.toggle('active', button.dataset.budgetView === active));
              const note = form.querySelector('.budget-view-note');
              if (note) note.textContent = noteText(active);
              updateLabels(active);
              updateIncomeRows(active);
              updateAssignedRows(active);
              updateSectionTotals(active);
              patchTrackingField();
            }
            document.addEventListener('click', event => {
              const editButton = event.target.closest('[data-edp-act]');
              if (editButton) {
                activeEdit = { kind: editButton.dataset.kind || '', id: editButton.dataset.id || '', category: editButton.dataset.category || '' };
                setTimeout(patchTrackingField, 30);
                setTimeout(patchTrackingField, 120);
              }
              const saveButton = event.target.closest('[data-edp-save]');
              if (saveButton && document.querySelector('.edp-popup #edp-tracked')) {
                event.preventDefault();
                event.stopPropagation();
                event.stopImmediatePropagation();
                saveTrackedPopup(document.querySelector('.edp-popup'));
                return;
              }
              const button = event.target.closest('[data-budget-view]');
              if (button) { event.preventDefault(); save(button.dataset.budgetView); apply(); return; }
              if (event.target.closest('[data-act="nav"], .tab-btn, [data-act^="budget-month"]')) setTimeout(apply, 80);
            }, true);
            const screen = document.getElementById('screen');
            if (screen) new MutationObserver(() => setTimeout(apply, 0)).observe(screen, { childList: true, subtree: true });
            window.addEventListener('load', () => { setTimeout(apply, 80); setTimeout(apply, 450); });
            setTimeout(apply, 0);
          })();
        <\/script></body>`);
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error(error);
        document.getElementById('loading').innerHTML = 'DebtWizard needs a refresh. Please reload this page once.';
      }
    })();
  </script>
</body>
</html>
