<html lang="en">

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#cdeff4">
  <title>DebtWizard</title>
  <style>
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#eef3f5}
    #app-host{display:block;width:100%;height:100%;border:0;background:#eef3f5}
  </style>
</head>
<body>
  <iframe id="app-host" title="DebtWizard" src="mobile.html?v=65" allow="clipboard-read; clipboard-write"></iframe>
  <script>
  (() => {
    "use strict";

    const host = document.getElementById("app-host");
    const desktopQuery = matchMedia("(min-width:900px)");
    const STORE = "debt-calculator-v2";
    const PAGE_KEY = "debtwizard-active-page";
    const COLLAPSED_KEY = "debtwizard-desktop-sidebar-collapsed";
    const items = [
      ["home","Home","⌂"],["debts","Debts","◔"],["transactions","Transactions","$"],
      ["budget","Budget","$"],["strategy","Payoff Strategy","✦"],["plan","Debt Payoff Plan","▤"],["track","Debt Payment Tracking","✓"]
    ];
    const money = new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"});
    const num = value => Number.isFinite(Number.parseFloat(String(value ?? "").replace(/[^0-9.-]/g,""))) ? Number.parseFloat(String(value ?? "").replace(/[^0-9.-]/g,"")) : 0;
    const amount = value => Math.max(0,Math.round((num(value)+Number.EPSILON)*100)/100);
    const esc = value => String(value ?? "").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
    const uid = () => `tx-${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`;

    function loadState(doc){try{return JSON.parse(doc.defaultView.localStorage.getItem(STORE))||{};}catch{return {};}}
    function saveState(doc,state){doc.defaultView.localStorage.setItem(STORE,JSON.stringify(state));}
    function selectedMonth(doc){
      const text=doc.querySelector(".hero-title")?.textContent?.trim()||"";
      const names={january:"01",february:"02",march:"03",april:"04",may:"05",june:"06",july:"07",august:"08",september:"09",october:"10",november:"11",december:"12"};
      const match=text.match(/^([A-Za-z]+)\s+(20\d{2})$/);
      if(match&&names[match[1].toLowerCase()])return `${match[2]}-${names[match[1].toLowerCase()]}`;
      const now=new Date();return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    }
    function monthLabel(key){const [y,m]=key.split("-").map(Number);return new Date(y,m-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});}
    function budgetFor(state,month){
      state.settings=state.settings&&typeof state.settings==="object"?state.settings:{};
      state.settings.monthlyBudgets=state.settings.monthlyBudgets&&typeof state.settings.monthlyBudgets==="object"?state.settings.monthlyBudgets:{};
      const budget=state.settings.monthlyBudgets[month]||(state.settings.monthlyBudgets[month]={incomeItems:[],bills:[],transactions:[],deletedTransactions:[]});
      budget.incomeItems=Array.isArray(budget.incomeItems)?budget.incomeItems:[];
      budget.bills=Array.isArray(budget.bills)?budget.bills:[];
      budget.transactions=Array.isArray(budget.transactions)?budget.transactions:[];
      budget.deletedTransactions=Array.isArray(budget.deletedTransactions)?budget.deletedTransactions:[];
      state.settings.budgetTracking=state.settings.budgetTracking&&typeof state.settings.budgetTracking==="object"?state.settings.budgetTracking:{};
      state.settings.budgetTracking[month]=state.settings.budgetTracking[month]&&typeof state.settings.budgetTracking[month]==="object"?state.settings.budgetTracking[month]:{};
      return budget;
    }
    function transactionAllocations(tx){
      if(Array.isArray(tx?.allocations)&&tx.allocations.length)return tx.allocations.map(a=>({budgetItemId:String(a.budgetItemId||a.id||""),budgetItemName:String(a.budgetItemName||a.name||"Budget item"),amount:amount(a.amount)})).filter(a=>a.budgetItemId);
      if(tx?.budgetItemId)return [{budgetItemId:String(tx.budgetItemId),budgetItemName:String(tx.budgetItemName||"Budget item"),amount:amount(tx.amount)}];
      return [];
    }
    function rebuildTracking(state,month,budget){
      const tracking={};
      budget.transactions.forEach(tx=>transactionAllocations(tx).forEach(a=>{
        const key=`${tx.type==="income"?"income":"expense"}:${a.budgetItemId}`;
        tracking[key]=amount((tracking[key]||0)+a.amount);
      }));
      state.settings.budgetTracking[month]=tracking;
    }
    function setIntent(doc,page){
      doc.body.dataset.dwPageIntent=page;
      try{doc.defaultView.localStorage.setItem(PAGE_KEY,page);doc.defaultView.sessionStorage.setItem(PAGE_KEY,page);}catch{}
    }
    function clearTransactionPage(doc){
      delete doc.body.dataset.debtwizardPage;
      doc.querySelector(".dw-transaction-overlay,.dw-selector-overlay,.dw-deleted-page")?.remove();
      const screen=doc.getElementById("screen");if(screen)screen.dataset.transactionsShell="";
    }

    function ensureStyles(doc){
      if(doc.getElementById("dw-transaction-recovery-v65"))return;
      const style=doc.createElement("style");style.id="dw-transaction-recovery-v65";
      style.textContent=`
        .dw-trans-page{min-height:100vh;background:#f7fbfc;padding-bottom:118px;color:#172d38}.dw-trans-hero{padding:calc(18px + env(safe-area-inset-top,0px)) 26px 22px;background:linear-gradient(135deg,#cdeff4,#eafcfe);border-bottom:1px solid #b9e3ea;color:#0f516b}.dw-trans-top{display:grid;grid-template-columns:72px 1fr 72px;align-items:center;margin-bottom:15px}.dw-trans-title{text-align:center;font-size:1.12rem;font-weight:950}.dw-trans-search{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #d6e7ea;border-radius:12px;padding:11px 14px;color:#7c8d93;box-shadow:0 8px 20px rgba(15,81,107,.08)}.dw-trans-search input{width:100%;border:0;outline:0;background:transparent;color:#263137;font-size:1rem}.dw-trans-wrap{padding:26px}.dw-trans-card{margin-bottom:22px;overflow:hidden;background:#fff;border:1px solid #dce8eb;border-radius:20px;padding:18px;box-shadow:0 10px 26px rgba(15,81,107,.07)}.dw-deleted-row{width:100%;display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:12px;border:0;background:#fff;padding:2px;color:#1d3039;text-align:left;font:inherit;font-weight:900;font-size:1.02rem}.dw-deleted-row span:first-child,.dw-deleted-row span:last-child{color:#0f7893;font-size:1.45rem}.dw-month-title{margin-bottom:10px;color:#47555b;font-weight:900}.dw-tx-row{width:100%;display:grid;grid-template-columns:54px minmax(0,1fr) auto;align-items:center;gap:14px;border:0;border-top:1px solid #edf1f2;background:transparent;padding:14px 0;text-align:left;font:inherit}.dw-tx-row:first-of-type{border-top:0}.dw-date-dot{width:50px;height:50px;display:grid;place-items:center;border:2px solid #e3eaed;border-radius:50%;color:#53646b;text-align:center;font-size:.72rem;font-weight:900;line-height:1.05}.dw-tx-name{display:block;color:#20272d;font-size:1.02rem;font-weight:850}.dw-tx-cat{display:block;margin-top:4px;color:#0f7893;font-size:.8rem;font-weight:800}.dw-tx-amount{color:#20272d;font-weight:900;white-space:nowrap}.dw-trans-empty{padding:46px 8px 72px}.dw-trans-empty h2{margin:0 0 14px;font-size:2rem;line-height:1.08}.dw-trans-empty p{margin:0 0 24px;color:#53646b;line-height:1.4}.dw-first-btn{width:100%;min-height:56px;border:0;border-radius:13px;background:linear-gradient(135deg,#0f7893,#27c7d8);color:#fff;font:inherit;font-weight:900}.dw-trans-fab{position:fixed;right:24px;bottom:calc(96px + env(safe-area-inset-bottom,0px));z-index:135;width:64px;height:64px;border:0;border-radius:50%;background:linear-gradient(135deg,#0f7893,#27c7d8);color:#fff;font-size:2.7rem;line-height:1;box-shadow:0 10px 28px rgba(0,35,62,.26)}.dw-no-results{display:none;padding:24px;color:#68777d;text-align:center;font-weight:800}.dw-no-results.show{display:block}
        .dw-transaction-overlay,.dw-selector-overlay,.dw-deleted-page{position:fixed;inset:0;z-index:1500;background:#f4f8f9;color:#183f50;overflow:auto;-webkit-overflow-scrolling:touch}.dw-modal-head{position:sticky;top:0;z-index:2;padding:calc(14px + env(safe-area-inset-top,0px)) 20px 18px;background:linear-gradient(135deg,#087b96,#27bfd2);color:#fff;box-shadow:0 8px 22px rgba(8,123,150,.18)}.dw-modal-top{display:grid;grid-template-columns:70px 1fr 70px;align-items:center}.dw-modal-top strong{text-align:center;font-size:1.16rem}.dw-link{border:0;background:transparent;color:#fff;font:inherit;font-weight:850;padding:8px 0}.dw-link:last-child{text-align:right}.dw-link[disabled]{opacity:.55}.dw-type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:15px;padding:4px;border:1px solid rgba(255,255,255,.35);border-radius:14px;background:rgba(255,255,255,.18)}.dw-type-toggle button{min-height:42px;border:0;border-radius:10px;background:transparent;color:#fff;font:inherit;font-weight:900}.dw-type-toggle button.active{background:#fff;color:#087b96}.dw-modal-body{padding:24px 20px calc(110px + env(safe-area-inset-bottom,0px))}.dw-panel{margin-bottom:18px;padding:0 20px;border:1px solid #dbe8ec;border-radius:20px;background:#fff;box-shadow:0 8px 22px rgba(15,81,107,.07)}.dw-field{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.2fr);align-items:center;gap:12px;min-height:68px;border-bottom:1px solid #e5edef}.dw-field:last-child{border-bottom:0}.dw-field span{font-weight:850}.dw-field input{width:100%;min-width:0;border:0;outline:0;background:transparent;color:#087b96;text-align:right;font:inherit;font-weight:800}.dw-budget-select{width:100%;min-height:64px;margin-bottom:18px;border:1px solid #dbe8ec;border-radius:20px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;color:#183f50;font:inherit;font-weight:850;box-shadow:0 8px 22px rgba(15,81,107,.07)}.dw-budget-select em{color:#087b96;font-style:normal}.dw-note{box-sizing:border-box;width:100%;min-height:104px;border:1px solid #dbe8ec;border-radius:20px;background:#fff;padding:20px;color:#183f50;font:inherit;resize:vertical}.dw-delete{width:100%;min-height:54px;margin-top:18px;border:1px solid #ffd3cf;border-radius:14px;background:#fff0ef;color:#bd4337;font:inherit;font-weight:900}.dw-alloc-card{margin:-18px 0 18px;border:1px solid #dbe8ec;border-radius:20px;background:#fff;overflow:hidden}.dw-alloc-row{display:grid;grid-template-columns:30px minmax(0,1fr) 112px;align-items:center;gap:10px;min-height:62px;padding:0 16px;border-bottom:1px solid #e5edef}.dw-alloc-row:last-of-type{border-bottom:0}.dw-alloc-remove{width:26px;height:26px;border:0;border-radius:50%;background:#d94a42;color:#fff;font-weight:900}.dw-alloc-row strong{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.dw-alloc-row input{width:100%;min-width:0;border:0;border-radius:9px;background:#f4f9fa;padding:10px 6px;color:#087b96;text-align:right;font:inherit;font-weight:850}.dw-split-status{padding:13px 16px;background:#075f87;color:#fff;text-align:center;font-weight:900}.dw-split-status.over{background:#b8443d}
        .dw-selector-search{display:flex;align-items:center;gap:9px;margin-top:14px;padding:11px 13px;border-radius:12px;background:#fff;color:#8c999e}.dw-selector-search input{width:100%;border:0;outline:0;background:transparent;font-size:1rem}.dw-selector-body{padding:22px 18px 90px}.dw-selector-card{margin-bottom:16px;padding:8px 18px;border:1px solid #dce8eb;border-radius:20px;background:#fff;box-shadow:0 8px 22px rgba(15,81,107,.06)}.dw-selector-title{padding:12px 0 8px;font-weight:900}.dw-selector-item{width:100%;display:grid;grid-template-columns:30px minmax(0,1fr) auto;align-items:center;gap:12px;border:0;border-top:1px solid #edf1f2;background:transparent;padding:15px 0;color:#20282d;text-align:left;font:inherit}.dw-selector-check{width:26px;height:26px;display:grid;place-items:center;border:2px solid #8ca0a7;border-radius:7px;color:#fff}.dw-selector-item.selected .dw-selector-check{border-color:#087b96;background:#087b96}.dw-selector-item strong{font-weight:850}.dw-selector-item small{color:#68777d}.dw-selector-empty{padding:28px;color:#728087;text-align:center}
        .dw-deleted-body{padding:22px 18px 80px}.dw-deleted-card{overflow:hidden;border:1px solid #dce8eb;border-radius:20px;background:#fff;box-shadow:0 8px 22px rgba(15,81,107,.06)}.dw-deleted-item{display:grid;grid-template-columns:50px minmax(0,1fr) auto;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #edf1f2}.dw-deleted-item:last-child{border-bottom:0}.dw-deleted-date{width:46px;height:46px;display:grid;place-items:center;border:2px solid #e3eaed;border-radius:50%;font-size:.7rem;font-weight:900;text-align:center}.dw-deleted-name{font-weight:850}.dw-deleted-meta{margin-top:3px;color:#0f7893;font-size:.78rem;font-weight:800}.dw-restore{border:0;border-radius:10px;background:#eaf9fc;color:#087b96;padding:9px 11px;font:inherit;font-weight:900}
        @media(min-width:900px){.dw-trans-page{padding-bottom:40px}.dw-trans-fab{bottom:28px}.dw-modal-body,.dw-selector-body,.dw-deleted-body{max-width:820px;margin:auto}.dw-modal-head{padding-left:calc(var(--dw-active-sidebar,0px) + 20px)}.dw-transaction-overlay,.dw-selector-overlay,.dw-deleted-page{padding-left:var(--dw-active-sidebar,0px)}}
      `;doc.head.appendChild(style);
    }

    function dateParts(value){const d=/^\d{4}-\d{2}-\d{2}$/.test(value||"")?new Date(`${value}T12:00:00`):new Date();return [d.toLocaleDateString("en-US",{month:"short"}),d.toLocaleDateString("en-US",{day:"numeric"})];}
    function categoryText(tx){return transactionAllocations(tx).map(a=>a.budgetItemName).join(", ")||tx.budgetItemName||tx.category||"Unassigned";}
    function markTransactionsActive(doc){
      const nav=doc.getElementById("dw-primary-nav");nav?.querySelectorAll(".active").forEach(n=>n.classList.remove("active"));nav?.querySelector(".dw-nav-transaction,[data-edp-trans-nav]")?.classList.add("active");
    }
    function renderTransactions(doc){
      ensureStyles(doc);const screen=doc.getElementById("screen");if(!screen)return false;
      const month=selectedMonth(doc),state=loadState(doc),budget=budgetFor(state,month);saveState(doc,state);
      const rows=[...budget.transactions].sort((a,b)=>String(b.date||"").localeCompare(String(a.date||""))).map(tx=>{const [m,d]=dateParts(tx.date);return `<button type="button" class="dw-tx-row" data-dw-edit-tx="${esc(tx.id)}"><span class="dw-date-dot">${esc(m)}<br>${esc(d)}</span><span><span class="dw-tx-name">${esc(tx.merchant||tx.source||"Transaction")}</span><span class="dw-tx-cat">${esc(categoryText(tx))}</span></span><span class="dw-tx-amount">${tx.type==="income"?"+":"-"}${money.format(amount(tx.amount))}</span></button>`;}).join("");
      screen.dataset.transactionsShell="1";doc.body.dataset.debtwizardPage="transactions";
      screen.innerHTML=`<section class="dw-trans-page"><header class="dw-trans-hero"><div class="dw-trans-top"><span></span><div class="dw-trans-title">Transactions</div><span></span></div><label class="dw-trans-search"><span>⌕</span><input type="search" placeholder="Search transactions" aria-label="Search transactions"></label></header><main class="dw-trans-wrap"><article class="dw-trans-card"><button type="button" class="dw-deleted-row" data-dw-open-deleted><span>♲</span><span>Deleted${budget.deletedTransactions.length?` (${budget.deletedTransactions.length})`:""}</span><span>›</span></button></article>${rows?`<article class="dw-trans-card"><div class="dw-month-title">${esc(monthLabel(month))}</div>${rows}<div class="dw-no-results">No transactions match your search.</div></article>`:`<section class="dw-trans-empty"><h2>Track your first transaction</h2><p>Enter an expense or income transaction and assign it to the correct budget item.</p><button type="button" class="dw-first-btn" data-dw-add-tx>Track My First Transaction</button></section>`}</main><button type="button" class="dw-trans-fab" data-dw-add-tx aria-label="Add transaction">+</button></section>`;
      const search=screen.querySelector(".dw-trans-search input");search?.addEventListener("input",()=>{const q=search.value.trim().toLowerCase();let visible=0;screen.querySelectorAll(".dw-tx-row").forEach(row=>{const show=!q||row.textContent.toLowerCase().includes(q);row.hidden=!show;if(show)visible++;});screen.querySelector(".dw-no-results")?.classList.toggle("show",!!q&&!visible);});
      markTransactionsActive(doc);return true;
    }

    function choicesFor(budget,type){return (type==="income"?budget.incomeItems:budget.bills).map(item=>({id:String(item.id||""),name:String(item.name||"Budget item"),planned:amount(item.amount)})).filter(item=>item.id);}
    function parseAlloc(root){try{return JSON.parse(root.dataset.allocations||"[]");}catch{return [];}}
    function setAlloc(root,list){root.dataset.allocations=JSON.stringify(list);renderAllocations(root);}
    function transactionType(root){return root.querySelector('[data-dw-type].active')?.dataset.dwType||"expense";}
    function transactionTotal(root){return amount(root.querySelector('[data-dw-field="amount"]')?.value);}
    function renderAllocations(root){
      const list=parseAlloc(root),select=root.querySelector(".dw-budget-select"),existing=root.querySelector(".dw-alloc-card");existing?.remove();
      if(select)select.querySelector("em").textContent=list.length?"Add another ›":"Select ›";
      if(!list.length)return;
      const card=root.ownerDocument.createElement("section");card.className="dw-alloc-card";card.innerHTML=list.map(item=>`<label class="dw-alloc-row" data-alloc-id="${esc(item.budgetItemId)}"><button type="button" class="dw-alloc-remove" data-dw-remove-alloc="${esc(item.budgetItemId)}">−</button><strong>${esc(item.budgetItemName)}</strong><input type="text" inputmode="decimal" value="${item.amount?item.amount.toFixed(2):""}" placeholder="0.00" data-dw-alloc-amount></label>`).join("")+`<div class="dw-split-status"></div>`;select.insertAdjacentElement("beforebegin",card);updateSplit(root);
    }
    function updateSplit(root){
      let list=parseAlloc(root);const inputs=[...root.querySelectorAll("[data-alloc-id]")];if(inputs.length){list=list.map(item=>{const row=inputs.find(r=>r.dataset.allocId===String(item.budgetItemId));return {...item,amount:amount(row?.querySelector("[data-dw-alloc-amount]")?.value)};});root.dataset.allocations=JSON.stringify(list);}
      const total=transactionTotal(root),assigned=list.reduce((s,i)=>s+amount(i.amount),0),left=Math.round((total-assigned)*100)/100,status=root.querySelector(".dw-split-status");if(status){status.classList.toggle("over",left<-.004);status.textContent=left<-.004?`${money.format(Math.abs(left))} Over Assigned`:`${money.format(Math.max(0,left))} Left to Split`;}
      const done=root.querySelector("[data-dw-save-tx]");if(done)done.disabled=!(total>.004&&list.length&&Math.abs(left)<=.004);
    }
    function openSelector(doc,root){
      const month=selectedMonth(doc),state=loadState(doc),budget=budgetFor(state,month),type=transactionType(root),choices=choicesFor(budget,type),current=new Map(parseAlloc(root).map(i=>[String(i.budgetItemId),i]));
      doc.querySelector(".dw-selector-overlay")?.remove();const overlay=doc.createElement("section");overlay.className="dw-selector-overlay";overlay.innerHTML=`<header class="dw-modal-head"><div class="dw-modal-top"><button class="dw-link" data-dw-close-selector>Cancel</button><strong>Select Budget Items</strong><button class="dw-link" data-dw-apply-selector>Done</button></div><label class="dw-selector-search"><span>⌕</span><input type="search" placeholder="Search"></label></header><main class="dw-selector-body">${choices.length?`<section class="dw-selector-card"><div class="dw-selector-title">${type==="income"?"Income":"Budget items"}</div>${choices.map(item=>`<button type="button" class="dw-selector-item${current.has(item.id)?" selected":""}" data-choice-id="${esc(item.id)}" data-choice-name="${esc(item.name)}"><span class="dw-selector-check">${current.has(item.id)?"✓":""}</span><strong>${esc(item.name)}</strong><small>${money.format(item.planned)}</small></button>`).join("")}</section>`:`<div class="dw-selector-empty">No budget items are available for this month.</div>`}</main>`;doc.body.appendChild(overlay);
      overlay.addEventListener("click",event=>{const choice=event.target.closest("[data-choice-id]");if(choice){choice.classList.toggle("selected");choice.querySelector(".dw-selector-check").textContent=choice.classList.contains("selected")?"✓":"";return;}if(event.target.closest("[data-dw-close-selector]")){overlay.remove();return;}if(event.target.closest("[data-dw-apply-selector]")){const selected=[...overlay.querySelectorAll("[data-choice-id].selected")].map(btn=>{const old=current.get(btn.dataset.choiceId);return {budgetItemId:btn.dataset.choiceId,budgetItemName:btn.dataset.choiceName,amount:old?.amount||0};});if(selected.length===1)selected[0].amount=transactionTotal(root);setAlloc(root,selected);overlay.remove();}});
      overlay.querySelector("input[type=search]")?.addEventListener("input",event=>{const q=event.target.value.trim().toLowerCase();overlay.querySelectorAll("[data-choice-id]").forEach(row=>row.hidden=!!q&&!row.textContent.toLowerCase().includes(q));});
    }
    function openTransactionForm(doc,id=""){
      ensureStyles(doc);const month=selectedMonth(doc),state=loadState(doc),budget=budgetFor(state,month),tx=budget.transactions.find(item=>String(item.id)===String(id))||null,type=tx?.type==="income"?"income":"expense",alloc=tx?transactionAllocations(tx):[];
      doc.querySelector(".dw-transaction-overlay")?.remove();const root=doc.createElement("section");root.className="dw-transaction-overlay";root.dataset.txId=tx?.id||"";root.dataset.allocations=JSON.stringify(alloc);root.innerHTML=`<header class="dw-modal-head"><div class="dw-modal-top"><button class="dw-link" data-dw-close-tx>Cancel</button><strong>${tx?"Edit":"Add"} Transaction</strong><button class="dw-link" data-dw-save-tx disabled>Done</button></div><div class="dw-type-toggle"><button type="button" data-dw-type="expense" class="${type==="expense"?"active":""}">− Expense</button><button type="button" data-dw-type="income" class="${type==="income"?"active":""}">+ Income</button></div></header><main class="dw-modal-body"><section class="dw-panel"><label class="dw-field"><span>Date</span><input type="date" data-dw-field="date" value="${esc(tx?.date||new Date().toISOString().slice(0,10))}"></label><label class="dw-field"><span>Amount</span><input type="text" inputmode="decimal" data-dw-field="amount" value="${tx?.amount?amount(tx.amount).toFixed(2):""}" placeholder="0.00"></label><label class="dw-field"><span data-dw-party-label>${type==="income"?"Source":"Merchant"}</span><input type="text" data-dw-field="party" value="${esc(type==="income"?tx?.source||"":tx?.merchant||"")}" placeholder="Name"></label><label class="dw-field"><span>Check #</span><input type="text" inputmode="numeric" data-dw-field="check" value="${esc(tx?.checkNumber||"")}" placeholder="Optional"></label></section><button type="button" class="dw-budget-select" data-dw-select-budget><span>Budget Item(s)</span><em>Select ›</em></button><textarea class="dw-note" data-dw-field="note" placeholder="Add a note">${esc(tx?.note||"")}</textarea>${tx?`<button type="button" class="dw-delete" data-dw-delete-tx>Delete Transaction</button>`:""}</main>`;doc.body.appendChild(root);renderAllocations(root);updateSplit(root);
    }
    function saveTransaction(doc,root){
      const month=selectedMonth(doc),state=loadState(doc),budget=budgetFor(state,month),type=transactionType(root),date=root.querySelector('[data-dw-field="date"]').value,total=transactionTotal(root),party=root.querySelector('[data-dw-field="party"]').value.trim(),alloc=parseAlloc(root).map(i=>({...i,amount:amount(i.amount)})),assigned=alloc.reduce((s,i)=>s+i.amount,0);
      if(!date||total<=.004||!party||!alloc.length||Math.abs(total-assigned)>.004)return;
      const id=root.dataset.txId||uid(),tx={id,date,amount:total,type,allocations:alloc,budgetItemId:alloc.length===1?alloc[0].budgetItemId:"",budgetItemName:alloc.length===1?alloc[0].budgetItemName:alloc.map(i=>i.budgetItemName).join(", "),checkNumber:root.querySelector('[data-dw-field="check"]').value.trim(),note:root.querySelector('[data-dw-field="note"]').value.trim()};if(type==="income")tx.source=party;else tx.merchant=party;
      const index=budget.transactions.findIndex(item=>String(item.id)===String(id));if(index>=0)budget.transactions[index]=tx;else budget.transactions.push(tx);rebuildTracking(state,month,budget);saveState(doc,state);root.remove();renderTransactions(doc);
    }
    function deleteTransaction(doc,root){
      const month=selectedMonth(doc),state=loadState(doc),budget=budgetFor(state,month),id=root.dataset.txId,index=budget.transactions.findIndex(item=>String(item.id)===String(id));if(index<0)return;const [tx]=budget.transactions.splice(index,1);budget.deletedTransactions.unshift({...tx,deletedAt:new Date().toISOString()});rebuildTracking(state,month,budget);saveState(doc,state);root.remove();renderTransactions(doc);
    }
    function openDeleted(doc){
      const month=selectedMonth(doc),state=loadState(doc),budget=budgetFor(state,month);doc.querySelector(".dw-deleted-page")?.remove();const page=doc.createElement("section");page.className="dw-deleted-page";page.innerHTML=`<header class="dw-modal-head"><div class="dw-modal-top"><button class="dw-link" data-dw-close-deleted>‹ Back</button><strong>Deleted Transactions</strong><span></span></div></header><main class="dw-deleted-body">${budget.deletedTransactions.length?`<section class="dw-deleted-card">${budget.deletedTransactions.map(tx=>{const [m,d]=dateParts(tx.date);return `<article class="dw-deleted-item"><span class="dw-deleted-date">${esc(m)}<br>${esc(d)}</span><span><div class="dw-deleted-name">${esc(tx.merchant||tx.source||"Transaction")}</div><div class="dw-deleted-meta">${esc(categoryText(tx))}</div></span><button type="button" class="dw-restore" data-dw-restore-tx="${esc(tx.id)}">Restore</button></article>`;}).join("")}</section>`:`<div class="dw-selector-empty">No deleted transactions.</div>`}</main>`;doc.body.appendChild(page);
    }
    function restoreTransaction(doc,id){const month=selectedMonth(doc),state=loadState(doc),budget=budgetFor(state,month),index=budget.deletedTransactions.findIndex(item=>String(item.id)===String(id));if(index<0)return;const [tx]=budget.deletedTransactions.splice(index,1);delete tx.deletedAt;budget.transactions.push(tx);rebuildTracking(state,month,budget);saveState(doc,state);doc.querySelector(".dw-deleted-page")?.remove();renderTransactions(doc);}

    function findNative(doc,page){return doc.querySelector(`#tabbar .tab-btn[data-page="${page}"],#dw-primary-nav .tab-btn[data-page="${page}"]`);}
    function navigate(doc,page){
      if(page==="transactions"){setIntent(doc,page);return renderTransactions(doc);}clearTransactionPage(doc);setIntent(doc,page);const native=findNative(doc,page);if(native){native.click();return true;}const more=doc.querySelector(`[data-dw-more-page="${page}"]`);if(more){more.click();return true;}return false;
    }
    function repairMobileNav(doc){
      const nav=doc.getElementById("dw-primary-nav");if(!nav)return;const tx=nav.querySelector(".dw-nav-transaction,.dw-nav-plus,[data-edp-trans-add],[data-edp-trans-nav]");if(tx){tx.removeAttribute("data-edp-trans-add");tx.setAttribute("data-edp-trans-nav","");tx.setAttribute("aria-label","Transactions");const label=tx.querySelector("span:last-child,small:last-child");if(label)label.textContent="Transactions";}const more=nav.querySelector(".dw-nav-more");if(more){more.setAttribute("aria-label","More navigation");const label=more.querySelector("span:last-child");if(label)label.textContent="More";}
    }
    function installRouting(doc){
      if(doc.defaultView.__dwNavigationRecoveryV65)return;doc.defaultView.__dwNavigationRecoveryV65=true;
      doc.addEventListener("click",event=>{
        const txNav=event.target.closest?.("#dw-primary-nav .dw-nav-transaction,#dw-primary-nav [data-edp-trans-nav]");if(txNav){event.preventDefault();event.stopImmediatePropagation();navigate(doc,"transactions");return;}
        const morePage=event.target.closest?.("[data-dw-more-page]");if(morePage){event.preventDefault();event.stopImmediatePropagation();doc.querySelector(".dw-more-backdrop")?.remove();doc.querySelector(".dw-more-menu")?.remove();navigate(doc,morePage.dataset.dwMorePage);return;}
        const add=event.target.closest?.("[data-dw-add-tx]");if(add){event.preventDefault();event.stopImmediatePropagation();openTransactionForm(doc);return;}
        const edit=event.target.closest?.("[data-dw-edit-tx]");if(edit){event.preventDefault();openTransactionForm(doc,edit.dataset.dwEditTx);return;}
        if(event.target.closest?.("[data-dw-open-deleted]")){event.preventDefault();openDeleted(doc);return;}
        const restore=event.target.closest?.("[data-dw-restore-tx]");if(restore){event.preventDefault();restoreTransaction(doc,restore.dataset.dwRestoreTx);return;}
        if(event.target.closest?.("[data-dw-close-deleted]")){event.preventDefault();doc.querySelector(".dw-deleted-page")?.remove();return;}
        const root=event.target.closest?.(".dw-transaction-overlay");if(root){
          if(event.target.closest("[data-dw-close-tx]")){event.preventDefault();root.remove();return;}
          const typeButton=event.target.closest("[data-dw-type]");if(typeButton){event.preventDefault();root.querySelectorAll("[data-dw-type]").forEach(b=>b.classList.toggle("active",b===typeButton));root.querySelector("[data-dw-party-label]").textContent=typeButton.dataset.dwType==="income"?"Source":"Merchant";setAlloc(root,[]);return;}
          if(event.target.closest("[data-dw-select-budget]")){event.preventDefault();openSelector(doc,root);return;}
          const remove=event.target.closest("[data-dw-remove-alloc]");if(remove){event.preventDefault();setAlloc(root,parseAlloc(root).filter(i=>String(i.budgetItemId)!==String(remove.dataset.dwRemoveAlloc)));return;}
          if(event.target.closest("[data-dw-save-tx]")){event.preventDefault();saveTransaction(doc,root);return;}
          if(event.target.closest("[data-dw-delete-tx]")){event.preventDefault();if(confirm("Delete this transaction?"))deleteTransaction(doc,root);return;}
        }
        const native=event.target.closest?.("#dw-primary-nav .tab-btn[data-page],#tabbar .tab-btn[data-page]");if(native&&native.dataset.page!=="transactions"){clearTransactionPage(doc);setIntent(doc,native.dataset.page);}
      },true);
      doc.addEventListener("input",event=>{const root=event.target.closest?.(".dw-transaction-overlay");if(root&&(event.target.matches('[data-dw-field="amount"]')||event.target.matches("[data-dw-alloc-amount]"))){const list=parseAlloc(root);if(list.length===1&&event.target.matches('[data-dw-field="amount"]')){list[0].amount=transactionTotal(root);root.dataset.allocations=JSON.stringify(list);renderAllocations(root);}else updateSplit(root);}},true);
      let queued=false;new MutationObserver(()=>{if(queued)return;queued=true;queueMicrotask(()=>{queued=false;repairMobileNav(doc);installDesktop(doc);});}).observe(doc.body,{childList:true,subtree:true});
    }

    function collapsed(){try{return localStorage.getItem(COLLAPSED_KEY)==="1";}catch{return false;}}
    function installDesktop(doc){
      const old=doc.getElementById("dw-desktop-sidebar");if(!desktopQuery.matches){old?.remove();doc.body.classList.remove("dw-desktop-sidebar-ready","dw-desktop-sidebar-collapsed");return;}
      if(!doc.getElementById("dw-desktop-sidebar-style-v65")){const style=doc.createElement("style");style.id="dw-desktop-sidebar-style-v65";style.textContent=`@media(min-width:900px){:root{--dw-sidebar-width:286px;--dw-sidebar-collapsed:88px}body.dw-desktop-sidebar-ready{--dw-active-sidebar:var(--dw-sidebar-width);background:#eef3f5!important}body.dw-desktop-sidebar-ready.dw-desktop-sidebar-collapsed{--dw-active-sidebar:var(--dw-sidebar-collapsed)}body.dw-desktop-sidebar-ready #app-shell{box-sizing:border-box!important;min-height:100vh!important;padding-left:var(--dw-active-sidebar)!important;transition:padding-left .22s ease!important}body.dw-desktop-sidebar-ready #screen{width:100%!important;min-height:100vh!important;padding-bottom:0!important}body.dw-desktop-sidebar-ready #tabbar,body.dw-desktop-sidebar-ready #dw-primary-nav{display:none!important}.dw-desktop-sidebar{position:fixed;z-index:1400;inset:0 auto 0 0;width:var(--dw-active-sidebar);box-sizing:border-box;display:flex;flex-direction:column;gap:7px;padding:22px 16px;background:linear-gradient(180deg,#073f5b,#07536f);box-shadow:10px 0 30px rgba(10,57,76,.12);overflow:hidden auto;transition:width .22s ease,padding .22s ease}.dw-desktop-sidebar-head{display:grid;grid-template-columns:minmax(0,1fr) 42px;align-items:center;gap:10px;min-height:54px;margin-bottom:16px;padding:0 4px 14px;border-bottom:1px solid rgba(255,255,255,.12)}.dw-desktop-sidebar-brand{min-width:0;color:#fff;font-size:1.28rem;font-weight:900;white-space:nowrap;overflow:hidden}.dw-desktop-sidebar-toggle{width:42px;height:42px;border:0;border-radius:11px;background:rgba(255,255,255,.1);color:#fff;font-size:1.25rem}.dw-desktop-sidebar-nav{display:flex;flex-direction:column;gap:7px}.dw-desktop-sidebar-button{width:100%;min-height:56px;display:grid;grid-template-columns:38px minmax(0,1fr);align-items:center;gap:12px;padding:10px 13px;border:0;border-radius:14px;background:transparent;color:#e2f0f4;font:inherit;font-size:.98rem;font-weight:800;text-align:left;white-space:nowrap}.dw-desktop-sidebar-button.active{background:linear-gradient(135deg,#0787ae,#19b9d3);color:#fff;box-shadow:0 10px 20px rgba(0,29,43,.2)}.dw-desktop-sidebar-icon{width:38px;display:grid;place-items:center;font-size:1.45rem}.dw-desktop-sidebar-label{overflow:hidden;text-overflow:ellipsis}body.dw-desktop-sidebar-collapsed .dw-desktop-sidebar{padding-left:12px;padding-right:12px}body.dw-desktop-sidebar-collapsed .dw-desktop-sidebar-head{grid-template-columns:1fr;justify-items:center}body.dw-desktop-sidebar-collapsed .dw-desktop-sidebar-brand,body.dw-desktop-sidebar-collapsed .dw-desktop-sidebar-label{display:none}body.dw-desktop-sidebar-collapsed .dw-desktop-sidebar-button{grid-template-columns:1fr;justify-items:center;padding-left:8px;padding-right:8px}body.dw-desktop-sidebar-ready .hero-content,body.dw-desktop-sidebar-ready .container,body.dw-desktop-sidebar-ready .hero-inner,body.dw-desktop-sidebar-ready .page-wrap,body.dw-desktop-sidebar-ready .dw-trans-top,body.dw-desktop-sidebar-ready .dw-trans-search,body.dw-desktop-sidebar-ready .dw-trans-wrap{width:min(calc(100% - 72px),1280px)!important;max-width:1280px!important;margin-left:auto!important;margin-right:auto!important}}`;doc.head.appendChild(style);}
      let side=old;if(!side){side=doc.createElement("aside");side.id="dw-desktop-sidebar";side.className="dw-desktop-sidebar";side.innerHTML=`<div class="dw-desktop-sidebar-head"><div class="dw-desktop-sidebar-brand">DebtWizard</div><button type="button" class="dw-desktop-sidebar-toggle"></button></div><nav class="dw-desktop-sidebar-nav">${items.map(([page,label,icon])=>`<button type="button" class="dw-desktop-sidebar-button" data-dw-page="${page}"><span class="dw-desktop-sidebar-icon">${icon}</span><span class="dw-desktop-sidebar-label">${label}</span></button>`).join("")}</nav>`;doc.body.appendChild(side);side.addEventListener("click",event=>{const toggle=event.target.closest(".dw-desktop-sidebar-toggle");if(toggle){const next=!doc.body.classList.contains("dw-desktop-sidebar-collapsed");doc.body.classList.toggle("dw-desktop-sidebar-collapsed",next);try{localStorage.setItem(COLLAPSED_KEY,next?"1":"0");}catch{}installDesktop(doc);return;}const button=event.target.closest("[data-dw-page]");if(button)navigate(doc,button.dataset.dwPage);});}
      const isCollapsed=collapsed();doc.body.classList.add("dw-desktop-sidebar-ready");doc.body.classList.toggle("dw-desktop-sidebar-collapsed",isCollapsed);const toggle=side.querySelector(".dw-desktop-sidebar-toggle");toggle.textContent=isCollapsed?"☰":"←";toggle.setAttribute("aria-label",isCollapsed?"Expand navigation":"Collapse navigation");const page=doc.body.dataset.dwPageIntent||"home";side.querySelectorAll("[data-dw-page]").forEach(btn=>btn.classList.toggle("active",btn.dataset.dwPage===page));
    }
    function apply(){try{const doc=host.contentDocument;if(!doc?.body)return;ensureStyles(doc);repairMobileNav(doc);installRouting(doc);installDesktop(doc);}catch(error){console.error("DebtWizard navigation recovery failed",error);}}
    host.addEventListener("load",()=>{apply();setTimeout(apply,250);setTimeout(apply,900);});desktopQuery.addEventListener?.("change",apply);addEventListener("resize",apply);
  })();
  </script>
</body>
</html>
