<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#cdeff4">
  <title>DebtWizard</title>
  <style>
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#eef3f5}
    #app-host{display:block;width:100%;height:100%;border:0;background:#eef3f5}
  </style>
</head>
<body>
  <iframe id="app-host" title="DebtWizard" src="mobile.html?v=64" allow="clipboard-read; clipboard-write"></iframe>
  <script>
    (() => {
      "use strict";

      const host = document.getElementById("app-host");
      const desktopQuery = window.matchMedia("(min-width: 900px)");
      const collapsedKey = "debtwizard-desktop-sidebar-collapsed";
      const pageKey = "debtwizard-active-page";
      const storeKey = "debt-calculator-v2";
      const items = [
        { page: "home", label: "Home", icon: "⌂" },
        { page: "debts", label: "Debts", icon: "◔" },
        { page: "transactions", label: "Transactions", icon: "$" },
        { page: "budget", label: "Budget", icon: "$" },
        { page: "strategy", label: "Payoff Strategy", icon: "✦" },
        { page: "plan", label: "Debt Payoff Plan", icon: "▤" },
        { page: "track", label: "Debt Payment Tracking", icon: "✓" }
      ];

      const money = value => new Intl.NumberFormat("en-US", { style:"currency", currency:"USD" })
        .format(Number.isFinite(Number(value)) ? Number(value) : 0);
      const esc = value => String(value ?? "").replace(/[&<>"']/g, char => ({
        "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
      }[char]));

      function readCollapsed() {
        try { return localStorage.getItem(collapsedKey) === "1"; }
        catch { return false; }
      }

      function saveCollapsed(value) {
        try { localStorage.setItem(collapsedKey, value ? "1" : "0"); }
        catch {}
      }

      function setPageIntent(doc, page) {
        doc.body.dataset.dwPageIntent = page;
        try {
          doc.defaultView.localStorage.setItem(pageKey, page);
          doc.defaultView.sessionStorage.setItem(pageKey, page);
        } catch {}
      }

      function clearTransactionState(doc) {
        delete doc.body.dataset.debtwizardPage;
        const screen = doc.getElementById("screen");
        if (screen) screen.dataset.transactionsShell = "";
      }

      function buttonText(button) {
        return (button?.getAttribute("aria-label") || button?.textContent || "")
          .replace(/\s+/g, " ").trim().toLowerCase();
      }

      function navigationButtons(doc) {
        return [...doc.querySelectorAll(
          "#dw-primary-nav button,#dw-primary-nav [role='button'],#tabbar button,#tabbar [role='button']"
        )];
      }

      function findNativeButton(doc, page) {
        const exact = doc.querySelector(
          `#dw-primary-nav [data-page="${page}"],#tabbar [data-page="${page}"]`
        );
        if (exact) return exact;

        const expected = {
          home: "home",
          debts: "debt",
          budget: "budget",
          strategy: "strategy",
          plan: "plan",
          track: "track"
        }[page];
        return expected
          ? navigationButtons(doc).find(button => buttonText(button).includes(expected)) || null
          : null;
      }

      function closeMoreMenu(doc) {
        doc.querySelector(".dw-more-backdrop")?.remove();
        doc.querySelector(".dw-more-menu")?.remove();
      }

      function selectedMonth(doc) {
        const title = doc.querySelector(".hero-title")?.textContent?.trim() || "";
        const months = {
          january:"01", february:"02", march:"03", april:"04", may:"05", june:"06",
          july:"07", august:"08", september:"09", october:"10", november:"11", december:"12"
        };
        const match = title.match(/^([A-Za-z]+)\s+(20\d{2})$/);
        if (match && months[match[1].toLowerCase()]) return `${match[2]}-${months[match[1].toLowerCase()]}`;
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
      }

      function transactionData(doc) {
        let state = {};
        try { state = JSON.parse(doc.defaultView.localStorage.getItem(storeKey)) || {}; }
        catch {}
        const month = selectedMonth(doc);
        const budget = state.settings?.monthlyBudgets?.[month] || {};
        const transactions = Array.isArray(budget.transactions) ? [...budget.transactions] : [];
        transactions.sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")));
        return { month, transactions };
      }

      function monthLabel(month) {
        const [year, monthNumber] = String(month).split("-").map(Number);
        return new Date(year, monthNumber - 1, 1).toLocaleDateString("en-US", { month:"long", year:"numeric" });
      }

      function transactionDate(value) {
        const date = /^\d{4}-\d{2}-\d{2}$/.test(String(value || ""))
          ? new Date(`${value}T12:00:00`)
          : new Date();
        return {
          month: date.toLocaleDateString("en-US", { month:"short" }),
          day: date.toLocaleDateString("en-US", { day:"numeric" })
        };
      }

      function transactionCategory(transaction) {
        const allocations = Array.isArray(transaction?.allocations) ? transaction.allocations : [];
        const names = allocations.map(item => item?.budgetItemName).filter(Boolean);
        return names.join(", ") || transaction?.budgetItemName || transaction?.category || "Unassigned";
      }

      function ensureTransactionStyle(doc) {
        if (doc.getElementById("dw-restored-transactions-style-v64")) return;
        const style = doc.createElement("style");
        style.id = "dw-restored-transactions-style-v64";
        style.textContent = `
          .dw-trans-page{min-height:100vh;background:#f7fbfc;padding-bottom:118px}
          .dw-trans-hero{background:linear-gradient(135deg,#cdeff4 0%,#eafcfe 100%);color:#0f516b;padding:calc(18px + env(safe-area-inset-top,0px)) 26px 22px;border-bottom:1px solid #b9e3ea}
          .dw-trans-top{display:grid;grid-template-columns:72px 1fr 72px;align-items:center;margin-bottom:15px}
          .dw-trans-title{text-align:center;font-size:1.12rem;font-weight:950}
          .dw-trans-search{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #d6e7ea;border-radius:12px;padding:11px 14px;color:#7c8d93;box-shadow:0 8px 20px rgba(15,81,107,.08)}
          .dw-trans-search input{width:100%;border:0;outline:0;background:transparent;color:#263137;font-size:1rem}
          .dw-trans-wrap{padding:26px}
          .dw-trans-card{overflow:hidden;background:#fff;border:1px solid #dce8eb;border-radius:20px;padding:18px;box-shadow:0 10px 26px rgba(15,81,107,.07)}
          .dw-month-title{margin-bottom:10px;color:#47555b;font-weight:900}
          .dw-tx-row{width:100%;display:grid;grid-template-columns:54px minmax(0,1fr) auto;align-items:center;gap:14px;border:0;border-top:1px solid #edf1f2;background:transparent;padding:14px 0;text-align:left;font:inherit}
          .dw-tx-row:first-of-type{border-top:0}
          .dw-date-dot{width:50px;height:50px;display:grid;place-items:center;border:2px solid #e3eaed;border-radius:50%;color:#53646b;text-align:center;font-size:.72rem;font-weight:900;line-height:1.05}
          .dw-tx-name{color:#20272d;font-size:1.02rem;font-weight:850}
          .dw-tx-cat{margin-top:4px;color:#0f7893;font-size:.8rem;font-weight:800}
          .dw-tx-amount{color:#20272d;font-weight:900;white-space:nowrap}
          .dw-trans-empty{padding:48px 8px 72px;text-align:center}
          .dw-trans-empty h2{margin:0 0 14px;color:#171d23;font-size:2rem;line-height:1.08;text-align:left}
          .dw-trans-empty p{margin:0 0 24px;color:#53646b;font-size:1rem;line-height:1.4;text-align:left}
          .dw-first-btn{width:100%;min-height:54px;border:0;border-radius:13px;background:#004b75;color:#fff;font:inherit;font-weight:900}
          .dw-trans-fab{position:fixed;right:24px;bottom:calc(96px + env(safe-area-inset-bottom,0px));z-index:135;width:64px;height:64px;border:0;border-radius:50%;background:#004b75;color:#fff;font-size:2.7rem;line-height:1;box-shadow:0 10px 28px rgba(0,35,62,.26)}
          .dw-trans-no-results{display:none;padding:28px 16px;color:#66777e;text-align:center;font-weight:800}
          .dw-trans-no-results.show{display:block}
          @media(min-width:900px){.dw-trans-page{padding-bottom:40px}.dw-trans-fab{bottom:28px}.dw-trans-wrap{padding-top:34px}}
        `;
        doc.head.appendChild(style);
      }

      function setTransactionActive(doc) {
        const nav = doc.getElementById("dw-primary-nav");
        nav?.querySelectorAll(".active").forEach(button => button.classList.remove("active"));
        nav?.querySelector(".dw-nav-transaction,[data-edp-trans-nav]")?.classList.add("active");
      }

      function renderTransactions(doc) {
        const screen = doc.getElementById("screen");
        if (!screen) return false;

        ensureTransactionStyle(doc);
        const { month, transactions } = transactionData(doc);
        const rows = transactions.map(transaction => {
          const date = transactionDate(transaction.date);
          const name = transaction.merchant || transaction.source || "Transaction";
          const amount = Math.max(0, Number(transaction.amount) || 0);
          return `<button type="button" class="dw-tx-row" data-dw-edit-transaction="${esc(transaction.id || "")}">
            <span class="dw-date-dot">${esc(date.month)}<br>${esc(date.day)}</span>
            <span><span class="dw-tx-name">${esc(name)}</span><span class="dw-tx-cat">${esc(transactionCategory(transaction))}</span></span>
            <span class="dw-tx-amount">${transaction.type === "income" ? "+" : "-"}${money(amount)}</span>
          </button>`;
        }).join("");

        screen.dataset.transactionsShell = "1";
        doc.body.dataset.debtwizardPage = "transactions";
        screen.innerHTML = `<section class="dw-trans-page">
          <header class="dw-trans-hero">
            <div class="dw-trans-top"><span></span><div class="dw-trans-title">Transactions</div><span></span></div>
            <label class="dw-trans-search"><span>⌕</span><input type="search" placeholder="Search transactions" aria-label="Search transactions"></label>
          </header>
          <main class="dw-trans-wrap">
            ${transactions.length
              ? `<article class="dw-trans-card"><div class="dw-month-title">${esc(monthLabel(month))}</div>${rows}<div class="dw-trans-no-results">No transactions match your search.</div></article>`
              : `<section class="dw-trans-empty"><h2>Track your first transaction</h2><p>Enter an expense or income transaction and assign it to the correct budget item.</p><button type="button" class="dw-first-btn" data-edp-trans-add>Track My First Transaction</button></section>`}
          </main>
          <button type="button" class="dw-trans-fab" data-edp-trans-add aria-label="Add transaction">+</button>
        </section>`;

        const search = screen.querySelector(".dw-trans-search input");
        search?.addEventListener("input", () => {
          const query = search.value.trim().toLowerCase();
          const transactionRows = [...screen.querySelectorAll(".dw-tx-row")];
          let visible = 0;
          transactionRows.forEach(row => {
            const matches = !query || row.textContent.toLowerCase().includes(query);
            row.hidden = !matches;
            if (matches) visible += 1;
          });
          screen.querySelector(".dw-trans-no-results")?.classList.toggle("show", Boolean(query) && visible === 0);
        });

        setTransactionActive(doc);
        return true;
      }

      function openTransactions(doc) {
        setPageIntent(doc, "transactions");
        closeMoreMenu(doc);
        return renderTransactions(doc);
      }

      function openTrack(doc) {
        setPageIntent(doc, "track");
        closeMoreMenu(doc);
        clearTransactionState(doc);
        const nativeTrack = doc.querySelector('#tabbar .tab-btn[data-page="track"]');
        if (!nativeTrack) return false;
        nativeTrack.click();
        return true;
      }

      function navigate(doc, page) {
        if (page === "transactions") return openTransactions(doc);
        if (page === "track") return openTrack(doc);

        clearTransactionState(doc);
        setPageIntent(doc, page);
        closeMoreMenu(doc);
        const direct = findNativeButton(doc, page);
        if (direct) {
          direct.click();
          return true;
        }

        const more = navigationButtons(doc).find(button => buttonText(button).includes("more"));
        if (!more) return false;
        more.click();
        setTimeout(() => doc.querySelector(`[data-dw-more-page="${page}"]`)?.click(), 40);
        return true;
      }

      function activePage(doc) {
        if (doc.body.dataset.dwPageIntent) return doc.body.dataset.dwPageIntent;
        const active = doc.querySelector("#dw-primary-nav [data-page].active,#tabbar [data-page].active");
        if (active?.dataset.page) return active.dataset.page;
        const activeButton = doc.querySelector("#dw-primary-nav button.active,#tabbar button.active");
        const activeText = buttonText(activeButton);
        if (activeText.includes("transaction")) return "transactions";
        if (activeText.includes("budget")) return "budget";
        if (activeText.includes("debt")) return "debts";
        try { return doc.defaultView.localStorage.getItem(pageKey) || "home"; }
        catch { return "home"; }
      }

      function installNavigationRouting(doc) {
        const win = doc.defaultView;
        if (win.__dwResponsiveNavigationInstalled) return;
        win.__dwResponsiveNavigationInstalled = true;

        win.addEventListener("click", event => {
          const transactionButton = event.target.closest?.(
            "#dw-primary-nav .dw-nav-transaction,#dw-primary-nav [data-edp-trans-nav]"
          );
          if (transactionButton) {
            event.preventDefault();
            event.stopImmediatePropagation();
            openTransactions(doc);
            return;
          }

          const morePage = event.target.closest?.("[data-dw-more-page]");
          if (morePage) {
            const page = morePage.dataset.dwMorePage;
            if (["strategy", "plan", "track"].includes(page)) {
              event.preventDefault();
              event.stopImmediatePropagation();
              navigate(doc, page);
              return;
            }
          }

          const nativePage = event.target.closest?.(
            "#dw-primary-nav [data-dw-page],#tabbar .tab-btn[data-page]"
          );
          if (nativePage?.dataset) {
            const page = nativePage.dataset.dwPage || nativePage.dataset.page;
            if (page && page !== "transactions") {
              clearTransactionState(doc);
              setPageIntent(doc, page);
            }
          }

          if (event.target.closest?.(".dw-tx-done.dw-save-ready")) {
            setTimeout(() => {
              if (doc.body.dataset.dwPageIntent === "transactions" && !doc.querySelector(".dw-tx-root")) {
                renderTransactions(doc);
              }
            }, 250);
          }
        }, true);
      }

      function repairMobileNavigation(doc) {
        const repair = () => {
          const nav = doc.getElementById("dw-primary-nav");
          if (!nav) return false;

          const transaction = nav.querySelector(
            ".dw-nav-transaction,.dw-nav-plus,[data-edp-trans-add],[data-edp-trans-nav]"
          );
          if (transaction) {
            transaction.removeAttribute("data-edp-trans-add");
            transaction.setAttribute("data-edp-trans-nav", "");
            transaction.setAttribute("aria-label", "Transactions");
            const label = transaction.querySelector("span:last-child");
            if (label && label.textContent.trim() !== "Transactions") label.textContent = "Transactions";
          }

          const more = nav.querySelector(".dw-nav-more");
          if (more) {
            more.setAttribute("aria-label", "More navigation");
            const label = more.querySelector("span:last-child");
            if (label && label.textContent.trim() !== "More") label.textContent = "More";
          }
          return true;
        };

        repair();
        if (doc.body.dataset.dwResponsiveNavObserver === "true") return;
        doc.body.dataset.dwResponsiveNavObserver = "true";
        let queued = false;
        new MutationObserver(() => {
          if (queued) return;
          queued = true;
          queueMicrotask(() => {
            queued = false;
            repair();
          });
        }).observe(doc.body, { childList:true, subtree:true });
      }

      function installDesktop(doc) {
        const old = doc.getElementById("dw-desktop-sidebar");
        if (!desktopQuery.matches) {
          old?.remove();
          doc.body.classList.remove("dw-desktop-sidebar-ready", "dw-desktop-sidebar-collapsed");
          return;
        }

        if (!doc.getElementById("dw-desktop-sidebar-style")) {
          const style = doc.createElement("style");
          style.id = "dw-desktop-sidebar-style";
          style.textContent = `
            @media (min-width:900px){
              :root{--dw-sidebar-width:286px;--dw-sidebar-collapsed:88px}
              body.dw-desktop-sidebar-ready{--dw-active-sidebar:var(--dw-sidebar-width);background:#eef3f5!important}
              body.dw-desktop-sidebar-ready.dw-desktop-sidebar-collapsed{--dw-active-sidebar:var(--dw-sidebar-collapsed)}
              body.dw-desktop-sidebar-ready #app-shell{box-sizing:border-box!important;min-height:100vh!important;padding-left:var(--dw-active-sidebar)!important;transition:padding-left .22s ease!important}
              body.dw-desktop-sidebar-ready #screen{width:100%!important;min-height:100vh!important;padding-bottom:0!important}
              body.dw-desktop-sidebar-ready #tabbar,
              body.dw-desktop-sidebar-ready #dw-primary-nav{display:none!important}
              .dw-desktop-sidebar{position:fixed;z-index:1000;inset:0 auto 0 0;width:var(--dw-active-sidebar);box-sizing:border-box;display:flex;flex-direction:column;gap:7px;padding:22px 16px;background:linear-gradient(180deg,#073f5b 0%,#07536f 100%);box-shadow:10px 0 30px rgba(10,57,76,.12);overflow:hidden auto;transition:width .22s ease,padding .22s ease}
              .dw-desktop-sidebar-head{display:grid;grid-template-columns:minmax(0,1fr) 42px;align-items:center;gap:10px;min-height:54px;margin-bottom:16px;padding:0 4px 14px;border-bottom:1px solid rgba(255,255,255,.12)}
              .dw-desktop-sidebar-brand{min-width:0;color:#fff;font-size:1.28rem;font-weight:900;white-space:nowrap;overflow:hidden}
              .dw-desktop-sidebar-toggle{width:42px;height:42px;border:0;border-radius:11px;background:rgba(255,255,255,.1);color:#fff;font-size:1.25rem;cursor:pointer}
              .dw-desktop-sidebar-toggle:hover{background:rgba(255,255,255,.18)}
              .dw-desktop-sidebar-nav{display:flex;flex-direction:column;gap:7px}
              .dw-desktop-sidebar-button{width:100%;min-height:56px;display:grid;grid-template-columns:38px minmax(0,1fr);align-items:center;gap:12px;padding:10px 13px;border:0;border-radius:14px;background:transparent;color:#e2f0f4;font:inherit;font-size:.98rem;font-weight:800;text-align:left;white-space:nowrap;cursor:pointer;transition:background .16s ease,color .16s ease,box-shadow .16s ease}
              .dw-desktop-sidebar-button:hover{background:rgba(255,255,255,.1)}
              .dw-desktop-sidebar-button.active{background:linear-gradient(135deg,#0787ae,#19b9d3);color:#fff;box-shadow:0 10px 20px rgba(0,29,43,.2)}
              .dw-desktop-sidebar-icon{width:38px;display:grid;place-items:center;font-size:1.45rem;line-height:1}
              .dw-desktop-sidebar-label{min-width:0;overflow:hidden;text-overflow:ellipsis}
              body.dw-desktop-sidebar-collapsed .dw-desktop-sidebar{padding-left:12px;padding-right:12px}
              body.dw-desktop-sidebar-collapsed .dw-desktop-sidebar-head{grid-template-columns:1fr;justify-items:center;padding-left:0;padding-right:0}
              body.dw-desktop-sidebar-collapsed .dw-desktop-sidebar-brand{display:none}
              body.dw-desktop-sidebar-collapsed .dw-desktop-sidebar-button{grid-template-columns:1fr;justify-items:center;padding-left:8px;padding-right:8px}
              body.dw-desktop-sidebar-collapsed .dw-desktop-sidebar-label{display:none}
              body.dw-desktop-sidebar-ready .hero-content,
              body.dw-desktop-sidebar-ready .container,
              body.dw-desktop-sidebar-ready .hero-inner,
              body.dw-desktop-sidebar-ready .page-wrap,
              body.dw-desktop-sidebar-ready .dw-trans-top,
              body.dw-desktop-sidebar-ready .dw-trans-search,
              body.dw-desktop-sidebar-ready .dw-trans-wrap{width:min(calc(100% - 72px),1280px)!important;max-width:1280px!important;margin-left:auto!important;margin-right:auto!important}
              body.dw-desktop-sidebar-ready .hero,
              body.dw-desktop-sidebar-ready .mobile-hero{padding-left:48px!important;padding-right:48px!important}
              body.dw-desktop-sidebar-ready .rounded-sheet,
              body.dw-desktop-sidebar-ready .page-sheet{min-height:calc(100vh - 170px)!important}
              body.dw-desktop-sidebar-ready .summary-grid,
              body.dw-desktop-sidebar-ready .stats-grid{gap:18px!important}
              body.dw-desktop-sidebar-ready .metric-row{gap:18px!important}
              body.dw-desktop-sidebar-ready .metric-card,
              body.dw-desktop-sidebar-ready .stat-tile{border-radius:18px!important;padding:20px!important}
              body.dw-desktop-sidebar-ready .modal-backdrop{padding-left:var(--dw-active-sidebar)!important;transition:padding-left .22s ease!important}
            }
          `;
          doc.head.appendChild(style);
        }

        let sidebar = old;
        if (!sidebar) {
          sidebar = doc.createElement("aside");
          sidebar.id = "dw-desktop-sidebar";
          sidebar.className = "dw-desktop-sidebar";
          sidebar.setAttribute("aria-label", "Desktop navigation");
          sidebar.innerHTML = `
            <div class="dw-desktop-sidebar-head">
              <div class="dw-desktop-sidebar-brand">DebtWizard</div>
              <button type="button" class="dw-desktop-sidebar-toggle" aria-label="Collapse navigation">←</button>
            </div>
            <nav class="dw-desktop-sidebar-nav">
              ${items.map(item => `<button type="button" class="dw-desktop-sidebar-button" data-dw-page="${item.page}"><span class="dw-desktop-sidebar-icon" aria-hidden="true">${item.icon}</span><span class="dw-desktop-sidebar-label">${item.label}</span></button>`).join("")}
            </nav>`;
          doc.body.appendChild(sidebar);

          sidebar.addEventListener("click", event => {
            const toggle = event.target.closest(".dw-desktop-sidebar-toggle");
            if (toggle) {
              const collapsed = !doc.body.classList.contains("dw-desktop-sidebar-collapsed");
              doc.body.classList.toggle("dw-desktop-sidebar-collapsed", collapsed);
              toggle.textContent = collapsed ? "☰" : "←";
              toggle.setAttribute("aria-label", collapsed ? "Expand navigation" : "Collapse navigation");
              saveCollapsed(collapsed);
              return;
            }
            const button = event.target.closest("[data-dw-page]");
            if (button) navigate(doc, button.dataset.dwPage);
          });
        }

        const collapsed = readCollapsed();
        doc.body.classList.add("dw-desktop-sidebar-ready");
        doc.body.classList.toggle("dw-desktop-sidebar-collapsed", collapsed);
        const toggle = sidebar.querySelector(".dw-desktop-sidebar-toggle");
        toggle.textContent = collapsed ? "☰" : "←";
        toggle.setAttribute("aria-label", collapsed ? "Expand navigation" : "Collapse navigation");

        const sync = () => {
          const page = activePage(doc);
          sidebar.querySelectorAll("[data-dw-page]").forEach(button => {
            button.classList.toggle("active", button.dataset.dwPage === page);
          });
        };
        sync();

        if (!doc.body.dataset.dwDesktopObserver) {
          doc.body.dataset.dwDesktopObserver = "true";
          new MutationObserver(sync).observe(doc.body, {
            childList:true,
            subtree:true,
            attributes:true,
            attributeFilter:["class", "data-dw-page-intent"]
          });
        }
      }

      function apply() {
        try {
          const doc = host.contentDocument;
          if (!doc?.body) return;
          installNavigationRouting(doc);
          repairMobileNavigation(doc);
          installDesktop(doc);
        } catch (error) {
          console.error("Navigation could not be installed.", error);
        }
      }

      host.addEventListener("load", () => {
        apply();
        setTimeout(apply, 250);
        setTimeout(apply, 900);
      });
      desktopQuery.addEventListener?.("change", apply);
      window.addEventListener("resize", apply);
    })();
  </script>
</body>
</html>
