<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>DebtWizard</title>
</head>
<body>
  <p id="loading" style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:40px 22px;color:#174a61">Opening DebtWizard…</p>
  <script>
    (async () => {
      try {
        const extra = location.search ? '&' + location.search.slice(1) : '';
        const response = await fetch(`mobile.html?v=32&runtime=${Date.now()}&strategyStyle=1${extra}`, { cache: 'no-store' });
        if (!response.ok) throw new Error('Unable to load mobile app shell.');
        let html = await response.text();
        html = html.replace(/paycheck-form-overlap-fix-v4\.js\?v=\d+/g, 'paycheck-form-overlap-fix-v4.js?v=25');
        html = html.replace('</body>', `<script>
          (() => {
            const KEY = 'debtwizard-budget-mode';
            const modes = ['planned','spent','remaining'];
            const money = value => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(Number.isFinite(value) ? value : 0);
            const number = value => Number.isFinite(Number.parseFloat(value)) ? Number.parseFloat(value) : 0;
            const parseMoney = value => number(String(value || '').replace(/[^0-9.-]/g, ''));
            function mode() {
              try { const value = localStorage.getItem(KEY) || 'planned'; return modes.includes(value) ? value : 'planned'; }
              catch { return 'planned'; }
            }
            function save(value) { try { localStorage.setItem(KEY, modes.includes(value) ? value : 'planned'); } catch {} }
            function addStyle() {
              if (document.getElementById('budget-view-runtime-style')) return;
              const style = document.createElement('style');
              style.id = 'budget-view-runtime-style';
              style.textContent = '.budget-status-bar{grid-column:1/-1;width:100%;height:6px;border-radius:999px;background:#edf1f2;overflow:hidden;margin-top:2px}.budget-status-fill{display:block;height:100%;width:0%;border-radius:inherit;background:#0f516b;transition:width .18s ease}.budget-status-fill.planned{background:#c9d3d7}.budget-status-fill.spent{background:#20bfd7}.budget-status-fill.remaining{background:#0f516b}.edp-item-row,.budget-bill-row{grid-template-rows:auto auto!important}.budget-section-mode-label,.edp-cat-total{color:#5f6f76!important;font-weight:850!important}';
              document.head.appendChild(style);
            }
            function labelFor(active, title) {
              if (/income/i.test(title || '')) return active === 'spent' ? 'Received' : active === 'remaining' ? 'Remaining' : 'Planned';
              return active === 'spent' ? 'Spent' : active === 'remaining' ? 'Remaining' : 'Planned';
            }
            function rowValues(row) {
              if (!row.dataset.budgetPlanned) {
                const amountNode = row.querySelector('.edp-amount,.budget-bill-amount');
                row.dataset.budgetPlanned = String(parseMoney(amountNode?.childNodes?.[0]?.textContent || amountNode?.textContent || '0'));
                row.dataset.budgetSpent = String(parseMoney(row.dataset.spent || '0'));
              }
              const planned = Math.max(0, number(row.dataset.budgetPlanned));
              const spent = Math.max(0, number(row.dataset.budgetSpent));
              const remaining = Math.max(0, planned - spent);
              return { planned, spent, remaining };
            }
            function ensureBar(row) {
              if (!row.querySelector('.budget-status-bar')) row.insertAdjacentHTML('beforeend', '<span class="budget-status-bar" aria-hidden="true"><span class="budget-status-fill"></span></span>');
            }
            function updateRow(row, active) {
              ensureBar(row);
              const values = rowValues(row);
              const value = values[active];
              const percent = values.planned > 0 ? Math.max(0, Math.min(100, value / values.planned * 100)) : 0;
              const fill = row.querySelector('.budget-status-fill');
              if (fill) {
                fill.className = `budget-status-fill ${active}`;
                fill.style.width = `${active === 'planned' && values.planned > 0 ? 100 : percent}%`;
              }
              if (row.dataset.budgetLastMode === active) return;
              const amountNode = row.querySelector('.edp-amount,.budget-bill-amount');
              if (amountNode) amountNode.innerHTML = `${money(value)}<small>Edit ›</small>`;
              row.dataset.budgetLastMode = active;
            }
            function updateHeaders(active) {
              document.querySelectorAll('.section').forEach(section => {
                const title = section.querySelector('.section-title')?.textContent?.trim() || '';
                const total = section.querySelector('.budget-section-total');
                if (!total || (!/^Income/.test(title) && !/^Assigned categories/.test(title) && !/^Bills/.test(title))) return;
                total.textContent = labelFor(active, title);
                total.classList.add('budget-section-mode-label');
              });
              document.querySelectorAll('.edp-card').forEach(card => {
                const total = card.querySelector('.edp-cat-total');
                if (total) total.textContent = labelFor(active, card.querySelector('.edp-cat-title')?.textContent || '');
              });
            }
            function totals(rows) {
              return rows.reduce((sum, row) => {
                const values = rowValues(row);
                return { planned: sum.planned + values.planned, spent: sum.spent + values.spent, remaining: sum.remaining + values.remaining };
              }, { planned: 0, spent: 0, remaining: 0 });
            }
            function apply() {
              addStyle();
              const form = document.getElementById('budget-form');
              if (!form) return;
              if (!form.querySelector('.budget-view-toggle')) {
                form.insertAdjacentHTML('afterbegin', '<div class="budget-view-toggle" role="tablist" aria-label="Budget view"><button type="button" data-budget-view="planned">Planned</button><button type="button" data-budget-view="spent">Spent</button><button type="button" data-budget-view="remaining">Remaining</button></div><p class="budget-view-note" data-budget-view-note></p>');
              }
              const active = mode();
              form.querySelectorAll('[data-budget-view]').forEach(button => button.classList.toggle('active', button.dataset.budgetView === active));
              const rows = [...form.querySelectorAll('.edp-item-row,.budget-bill-row')];
              rows.forEach(row => updateRow(row, active));
              updateHeaders(active);
              const sum = totals(rows);
              const note = form.querySelector('[data-budget-view-note]');
              if (note) note.innerHTML = active === 'spent' ? `<strong>${money(sum.spent)}</strong> tracked so far` : active === 'remaining' ? `<strong>${money(sum.remaining)}</strong> remaining from planned rows` : `<strong>${money(sum.planned)}</strong> planned across visible rows`;
            }
            document.addEventListener('click', event => {
              const button = event.target.closest('[data-budget-view]');
              if (button) { event.preventDefault(); save(button.dataset.budgetView); apply(); return; }
              if (event.target.closest('[data-act="nav"], .tab-btn, [data-act^="budget-month"]')) setTimeout(apply, 80);
            }, true);
            const screen = document.getElementById('screen');
            if (screen) new MutationObserver(() => setTimeout(apply, 0)).observe(screen, { childList: true, subtree: true });
            window.addEventListener('load', () => { setTimeout(apply, 80); setTimeout(apply, 450); });
            setTimeout(apply, 0);
          })();
        <\/script></body>`);
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error(error);
        document.getElementById('loading').innerHTML = 'DebtWizard needs a refresh. Please reload this page once.';
      }
    })();
  </script>
</body>
</html>
