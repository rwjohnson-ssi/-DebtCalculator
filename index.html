<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#cdeff4">
  <title>DebtWizard</title>
  <style>html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#eef3f5}#app-host{display:block;width:100%;height:100%;border:0;background:#eef3f5}</style>
</head>
<body>
  <iframe id="app-host" title="DebtWizard" src="mobile.html?v=78" allow="clipboard-read; clipboard-write"></iframe>
  <script src="transaction-core-v76.js?v=3"></script>
  <script>
    (() => {
      "use strict";
      const T = window.DWTx76;
      if (!T) return;

      T.markActive = doc => {
        doc.querySelectorAll("#dw-primary-nav,#tabbar").forEach(nav => {
          nav.querySelectorAll("button").forEach(button => {
            button.classList.remove("active");
            button.removeAttribute("aria-current");
            if (button.hasAttribute("aria-selected")) button.setAttribute("aria-selected", "false");
          });

          const transaction = [...nav.querySelectorAll("button")]
            .find(button => T.transactionButton(button));
          if (!transaction) return;

          transaction.classList.add("active");
          transaction.setAttribute("aria-current", "page");
          if (transaction.hasAttribute("aria-selected")) transaction.setAttribute("aria-selected", "true");
        });
      };

      const installTransactionRoute = doc => {
        const win = doc?.defaultView;
        if (!win || win.__transactionNavRouteV78) return;
        win.__transactionNavRouteV78 = true;

        win.addEventListener("click", event => {
          const button = T.transactionButton(event.target);
          if (!button) return;

          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();

          if (typeof T.renderTransactions === "function") {
            T.renderTransactions(doc, button);
          } else {
            win.setTimeout(() => T.renderTransactions?.(doc, button), 0);
          }
        }, true);
      };

      const install = () => {
        try {
          const doc = T.host?.contentDocument;
          if (doc?.body) installTransactionRoute(doc);
        } catch (error) {
          console.error("Transaction navigation could not be installed.", error);
        }
      };

      T.host?.addEventListener("load", install);
      install();
    })();
  </script>
  <script src="transaction-list-v76.js?v=3"></script>
  <script src="transaction-alloc-v76.js?v=3"></script>
  <script src="transaction-edit-v76.js?v=3"></script>
  <script src="transaction-boot-v76.js?v=3"></script>
</body>
</html>
