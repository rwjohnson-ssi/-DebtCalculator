<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#cdeff4">
  <title>DebtWizard</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef3f5;color:#174a61;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .loading{text-align:center;padding:28px}
    .loading strong{display:block;font-size:1.25rem;margin-bottom:8px}
    .loading a{color:#0f7893;font-weight:700}
  </style>
</head>
<body>
  <div class="loading">
    <strong>Opening DebtWizard…</strong>
    <span>If the app does not open automatically, <a id="open-app" href="mobile.html?v=55">open it here</a>.</span>
  </div>
  <script>
    (() => {
      // Load the existing application shell directly. This avoids the previous
      // fetch/document.write bootstrap, which could leave #screen blank when
      // one injected script failed to parse.
      const target = new URL("mobile.html", window.location.href);
      const current = new URLSearchParams(window.location.search);
      current.forEach((value, key) => target.searchParams.set(key, value));
      target.searchParams.set("v", "55");
      target.searchParams.set("runtime", String(Date.now()));
      document.getElementById("open-app").href = target.href;
      window.location.replace(target.href);
    })();
  </script>
</body>
</html>
