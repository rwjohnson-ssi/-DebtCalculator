<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#cdeff4">
  <title>DebtWizard</title>
  <style>html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#eef3f5}#app-host{display:block;width:100%;height:100%;border:0;background:#eef3f5}</style>
</head>
<body>
  <iframe id="app-host" title="DebtWizard" src="mobile.html?v=84" allow="clipboard-read; clipboard-write"></iframe>
  <script src="transaction-core-v76.js?v=9"></script>
  <script src="transaction-list-v76.js?v=9"></script>
  <script src="transaction-alloc-v76.js?v=9"></script>
  <script src="transaction-edit-v76.js?v=9"></script>
  <script src="transaction-boot-v76.js?v=9"></script>
  <script>
    (() => {
      "use strict";
      const T = window.DWTx76;
      if (!T) return;

      // transaction-boot-v76.js is the only Transactions route owner.
      // It uses one delegated document listener, so navigation rebuilds do not
      // remove the connection between the button and the Transactions page.
      T.markActive = doc => {
        doc.querySelectorAll("#dw-primary-nav,#tabbar").forEach(nav => {
          const controls = [...nav.querySelectorAll("button,[role='button'],a")];
          controls.forEach(control => {
            control.classList.remove("active");
            control.removeAttribute("aria-current");
            if (control.hasAttribute("aria-selected")) control.setAttribute("aria-selected", "false");
          });
          controls.filter(control => T.transactionButton(control)).forEach(control => {
            control.classList.add("active");
            control.setAttribute("aria-current", "page");
            if (control.hasAttribute("aria-selected")) control.setAttribute("aria-selected", "true");
          });
        });
      };
    })();
  </script>
</body>
</html>
