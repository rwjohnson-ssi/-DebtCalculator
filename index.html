            function loadState() { try { return JSON.parse(localStorage.getItem(STORE)) || {}; } catch { return {}; } }

            function currentMonth() {

              const date = new Date();

            }
            function monthLabel(month) {

              state.settings.budgetTracking[month] = state.settings.budgetTracking[month] && typeof state.settings.budgetTracking[month] === 'object' ? state.settings.budgetTracking[month] : {};

            }
            function setTrackingValue(state, month, kind, id, value) {
              state.settings.budgetTracking = state.settings.budgetTracking && typeof state.settings.budgetTracking === 'object' ? state.settings.budgetTracking : {};

              state.settings.budgetTracking[month][(kind === 'income' ? 'income:' : 'expense:') + id] = Math.max(0, number(value));

t 0 0 0 2px rgba(0,0,0,.12)}.dw-tx-body{padding:26px}.dw-tx-panel{background:white;border-radius:20px;padding:0 26px;margin-bottom:26px}.dw-tx-field{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.1fr);gap:14px;align-items:center;min-height:72px;border-bottom:1px solid #e6ebee}.dw-tx-field:last-child{border-bottom:0}.dw-tx-field span{font-size:1.05rem;color:#1f272d}.dw-tx-field input{border:0;outline:0;text-align:right;color:#0079a8;font-size:1.05rem;background:transparent;min-width:0}.dw-tx-field input::placeholder{color:#9aa5aa}.dw-tx-account{display:block;padding:17px 0 20px;border-bottom:0}.dw-tx-account strong{display:block;font-size:1.05rem;color:#1f272d}.dw-tx-account small{display:block;margin-top:6px;line-height:1.3;color:#4f5d63;font-size:.94rem}.dw-tx-budget-row{border:0;width:100%;background:white;border-radius:20px;margin-bottom:26px;display:flex;align-items:center;justify-content:space-between;padding:21px 26px;font-size:1.05rem;color:#1f272d}.dw-tx-budget-row em{font-style:normal;color:#0079a8;font-weight:850}.dw-tx-note{width:100%;min-height:86px;border:0;border-radius:18px;background:white;padding:22px 26px;font-size:1.05rem;resize:none;outline:0}.dw-tx-note::placeholder{color:#9aa5aa}#tabbar{overflow:visible}.dw-nav-plus{position:absolute;left:50%;top:-34px;transform:translateX(-50%);z-index:80;width:72px;height:72px;border:0;border-radius:999px;background:#004b75;color:white;box-shadow:0 12px 30px rgba(0,35,62,.32);display:grid;place-items:center;font-size:2.8rem;line-height:1}.dw-nav-plus small{position:absolute;top:74px;color:#8d989e;font-size:.72rem;font-weight:800}.dw-nav-plus:active{transform:translateX(-50%) scale(.97)}';

            function installTransactionKeyboardFix() {
              if (window.__dwTransactionKeyboardFixV1) return;
              window.__dwTransactionKeyboardFixV1 = true;
              const style = document.createElement('style');
              style.id = 'dw-transaction-keyboard-fix-v1';
              style.textContent = '.dw-tx-sheet{bottom:var(--dw-tx-keyboard-gap,0px)!important;max-height:var(--dw-tx-visible-height,94vh)!important;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;scroll-padding-top:150px;scroll-padding-bottom:120px}.dw-tx-body{padding-bottom:calc(26px + var(--dw-tx-keyboard-space,0px))!important}.dw-tx-sheet input,.dw-tx-sheet textarea{scroll-margin-top:150px;scroll-margin-bottom:120px}';
              document.head.appendChild(style);
              const viewport = window.visualViewport;
              const update = () => {
                const sheet = document.querySelector('.dw-tx-sheet');
                if (!sheet) return;
                const visibleHeight = Math.max(280, viewport?.height || window.innerHeight);
                const offsetTop = Math.max(0, viewport?.offsetTop || 0);
                const keyboardGap = Math.max(0, window.innerHeight - visibleHeight - offsetTop);
                sheet.style.setProperty('--dw-tx-visible-height', Math.max(280, visibleHeight - 6) + 'px');
                sheet.style.setProperty('--dw-tx-keyboard-gap', keyboardGap + 'px');
                sheet.style.setProperty('--dw-tx-keyboard-space', keyboardGap > 80 ? '96px' : '0px');
                const active = document.activeElement;
                if (!active || !sheet.contains(active) || !active.matches('input,textarea,select')) return;
                requestAnimationFrame(() => {
                  const rect = active.getBoundingClientRect();
                  const visibleTop = offsetTop + 136;
                  const visibleBottom = offsetTop + visibleHeight - 28;
                  if (rect.bottom > visibleBottom) sheet.scrollBy({ top: rect.bottom - visibleBottom + 24, behavior: 'smooth' });
                  else if (rect.top < visibleTop) sheet.scrollBy({ top: rect.top - visibleTop - 18, behavior: 'smooth' });
                });
              };
              document.addEventListener('focusin', event => {
                if (!event.target.closest?.('.dw-tx-sheet')) return;
                [0,60,140,260,420].forEach(delay => setTimeout(update, delay));
              }, true);
              document.addEventListener('focusout', event => {
                if (event.target.closest?.('.dw-tx-sheet')) [80,220].forEach(delay => setTimeout(update, delay));
              }, true);
              viewport?.addEventListener('resize', update);
              viewport?.addEventListener('scroll', update);
              new MutationObserver(() => setTimeout(update, 0)).observe(document.body, { childList:true, subtree:true });
            }
            function setHeaderLabel(scope, active, title) {
              if (!scope) return;
              const text = label(active, title);
              const target = scope.querySelector('.budget-section-total, .edp-cat-total');
              if (target) { target.textContent = text; return; }
              const head = scope.querySelector('.section-head, .edp-cat-head') || scope.firstElementChild;
              if (!head) return;
              const candidates = [...head.querySelectorAll('span,strong,div')].filter(item => /\$|Planned|Spent|Remaining|Received/.test(item.textContent || ''));
              const fallback = candidates[candidates.length - 1];
              if (fallback) fallback.textContent = text;
            }
            function updateLabels(active) {
              document.querySelectorAll('.section').forEach(section => {
                const title = section.querySelector('.section-title')?.textContent?.trim() || '';
                if (/^(Income|Assigned categories|Bills)/.test(title)) setHeaderLabel(section, active, title);
              });
              document.querySelectorAll('.edp-card').forEach(card => setHeaderLabel(card, active, card.querySelector('.edp-cat-title')?.textContent || ''));
              document.querySelectorAll('h2,.section-title').forEach(titleNode => {
                const title = titleNode.textContent?.trim() || '';
                if (/^(Income|Assigned categories|Bills)$/.test(title)) setHeaderLabel(titleNode.closest('.section') || titleNode.parentElement, active, title);
              });
            }
            function sectionByTitle(name) {
              return [...document.querySelectorAll('.section')].find(section => (section.querySelector('.section-title')?.textContent || '').trim().startsWith(name));
            }
            function incomeValues(row) {
              if (!row.dataset.incomePlanned) {
                const amountNode = row.querySelector('.edp-amount,.budget-bill-amount');
                row.dataset.incomePlanned = String(parseMoney(amountNode?.childNodes?.[0]?.textContent || amountNode?.textContent || '0'));
              }
              const planned = Math.max(0, number(row.dataset.incomePlanned));
              const received = Math.min(planned, trackingValue('income', row.dataset.id));
              return { planned, spent: received, remaining: Math.max(0, planned - received) };
            }
            function expenseValues(row) {
              if (!row.dataset.expensePlanned) {
                const amountNode = row.querySelector('.edp-amount,.budget-bill-amount');
                row.dataset.expensePlanned = String(parseMoney(amountNode?.childNodes?.[0]?.textContent || amountNode?.textContent || '0'));
              }
              const planned = Math.max(0, number(row.dataset.expensePlanned));
              const spent = Math.min(planned, trackingValue('expense', row.dataset.id));
              return { planned, spent, remaining: Math.max(0, planned - spent) };
            }
            function barWidth(values, active) {
              if (active === 'planned' && values.planned > 0) return '100%';
              const percent = values.planned > 0 ? Math.max(0, Math.min(100, values[active] / values.planned * 100)) : 0;
              return percent + '%';
            }
            function ensureIncomeBar(row) {
              const textCell = row.querySelector('span:first-child') || row;

            }
            function ensureAssignedBar(row) {
              const textCell = row.querySelector('span:first-child') || row;

            }
            function updateIncomeRows(active) {
              const section = sectionByTitle('Income');

                ensureIncomeBar(row);
                const values = incomeValues(row);

                if (amountNode) amountNode.innerHTML = money(values[active]) + '<small>Edit ›</small>';
                const fill = row.querySelector('.budget-income-fill');
                if (fill) { fill.className = 'budget-income-fill ' + active; fill.style.width = barWidth(values, active); }
              });
            }
            function updateAssignedRows(active) {
              const section = sectionByTitle('Assigned categories');
              if (!section) return;
              section.querySelectorAll('.edp-item-row').forEach(row => {
                ensureAssignedBar(row);
                const values = expenseValues(row);
                const amountNode = row.querySelector('.edp-amount');
                if (amountNode) amountNode.innerHTML = money(values[active]) + '<small>Edit ›</small>';
                const fill = row.querySelector('.budget-assigned-fill');
                if (fill) { fill.className = 'budget-assigned-fill ' + active; fill.style.width = barWidth(values, active); }
              });
            }
            function sumRows(rows, kind, active) {
              return rows.reduce((sum, row) => sum + (kind === 'income' ? incomeValues(row) : expenseValues(row))[active], 0);
            }
            function updateSectionTotals(active) {
              const income = sectionByTitle('Income');
              if (income) {
                const incomeTotal = income.querySelector('.budget-section-total');

              const assignedHead = assigned.querySelector('.section-head');

              if (assignedTotal) assignedTotal.textContent = money(sumRows([...assigned.querySelectorAll('.edp-item-row')], 'expense', active));
            }

              const labelText = isIncome ? 'Received' : 'Spent';

            }
            function saveTrackedPopup(popup) {

              const selectedDay = Math.max(0, Math.min(31, Math.floor(number(document.getElementById('edp-due')?.value))));

                info.budget.bills = [...info.budget.bills.filter(item => item.id !== id), next];
                setTrackingValue(state, info.month, 'expense', id, tracked);

              syncBudgetTotals(state, info.budget);

              saveState(state);

            }
            function patchTransactionNav() {
              const bar = document.getElementById('tabbar');
              if (!bar) return;
              const track = bar.querySelector('.tab-btn[data-page="track"]');
              if (track && track.dataset.trackLabelFixed !== '1') {
                track.dataset.trackLabelFixed = '1';
                const label = track.querySelector('span:last-child');
                if (label) label.textContent = 'Track';
              }
              bar.querySelector('[data-edp-trans-nav]')?.remove();
              if (bar.querySelector('[data-edp-trans-add-nav]')) return;
              bar.insertAdjacentHTML('beforeend', '<button class="dw-nav-plus" data-edp-trans-add data-edp-trans-add-nav type="button" aria-label="Add transaction"><span>+</span><small>Transaction</small></button>');
            }
            function setTransactionNavActive(active) {
              const custom = document.querySelector('[data-edp-trans-add-nav]');
              if (custom) custom.classList.remove('active');
            }
            function transactionRows(transactions) {
              return transactions.map(item => '<div class="dw-tx-row"><span class="dw-date-dot"><span><small>' + esc(dayLabel(item.date).split(' ')[0]) + '</small>' + esc(dayLabel(item.date).split(' ')[1] || '') + '</span></span><span><div class="dw-tx-name">' + esc(item.merchant || item.source || 'Transaction') + '</div><div class="dw-tx-cat">' + esc(item.budgetItemName || item.category || 'Unassigned') + '</div></span><span class="dw-tx-amount">' + (item.type === 'income' ? '' : '-') + money(Math.max(0, number(item.amount))) + '</span></div>').join('');
            }
            function patchTransactionsPage() {
              patchTransactionNav();
              if (document.body.dataset.debtwizardPage !== 'transactions') return;
              const screen = document.getElementById('screen');
              if (!screen || screen.dataset.transactionsShell === '1') { setTransactionNavActive(true); return; }
              const state = loadState();
              const info = budgetFor(state);
              saveState(state);
              const tx = [...info.budget.transactions].sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')));
              screen.dataset.transactionsShell = '1';
              screen.innerHTML = '<section class="dw-trans-page"><header class="dw-trans-hero"><div class="dw-trans-top"><span></span><div class="dw-trans-title">Transactions</div><div class="dw-trans-select">Select</div></div><label class="dw-trans-search"><span>⌕</span><input type="search" placeholder="Search" disabled></label></header><main class="dw-trans-wrap"><article class="dw-trans-card dw-deleted-row"><span class="dw-trash">♲</span><span>Deleted</span><span class="dw-chev">›</span></article>' + (tx.length ? '<article class="dw-trans-card"><div class="dw-month-title">' + esc(monthLabel(info.month)) + '</div>' + transactionRows(tx) + '</article>' : '<section class="dw-trans-empty"><div class="dw-trans-illus">💸</div><h2>Time to track your first transaction</h2><p>Now that your budget is set up, think of the last thing you spent money on, and let’s track it.</p><button type="button" class="dw-first-btn" data-edp-trans-add>Track My First Transaction</button></section>') + '</main></section>';
              setTransactionNavActive(true);
            }
            function showTransactionPopup(type) {
              addStyle();
              document.querySelector('.dw-tx-root')?.remove();
              const activeType = type === 'income' ? 'income' : 'expense';
              document.body.insertAdjacentHTML('beforeend', '<div class="dw-tx-root"><div class="dw-tx-backdrop" data-edp-trans-close></div><section class="dw-tx-sheet" role="dialog" aria-modal="true" aria-label="Add Transaction"><header class="dw-tx-sheet-head"><div class="dw-tx-grabber"></div><div class="dw-tx-head-row"><button class="dw-tx-link" type="button" data-edp-trans-close>Cancel</button><strong>Add Transaction</strong><span class="dw-tx-link dw-tx-done">Done</span></div><div class="dw-tx-toggle"><button type="button" class="' + (activeType === 'expense' ? 'active' : '') + '" data-edp-trans-type="expense">- Expense</button><button type="button" class="' + (activeType === 'income' ? 'active' : '') + '" data-edp-trans-type="income">+ Income</button></div></header><main class="dw-tx-body"><section class="dw-tx-panel"><label class="dw-tx-field"><span>Date</span><input type="date" value="' + todayIso() + '"></label><label class="dw-tx-field"><span>Amount</span><input type="number" min="0" step="0.01" inputmode="decimal" placeholder="$0.00"></label><label class="dw-tx-field"><span>' + (activeType === 'income' ? 'Source' : 'Merchant') + '</span><input type="text" maxlength="80" placeholder="Name"></label><div class="dw-tx-account"><strong>Account</strong><small>No bank connection required. Transactions are entered manually and stored locally in this browser.</small></div></section><button type="button" class="dw-tx-budget-row"><span>Budget Item(s)</span><em>Select ›</em></button><section class="dw-tx-panel"><label class="dw-tx-field"><span>Check #</span><input type="text" inputmode="numeric" placeholder="0000"></label></section><textarea class="dw-tx-note" placeholder="Add a Note"></textarea></main></section></div>');
            }
            function clearTransactionPage() {
              if (document.body.dataset.debtwizardPage === 'transactions') document.body.dataset.debtwizardPage = '';
              const screen = document.getElementById('screen');
              if (screen) screen.dataset.transactionsShell = '';
            }
            function apply() {
              addStyle();
              patchTransactionNav();
              patchTransactionsPage();
              const form = document.getElementById('budget-form');
              if (!form) return;
              if (!form.querySelector('.budget-view-toggle')) form.insertAdjacentHTML('afterbegin', '<div class="budget-view-toggle" role="tablist" aria-label="Budget view"><button type="button" data-budget-view="planned">Planned</button><button type="button" data-budget-view="spent">Spent</button><button type="button" data-budget-view="remaining">Remaining</button></div><p class="budget-view-note"></p>');
              const active = mode();
              form.querySelectorAll('[data-budget-view]').forEach(button => button.classList.toggle('active', button.dataset.budgetView === active));
              const note = form.querySelector('.budget-view-note');
              if (note) note.textContent = noteText(active);
              updateLabels(active);
              updateIncomeRows(active);
              updateAssignedRows(active);
              updateSectionTotals(active);
              patchTrackingField();
            }
            document.addEventListener('click', event => {
              const transactionTab = event.target.closest('[data-edp-trans-nav]');
              if (transactionTab) {
                event.preventDefault();
                event.stopPropagation();
                document.body.dataset.debtwizardPage = 'transactions';
                const screen = document.getElementById('screen');
                if (screen) screen.dataset.transactionsShell = '';
                patchTransactionsPage();
                return;
              }
              const txType = event.target.closest('[data-edp-trans-type]');
              if (txType) { event.preventDefault(); showTransactionPopup(txType.dataset.edpTransType); return; }
              if (event.target.closest('[data-edp-trans-close]')) { event.preventDefault(); document.querySelector('.dw-tx-root')?.remove(); return; }
              const editButton = event.target.closest('[data-edp-act]');
              if (editButton) {
                activeEdit = { kind: editButton.dataset.kind || '', id: editButton.dataset.id || '', category: editButton.dataset.category || '' };
                setTimeout(patchTrackingField, 30);
                setTimeout(patchTrackingField, 120);
              }
              const saveButton = event.target.closest('[data-edp-save]');
              if (saveButton && document.querySelector('.edp-popup #edp-tracked')) {
                event.preventDefault();
                event.stopPropagation();
                event.stopImmediatePropagation();
                saveTrackedPopup(document.querySelector('.edp-popup'));
                return;
              }
              const txButton = event.target.closest('[data-edp-trans-add]');
              if (txButton) { event.preventDefault(); showTransactionPopup('expense'); return; }
              const button = event.target.closest('[data-budget-view]');
              if (button) { event.preventDefault(); save(button.dataset.budgetView); apply(); return; }
              if (event.target.closest('[data-act="nav"], .tab-btn, [data-act^="budget-month"]')) { clearTransactionPage(); setTimeout(apply, 80); }
            }, true);
            const screen = document.getElementById('screen');
            if (screen) new MutationObserver(() => setTimeout(apply, 0)).observe(screen, { childList: true, subtree: true });
            window.addEventListener('load', () => { setTimeout(apply, 80); setTimeout(apply, 450); });
            installTransactionKeyboardFix();
            setTimeout(apply, 0);
          })();
        <\/script></body>`);
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error(error);
        document.getElementById('loading').innerHTML = 'DebtWizard needs a refresh. Please reload this page once.';
      }
    })();
  </script>
</body>
</html>
