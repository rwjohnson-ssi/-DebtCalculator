<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>DebtWizard</title>
</head>
<body>
  <p id="loading" style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:40px 22px;color:#174a61">Opening DebtWizard…</p>
  <script>
    (async () => {
      try {
        const extra = location.search ? '&' + location.search.slice(1) : '';
        const response = await fetch(`mobile.html?v=36&runtime=${Date.now()}&strategyStyle=1${extra}`, { cache: 'no-store' });
        if (!response.ok) throw new Error('Unable to load mobile app shell.');
        let html = await response.text();
        html = html.replace(/paycheck-form-overlap-fix-v4\.js\?v=\d+/g, 'paycheck-form-overlap-fix-v4.js?v=27');
        html = html.replace('</body>', `<script>
          (() => {
            const KEY = 'debtwizard-budget-mode';
            const modes = ['planned','spent','remaining'];
            function mode() {
              try { const value = localStorage.getItem(KEY) || 'planned'; return modes.includes(value) ? value : 'planned'; }
              catch { return 'planned'; }
            }
            function save(value) { try { localStorage.setItem(KEY, modes.includes(value) ? value : 'planned'); } catch {} }
            function noteText(active) {
              if (active === 'spent') return 'Spent view selected. Row values will be connected in the next small update.';
              if (active === 'remaining') return 'Remaining view selected. Row values will be connected in the next small update.';
              return 'Planned view selected. Row values will be connected in the next small update.';
            }
            function apply() {
              const form = document.getElementById('budget-form');
              if (!form) return;
              if (!form.querySelector('.budget-view-toggle')) {
                form.insertAdjacentHTML('afterbegin', '<div class="budget-view-toggle" role="tablist" aria-label="Budget view"><button type="button" data-budget-view="planned">Planned</button><button type="button" data-budget-view="spent">Spent</button><button type="button" data-budget-view="remaining">Remaining</button></div><p class="budget-view-note"></p>');
              }
              const active = mode();
              form.querySelectorAll('[data-budget-view]').forEach(button => button.classList.toggle('active', button.dataset.budgetView === active));
              const note = form.querySelector('.budget-view-note');
              if (note) note.textContent = noteText(active);
            }
            document.addEventListener('click', event => {
              const button = event.target.closest('[data-budget-view]');
              if (button) { event.preventDefault(); save(button.dataset.budgetView); apply(); return; }
              if (event.target.closest('[data-act="nav"], .tab-btn, [data-act^="budget-month"]')) setTimeout(apply, 80);
            }, true);
            const screen = document.getElementById('screen');
            if (screen) new MutationObserver(() => setTimeout(apply, 0)).observe(screen, { childList: true, subtree: true });
            window.addEventListener('load', () => { setTimeout(apply, 80); setTimeout(apply, 450); });
            setTimeout(apply, 0);
          })();
        <\/script></body>`);
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error(error);
        document.getElementById('loading').innerHTML = 'DebtWizard needs a refresh. Please reload this page once.';
      }
    })();
  </script>
</body>
</html>
