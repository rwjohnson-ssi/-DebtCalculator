<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#cdeff4">
  <title>DebtWizard</title>
  <style>html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#eef3f5}#app-host{display:block;width:100%;height:100%;border:0;background:#eef3f5}</style>
</head>
<body>
  <iframe id="app-host" title="DebtWizard" src="mobile.html?v=81" allow="clipboard-read; clipboard-write"></iframe>
  <script src="transaction-core-v76.js?v=6"></script>
  <script src="transaction-list-v76.js?v=6"></script>
  <script src="transaction-alloc-v76.js?v=6"></script>
  <script src="transaction-edit-v76.js?v=6"></script>
  <script src="transaction-boot-v76.js?v=6"></script>
  <script>
    (() => {
      "use strict";
      const T = window.DWTx76;
      if (!T?.host) return;

      const ROUTE = "transactions";

      const install = () => {
        const doc = T.host.contentDocument;
        const win = doc?.defaultView;
        if (!doc?.body || !win || win.__nativeTransactionsRouteV81) return;
        win.__nativeTransactionsRouteV81 = true;

        const isTransactionControl = control => {
          if (!control?.matches?.("button,[role='button'],a")) return false;
          if (!control.closest("#dw-primary-nav,#tabbar")) return false;
          const page = String(control.dataset.page || "").trim().toLowerCase();
          const label = `${control.getAttribute("aria-label") || ""} ${control.textContent || ""}`
            .replace(/\s+/g, " ")
            .trim()
            .toLowerCase();
          return control.matches(".dw-nav-transaction,[data-edp-trans-add],[data-edp-trans-nav]")
            || page === "transaction"
            || page === ROUTE
            || /(^|\s)(add\s+)?transactions?(\s|$)/.test(label);
        };

        const findTransactionControl = () => [...doc.querySelectorAll("#dw-primary-nav button,#tabbar button,#dw-primary-nav [role='button'],#tabbar [role='button'],#dw-primary-nav a,#tabbar a")]
          .find(isTransactionControl) || null;

        const renderTransactions = fallbackButton => {
          const button = findTransactionControl() || fallbackButton || null;
          if (typeof T.renderTransactions === "function") T.renderTransactions(doc, button);
        };

        const openFromNativeRoute = button => {
          try {
            win.localStorage.setItem(T.PAGE_KEY, ROUTE);
            win.sessionStorage.setItem(T.PAGE_KEY, ROUTE);
          } catch {}
          [0, 60, 180].forEach(delay => win.setTimeout(() => renderTransactions(button), delay));
        };

        const normalize = () => {
          const controls = [...doc.querySelectorAll("#dw-primary-nav button,#tabbar button,#dw-primary-nav [role='button'],#tabbar [role='button'],#dw-primary-nav a,#tabbar a")]
            .filter(isTransactionControl);

          controls.forEach((control, index) => {
            if (index > 0 && control.closest("#tabbar") === controls[0]?.closest("#tabbar")) {
              control.remove();
              return;
            }

            control.classList.add("dw-nav-transaction");
            control.dataset.act = "nav";
            control.dataset.page = ROUTE;
            control.setAttribute("aria-label", "Transactions");
            control.removeAttribute("data-edp-trans-add");
            control.removeAttribute("data-edp-trans-nav");

            if (control.dataset.nativeTransactionsBound === "1") return;
            control.dataset.nativeTransactionsBound = "1";
            control.addEventListener("click", () => openFromNativeRoute(control));
          });
        };

        // The old transaction boot listener checks this function during capture.
        // Returning null allows the app's normal data-act="nav" handler to run.
        T.transactionButton = () => null;
        T.findTransactionButton = () => findTransactionControl();

        new MutationObserver(normalize).observe(doc.body, { childList:true, subtree:true });
        normalize();
      };

      T.host.addEventListener("load", install);
      install();
    })();
  </script>
</body>
</html>
