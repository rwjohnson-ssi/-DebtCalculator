<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#cdeff4">
  <title>DebtWizard</title>
  <style>
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#eef3f5}
    #app-host{display:block;width:100%;height:100%;border:0;background:#eef3f5}
  </style>
</head>
<body>
  <iframe id="app-host" title="DebtWizard" src="mobile.html?v=72" allow="clipboard-read; clipboard-write"></iframe>
  <script>
    (() => {
      "use strict";

      const host = document.getElementById("app-host");
      const STORE = "debt-calculator-v2";
      const PAGE_KEY = "debtwizard-active-page";
      const money = value => new Intl.NumberFormat("en-US", { style:"currency", currency:"USD" })
        .format(Number.isFinite(Number(value)) ? Number(value) : 0);
      const number = value => Number.isFinite(Number.parseFloat(String(value ?? "").replace(/[^0-9.-]/g, "")))
        ? Number.parseFloat(String(value ?? "").replace(/[^0-9.-]/g, "")) : 0;
      const cents = value => Math.max(0, Math.round((number(value) + Number.EPSILON) * 100) / 100);
      const esc = value => String(value ?? "").replace(/[&<>"']/g, char => ({
        "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
      }[char]));

      function monthKey(doc) {
        const text = doc.querySelector(".hero-title")?.textContent?.trim() || "";
        const months = {
          january:"01", february:"02", march:"03", april:"04", may:"05", june:"06",
          july:"07", august:"08", september:"09", october:"10", november:"11", december:"12"
        };
        const match = text.match(/^([A-Za-z]+)\s+(20\d{2})$/);
        if (match && months[match[1].toLowerCase()]) return `${match[2]}-${months[match[1].toLowerCase()]}`;
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
      }

      function loadBudget(doc) {
        let state = {};
        try { state = JSON.parse(doc.defaultView.localStorage.getItem(STORE)) || {}; }
        catch {}
        state.settings = state.settings && typeof state.settings === "object" ? state.settings : {};
        state.settings.monthlyBudgets = state.settings.monthlyBudgets && typeof state.settings.monthlyBudgets === "object"
          ? state.settings.monthlyBudgets : {};
        const month = monthKey(doc);
        const budget = state.settings.monthlyBudgets[month] || {};
        budget.transactions = Array.isArray(budget.transactions) ? budget.transactions : [];
        return { month, budget };
      }

      function dayLabel(value) {
        const date = /^\d{4}-\d{2}-\d{2}$/.test(String(value || ""))
          ? new Date(`${value}T12:00:00`) : new Date();
        return {
          month: date.toLocaleDateString("en-US", { month:"short" }),
          day: date.toLocaleDateString("en-US", { day:"numeric" })
        };
      }

      function monthLabel(value) {
        const [year, month] = String(value).split("-").map(Number);
        return new Date(year, month - 1, 1).toLocaleDateString("en-US", { month:"long", year:"numeric" });
      }

      function ensureStyles(doc) {
        if (doc.getElementById("dw-transaction-route-v72")) return;
        const style = doc.createElement("style");
        style.id = "dw-transaction-route-v72";
        style.textContent = `
          .dw-trans-page{min-height:calc(100vh - 74px);background:#f4f6f7;padding-bottom:118px;color:#172d38}
          .dw-trans-hero{background:linear-gradient(135deg,#cdeff4,#eafcfe);color:#0f516b;padding:calc(18px + env(safe-area-inset-top,0px)) 26px 22px;border-bottom:1px solid #b9e3ea}
          .dw-trans-top{display:grid;grid-template-columns:72px 1fr 72px;align-items:center;margin-bottom:15px}
          .dw-trans-title{text-align:center;font-size:1.12rem;font-weight:950}
          .dw-trans-search{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #d6e7ea;border-radius:12px;padding:11px 14px;color:#7c8d93;box-shadow:0 8px 20px rgba(15,81,107,.08)}
          .dw-trans-search input{width:100%;border:0;outline:0;background:transparent;color:#263137;font-size:1rem}
          .dw-trans-wrap{padding:26px}
          .dw-trans-card{margin-bottom:22px;overflow:hidden;background:#fff;border:1px solid #dce8eb;border-radius:20px;padding:18px;box-shadow:0 10px 26px rgba(15,81,107,.07)}
          .dw-deleted-row{width:100%;display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:12px;border:0;background:#fff;padding:2px;color:#1d3039;text-align:left;font:inherit;font-weight:900;font-size:1.02rem}
          .dw-deleted-row span:first-child,.dw-deleted-row span:last-child{color:#0f7893;font-size:1.45rem}
          .dw-month-title{margin-bottom:10px;color:#47555b;font-weight:900}
          .dw-tx-row{display:grid;grid-template-columns:54px minmax(0,1fr) auto;align-items:center;gap:14px;padding:14px 0;border-top:1px solid #edf1f2}
          .dw-tx-row:first-of-type{border-top:0}
          .dw-date-dot{width:50px;height:50px;display:grid;place-items:center;border:2px solid #e3eaed;border-radius:50%;color:#53646b;text-align:center;font-size:.72rem;font-weight:900;line-height:1.05}
          .dw-tx-name{display:block;color:#20272d;font-size:1.02rem;font-weight:850}
          .dw-tx-cat{display:block;margin-top:4px;color:#0f7893;font-size:.8rem;font-weight:800}
          .dw-tx-amount{color:#20272d;font-weight:900;white-space:nowrap}
          .dw-trans-empty{padding:46px 8px 72px}
          .dw-trans-empty h2{margin:0 0 14px;font-size:2rem;line-height:1.08}
          .dw-trans-empty p{margin:0 0 24px;color:#53646b;line-height:1.4}
          .dw-first-btn{width:100%;min-height:56px;border:0;border-radius:13px;background:linear-gradient(135deg,#0f7893,#27c7d8);color:#fff;font:inherit;font-weight:900}
          .dw-trans-fab{position:fixed;right:24px;bottom:calc(96px + env(safe-area-inset-bottom,0px));z-index:135;width:64px;height:64px;border:0;border-radius:50%;background:linear-gradient(135deg,#0f7893,#27c7d8);color:#fff;font-size:2.7rem;line-height:1;box-shadow:0 10px 28px rgba(0,35,62,.26)}
          .dw-trans-no-results{display:none;padding:24px;color:#68777d;text-align:center;font-weight:800}
          .dw-trans-no-results.show{display:block}
          .dw-tx-root{position:fixed;inset:0;z-index:1400}
          .dw-tx-backdrop{position:absolute;inset:0;background:rgba(8,22,29,.35);backdrop-filter:blur(2px)}
          .dw-tx-sheet{position:absolute;left:0;right:0;bottom:0;max-height:94vh;overflow:auto;background:#f4f6f7;border-radius:30px 30px 0 0;box-shadow:0 -24px 60px rgba(0,35,62,.25)}
          .dw-tx-sheet-head{background:linear-gradient(135deg,#087b96,#27bfd2);color:#fff;border-radius:30px 30px 0 0;padding:12px 26px 20px}
          .dw-tx-grabber{width:54px;height:6px;border-radius:999px;background:rgba(255,255,255,.48);margin:0 auto 18px}
          .dw-tx-head-row{display:grid;grid-template-columns:82px 1fr 82px;align-items:center;font-weight:850}
          .dw-tx-head-row strong{text-align:center;font-size:1.1rem}
          .dw-tx-link{border:0;background:transparent;color:#fff;font-size:1rem;text-align:left}
          .dw-tx-done{text-align:right;opacity:.58}
          .dw-tx-done.dw-save-ready{opacity:1;cursor:pointer;pointer-events:auto}
          .dw-tx-toggle{display:grid;grid-template-columns:1fr 1fr;background:rgba(0,83,105,.46);border-radius:11px;margin-top:18px;overflow:hidden}
          .dw-tx-toggle button{border:0;background:transparent;color:#fff;padding:10px;font-size:1rem;font-weight:800}
          .dw-tx-toggle button.active{background:rgba(255,255,255,.22);box-shadow:inset 0 0 0 2px rgba(255,255,255,.24)}
          .dw-tx-body{padding:26px}
          .dw-tx-panel{background:#fff;border-radius:20px;padding:0 26px;margin-bottom:26px}
          .dw-tx-field{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.1fr);gap:14px;align-items:center;min-height:72px;border-bottom:1px solid #e6ebee}
          .dw-tx-field:last-child{border-bottom:0}
          .dw-tx-field span{font-size:1.05rem;color:#1f272d}
          .dw-tx-field input{width:100%;min-width:0;border:0;outline:0;text-align:right;color:#0079a8;font-size:1.05rem;background:transparent}
          .dw-tx-account{display:block;padding:17px 0 20px}
          .dw-tx-account strong{display:block;font-size:1.05rem;color:#1f272d}
          .dw-tx-account small{display:block;margin-top:6px;line-height:1.3;color:#4f5d63;font-size:.94rem}
          .dw-tx-budget-row{border:0;width:100%;background:#fff;border-radius:20px;margin-bottom:26px;display:flex;align-items:center;justify-content:space-between;padding:21px 26px;font-size:1.05rem;color:#1f272d}
          .dw-tx-budget-row em{font-style:normal;color:#0079a8;font-weight:850}
          .dw-tx-note{box-sizing:border-box;width:100%;min-height:86px;border:0;border-radius:18px;background:#fff;padding:22px 26px;font-size:1.05rem;resize:none;outline:0}
          .dw-direct-split{overflow:hidden;margin:0 0 12px;border:1px solid #dce8eb;border-radius:20px;background:#fff;box-shadow:0 8px 22px rgba(15,81,107,.06)}
          .dw-direct-split-row{display:grid;grid-template-columns:32px minmax(0,1fr) 116px;align-items:center;gap:11px;min-height:64px;padding:0 16px;border-bottom:1px solid #e6edef}
          .dw-direct-split-row:last-of-type{border-bottom:0}
          .dw-direct-split-remove{width:28px;height:28px;border:0;border-radius:50%;background:#dc4d45;color:#fff;font-size:1.15rem;line-height:1}
          .dw-direct-split-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#24414d;font-weight:850}
          .dw-direct-split-input{box-sizing:border-box;width:100%;min-width:0;min-height:44px;border:0;border-radius:10px;background:#f3f8fa;padding:8px;color:#087f9a;text-align:right;font-size:1rem;font-weight:850;outline:0}
          .dw-direct-split-summary{padding:13px 16px;background:#075f87;color:#fff;text-align:center;font-weight:900}
          .dw-direct-split-summary.over{background:#b8443d}
          .dw-direct-selector{position:fixed;inset:0;z-index:1700;display:flex;flex-direction:column;background:#f4f7f8;color:#173f50}
          .dw-direct-selector-head{padding:calc(14px + env(safe-area-inset-top,0px)) 18px 14px;background:linear-gradient(135deg,#087b96,#27bfd2);color:#fff}
          .dw-direct-selector-top{display:grid;grid-template-columns:78px 1fr 78px;align-items:center}
          .dw-direct-selector-top strong{text-align:center;font-size:1.08rem}
          .dw-direct-selector-top button{border:0;background:transparent;color:#fff;padding:10px 0;font:inherit;font-weight:850}
          .dw-direct-selector-top button:last-child{text-align:right}
          .dw-direct-selector-search{display:flex;align-items:center;gap:9px;margin-top:12px;padding:11px 13px;border-radius:12px;background:#fff;color:#87969c}
          .dw-direct-selector-search input{width:100%;border:0;outline:0;background:transparent;font-size:1rem}
          .dw-direct-selector-body{flex:1;overflow:auto;padding:20px 18px calc(30px + env(safe-area-inset-bottom,0px))}
          .dw-direct-selector-note{margin:0 0 14px;color:#63747b;line-height:1.35}
          .dw-direct-selector-list{overflow:hidden;border:1px solid #dce8eb;border-radius:20px;background:#fff;box-shadow:0 10px 28px rgba(22,43,52,.06)}
          .dw-direct-selector-item{width:100%;min-height:64px;display:grid;grid-template-columns:32px minmax(0,1fr) auto;align-items:center;gap:12px;border:0;border-bottom:1px solid #e7edef;background:#fff;padding:12px 16px;color:#26363d;text-align:left;font:inherit}
          .dw-direct-selector-item:last-child{border-bottom:0}
          .dw-direct-selector-item.selected{background:#eefafd}
          .dw-direct-selector-check{width:26px;height:26px;display:grid;place-items:center;border:2px solid #9fb2b9;border-radius:8px;color:transparent;font-weight:900}
          .dw-direct-selector-item.selected .dw-direct-selector-check{border-color:#0c91ad;background:#0c91ad;color:#fff}
          .dw-direct-selector-item strong{font-weight:850}
          .dw-direct-selector-item small{color:#68777d}
          .dw-direct-selector-empty{padding:24px;color:#6f7d82;text-align:center}
          @media(min-width:900px){.dw-trans-page{padding-bottom:40px}.dw-trans-fab{bottom:28px}.dw-tx-sheet{left:50%;right:auto;width:min(680px,calc(100vw - 40px));transform:translateX(-50%);border-radius:30px;bottom:24px}.dw-direct-selector-body{width:min(720px,calc(100% - 40px));margin:auto}}
        `;
        doc.head.appendChild(style);
      }

      function transactionNavButton(target) {
        const button = target?.closest?.("#dw-primary-nav button,#tabbar button");
        if (!button) return null;
        const text = `${button.getAttribute("aria-label") || ""} ${button.textContent || ""}`.replace(/\s+/g, " ").trim().toLowerCase();
        return button.matches(".dw-nav-transaction,[data-edp-trans-nav]") || text === "transactions" || text.endsWith(" transactions")
          ? button : null;
      }

      function markActive(doc, button) {
        const nav = button?.closest("#dw-primary-nav,#tabbar");
        nav?.querySelectorAll(".active").forEach(item => item.classList.remove("active"));
        button?.classList.add("active");
      }

      function transactionRows(items) {
        return items.map(item => {
          const date = dayLabel(item.date);
          const allocations = Array.isArray(item.allocations) ? item.allocations : [];
          const category = allocations.map(entry => entry.budgetItemName || entry.name).filter(Boolean).join(", ")
            || item.budgetItemName || item.category || "Unassigned";
          return `<div class="dw-tx-row">
            <span class="dw-date-dot">${esc(date.month)}<br>${esc(date.day)}</span>
            <span><span class="dw-tx-name">${esc(item.merchant || item.source || "Transaction")}</span><span class="dw-tx-cat">${esc(category)}</span></span>
            <span class="dw-tx-amount">${item.type === "income" ? "+" : "-"}${money(Math.max(0, number(item.amount)))}</span>
          </div>`;
        }).join("");
      }

      function renderTransactions(doc, activeButton) {
        const screen = doc.getElementById("screen");
        if (!screen) return;
        ensureStyles(doc);
        const { month, budget } = loadBudget(doc);
        const transactions = [...budget.transactions].sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")));
        screen.dataset.transactionsShell = "1";
        doc.body.dataset.debtwizardPage = "transactions";
        screen.innerHTML = `<section class="dw-trans-page">
          <header class="dw-trans-hero">
            <div class="dw-trans-top"><span></span><div class="dw-trans-title">Transactions</div><span></span></div>
            <label class="dw-trans-search"><span>⌕</span><input type="search" placeholder="Search transactions" aria-label="Search transactions"></label>
          </header>
          <main class="dw-trans-wrap">
            <article class="dw-trans-card"><button type="button" class="dw-deleted-row"><span>♲</span><span>Deleted</span><span>›</span></button></article>
            ${transactions.length
              ? `<article class="dw-trans-card"><div class="dw-month-title">${esc(monthLabel(month))}</div>${transactionRows(transactions)}<div class="dw-trans-no-results">No transactions match your search.</div></article>`
              : `<section class="dw-trans-empty"><h2>Track your first transaction</h2><p>Enter an expense or income transaction and assign it to the correct budget item.</p><button type="button" class="dw-first-btn" data-edp-trans-add>Track My First Transaction</button></section>`}
          </main>
          <button type="button" class="dw-trans-fab" data-edp-trans-add aria-label="Add transaction">+</button>
        </section>`;
        markActive(doc, activeButton);
        const search = screen.querySelector(".dw-trans-search input");
        search?.addEventListener("input", () => {
          const query = search.value.trim().toLowerCase();
          let visible = 0;
          screen.querySelectorAll(".dw-tx-row").forEach(row => {
            const matches = !query || row.textContent.toLowerCase().includes(query);
            row.hidden = !matches;
            if (matches) visible += 1;
          });
          screen.querySelector(".dw-trans-no-results")?.classList.toggle("show", Boolean(query) && visible === 0);
        });
      }

      function showTransactionPopup(doc, type = "expense") {
        ensureStyles(doc);
        doc.querySelector(".dw-tx-root")?.remove();
        const activeType = type === "income" ? "income" : "expense";
        const root = doc.createElement("div");
        root.className = "dw-tx-root";
        root.innerHTML = `<div class="dw-tx-backdrop" data-edp-trans-close></div>
          <section class="dw-tx-sheet" role="dialog" aria-modal="true" aria-label="Add Transaction" data-budget-items="[]">
            <header class="dw-tx-sheet-head">
              <div class="dw-tx-grabber"></div>
              <div class="dw-tx-head-row"><button class="dw-tx-link" type="button" data-edp-trans-close>Cancel</button><strong>Add Transaction</strong><span class="dw-tx-link dw-tx-done" role="button" tabindex="-1" aria-disabled="true">Done</span></div>
              <div class="dw-tx-toggle"><button type="button" class="${activeType === "expense" ? "active" : ""}" data-edp-trans-type="expense">− Expense</button><button type="button" class="${activeType === "income" ? "active" : ""}" data-edp-trans-type="income">+ Income</button></div>
            </header>
            <main class="dw-tx-body">
              <section class="dw-tx-panel">
                <label class="dw-tx-field"><span>Date</span><input type="date" value="${new Date().toISOString().slice(0, 10)}"></label>
                <label class="dw-tx-field"><span>Amount</span><input type="number" min="0" step="0.01" inputmode="decimal" placeholder="$0.00"></label>
                <label class="dw-tx-field"><span>${activeType === "income" ? "Source" : "Merchant"}</span><input type="text" maxlength="80" placeholder="Name"></label>
                <div class="dw-tx-account"><strong>Account</strong><small>No bank connection required. Transactions are entered manually and stored locally in this browser.</small></div>
              </section>
              <button type="button" class="dw-tx-budget-row"><span>Budget Item(s)</span><em>Select ›</em></button>
              <section class="dw-tx-panel"><label class="dw-tx-field"><span>Check #</span><input type="text" inputmode="numeric" placeholder="0000"></label></section>
              <textarea class="dw-tx-note" placeholder="Add a Note"></textarea>
            </main>
          </section>`;
        doc.body.appendChild(root);
      }

      function sheetType(sheet) {
        return sheet.querySelector('[data-edp-trans-type="income"].active') ? "income" : "expense";
      }

      function sheetAmount(sheet) {
        const field = [...sheet.querySelectorAll(".dw-tx-field")]
          .find(item => item.querySelector("span")?.textContent?.trim() === "Amount");
        const input = field?.querySelector("input");
        return cents(input?.dataset.rawValue || input?.value);
      }

      function selectedItems(sheet) {
        try {
          const parsed = JSON.parse(sheet.dataset.budgetItems || "[]");
          return Array.isArray(parsed)
            ? parsed.map(item => ({
                id:String(item.id || item.budgetItemId || ""),
                name:String(item.name || item.budgetItemName || "Budget item"),
                amount:cents(item.amount)
              })).filter(item => item.id)
            : [];
        } catch {
          return [];
        }
      }

      function writeSelectedItems(sheet, items) {
        sheet.dataset.budgetItems = JSON.stringify(items.map(item => ({
          id:String(item.id),
          name:String(item.name),
          amount:cents(item.amount)
        })));
        sheet.dataset.dwAllocationCount = String(items.length);
      }

      function evenlySplit(total, count) {
        if (!count) return [];
        const totalCents = Math.round(cents(total) * 100);
        const base = Math.floor(totalCents / count);
        let remainder = totalCents - base * count;
        return Array.from({ length:count }, () => {
          const value = base + (remainder > 0 ? 1 : 0);
          remainder = Math.max(0, remainder - 1);
          return value / 100;
        });
      }

      function removeCompetingControls(doc, sheet) {
        doc.querySelector(".dw-selector,.dw-selector-fallback")?.remove();
        sheet?.querySelector(".dw-tx-selected-items")?.remove();
        sheet?.querySelector(".dw-tx-selected-fallback")?.remove();
        sheet?.querySelector(".dw-tx-split-summary")?.remove();
      }

      function updateSplitSummary(sheet) {
        const items = selectedItems(sheet);
        const total = sheetAmount(sheet);
        const assigned = cents(items.reduce((sum, item) => sum + cents(item.amount), 0));
        const difference = Math.round((total - assigned) * 100) / 100;
        const summary = sheet.querySelector(".dw-direct-split-summary");
        if (summary) {
          summary.classList.toggle("over", difference < -0.004);
          summary.textContent = difference < -0.004
            ? `${money(Math.abs(difference))} Over Assigned`
            : `${money(Math.max(0, difference))} Left to Split`;
        }
        const ready = total > 0.004 && items.length > 0 && Math.abs(difference) <= 0.004;
        const done = sheet.querySelector(".dw-tx-done");
        if (done) {
          done.classList.toggle("dw-save-ready", ready);
          done.setAttribute("aria-disabled", ready ? "false" : "true");
          done.setAttribute("tabindex", ready ? "0" : "-1");
        }
      }

      function renderSplitItems(doc, sheet) {
        removeCompetingControls(doc, sheet);
        sheet.querySelector(".dw-direct-split")?.remove();
        const items = selectedItems(sheet);
        const budgetButton = sheet.querySelector(".dw-tx-budget-row");
        const action = budgetButton?.querySelector("em");
        if (action) action.textContent = items.length ? "Add another ›" : "Select ›";
        if (!items.length || !budgetButton) {
          updateSplitSummary(sheet);
          return;
        }

        const panel = doc.createElement("section");
        panel.className = "dw-direct-split";
        panel.innerHTML = `${items.map(item => `
          <label class="dw-direct-split-row" data-dw-direct-split-id="${esc(item.id)}">
            <button type="button" class="dw-direct-split-remove" data-dw-direct-split-remove="${esc(item.id)}" aria-label="Remove ${esc(item.name)}">−</button>
            <strong class="dw-direct-split-name">${esc(item.name)}</strong>
            <input class="dw-direct-split-input" type="number" min="0" step="0.01" inputmode="decimal" value="${item.amount > 0.004 ? item.amount.toFixed(2) : ""}" placeholder="0.00" aria-label="${esc(item.name)} split amount">
          </label>`).join("")}
          <div class="dw-direct-split-summary"></div>`;
        budgetButton.insertAdjacentElement("beforebegin", panel);
        updateSplitSummary(sheet);
      }

      function budgetChoices(doc, sheet) {
        let state = {};
        try { state = JSON.parse(doc.defaultView.localStorage.getItem(STORE)) || {}; }
        catch {}
        const dateField = [...sheet.querySelectorAll(".dw-tx-field")]
          .find(item => item.querySelector("span")?.textContent?.trim() === "Date")?.querySelector("input");
        const month = /^\d{4}-\d{2}-\d{2}$/.test(dateField?.value || "")
          ? dateField.value.slice(0, 7) : monthKey(doc);
        const budget = state.settings?.monthlyBudgets?.[month] || {};
        const source = sheetType(sheet) === "income" ? budget.incomeItems : budget.bills;
        return (Array.isArray(source) ? source : [])
          .map(item => ({
            id:String(item.id || ""),
            name:String(item.name || (sheetType(sheet) === "income" ? "Income" : "Budget item")),
            planned:cents(item.amount)
          }))
          .filter(item => item.id && item.name);
      }

      function openBudgetSelector(doc, sheet) {
        ensureStyles(doc);
        removeCompetingControls(doc, sheet);
        doc.querySelector(".dw-direct-selector")?.remove();

        const choices = budgetChoices(doc, sheet);
        const existing = new Map(selectedItems(sheet).map(item => [item.id, item]));
        const selected = new Set(existing.keys());
        const originalIds = [...selected].sort().join("|");
        const overlay = doc.createElement("section");
        overlay.className = "dw-direct-selector";
        overlay.setAttribute("role", "dialog");
        overlay.setAttribute("aria-modal", "true");
        overlay.setAttribute("aria-label", "Select budget items");

        const paint = () => {
          overlay.innerHTML = `
            <header class="dw-direct-selector-head">
              <div class="dw-direct-selector-top">
                <button type="button" data-dw-direct-selector-cancel>Cancel</button>
                <strong>Select Budget Items</strong>
                <button type="button" data-dw-direct-selector-done>Done</button>
              </div>
              <label class="dw-direct-selector-search"><span>⌕</span><input type="search" placeholder="Search budget items" aria-label="Search budget items"></label>
            </header>
            <main class="dw-direct-selector-body">
              <p class="dw-direct-selector-note">Choose one item to apply the full amount, or choose multiple items to split the transaction.</p>
              <div class="dw-direct-selector-list">
                ${choices.length ? choices.map(item => `
                  <button type="button" class="dw-direct-selector-item${selected.has(item.id) ? " selected" : ""}" data-dw-direct-selector-item="${esc(item.id)}">
                    <span class="dw-direct-selector-check">✓</span>
                    <strong>${esc(item.name)}</strong>
                    <small>${money(item.planned)}</small>
                  </button>`).join("") : '<div class="dw-direct-selector-empty">No budget items are available for this month.</div>'}
              </div>
            </main>`;

          overlay.querySelector("input[type=search]")?.addEventListener("input", event => {
            const query = event.target.value.trim().toLowerCase();
            overlay.querySelectorAll("[data-dw-direct-selector-item]").forEach(row => {
              row.hidden = Boolean(query) && !row.textContent.toLowerCase().includes(query);
            });
          });
        };

        overlay.addEventListener("click", event => {
          const itemButton = event.target.closest("[data-dw-direct-selector-item]");
          if (itemButton) {
            const id = itemButton.dataset.dwDirectSelectorItem;
            selected.has(id) ? selected.delete(id) : selected.add(id);
            paint();
            return;
          }
          if (event.target.closest("[data-dw-direct-selector-cancel]")) {
            overlay.remove();
            return;
          }
          if (event.target.closest("[data-dw-direct-selector-done]")) {
            const next = choices.filter(item => selected.has(item.id)).map(item => ({
              id:item.id,
              name:item.name,
              amount:existing.get(item.id)?.amount || 0
            }));
            const total = sheetAmount(sheet);
            const changed = [...selected].sort().join("|") !== originalIds;
            if (next.length === 1) {
              next[0].amount = total;
            } else if (next.length > 1 && changed) {
              const amounts = evenlySplit(total, next.length);
              next.forEach((item, index) => { item.amount = amounts[index]; });
            }
            writeSelectedItems(sheet, next);
            overlay.remove();
            renderSplitItems(doc, sheet);
            sheet.dispatchEvent(new Event("change", { bubbles:true }));
          }
        });

        paint();
        doc.body.appendChild(overlay);
      }

      function installSplitController(doc) {
        const win = doc.defaultView;
        if (win.__dwDirectTransactionSplitV72) return;
        win.__dwDirectTransactionSplitV72 = true;

        win.addEventListener("click", event => {
          const budgetButton = event.target.closest?.(".dw-tx-budget-row");
          if (budgetButton) {
            const sheet = budgetButton.closest(".dw-tx-sheet");
            if (!sheet) return;
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
            openBudgetSelector(doc, sheet);
            return;
          }

          const removeButton = event.target.closest?.("[data-dw-direct-split-remove]");
          if (removeButton) {
            const sheet = removeButton.closest(".dw-tx-sheet");
            if (!sheet) return;
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
            const id = removeButton.dataset.dwDirectSplitRemove;
            const next = selectedItems(sheet).filter(item => item.id !== id);
            if (next.length === 1) next[0].amount = sheetAmount(sheet);
            writeSelectedItems(sheet, next);
            renderSplitItems(doc, sheet);
            sheet.dispatchEvent(new Event("change", { bubbles:true }));
          }
        }, true);

        win.addEventListener("input", event => {
          const sheet = event.target.closest?.(".dw-tx-sheet");
          if (!sheet) return;

          const splitInput = event.target.closest(".dw-direct-split-input");
          if (splitInput) {
            const row = splitInput.closest("[data-dw-direct-split-id]");
            const next = selectedItems(sheet).map(item => item.id === row?.dataset.dwDirectSplitId
              ? { ...item, amount:cents(splitInput.value) } : item);
            writeSelectedItems(sheet, next);
            updateSplitSummary(sheet);
            return;
          }

          const amountField = event.target.closest(".dw-tx-field");
          if (amountField?.querySelector("span")?.textContent?.trim() === "Amount") {
            const next = selectedItems(sheet);
            if (next.length === 1) {
              next[0].amount = sheetAmount(sheet);
              writeSelectedItems(sheet, next);
              renderSplitItems(doc, sheet);
            } else {
              updateSplitSummary(sheet);
            }
          }
        }, true);
      }

      function install(doc) {
        const win = doc.defaultView;
        if (!doc.body || win.__dwTransactionRouteV72) return;
        win.__dwTransactionRouteV72 = true;
        installSplitController(doc);

        doc.addEventListener("click", event => {
          const navButton = transactionNavButton(event.target);
          if (navButton) {
            event.preventDefault();
            event.stopImmediatePropagation();
            try {
              win.localStorage.setItem(PAGE_KEY, "transactions");
              win.sessionStorage.setItem(PAGE_KEY, "transactions");
            } catch {}
            renderTransactions(doc, navButton);
            return;
          }

          const add = event.target.closest?.("[data-edp-trans-add]");
          if (add) {
            event.preventDefault();
            event.stopPropagation();
            showTransactionPopup(doc, "expense");
            return;
          }

          const type = event.target.closest?.("[data-edp-trans-type]");
          if (type) {
            event.preventDefault();
            showTransactionPopup(doc, type.dataset.edpTransType);
            return;
          }

          if (event.target.closest?.("[data-edp-trans-close]")) {
            event.preventDefault();
            doc.querySelector(".dw-tx-root")?.remove();
            return;
          }

          const otherNav = event.target.closest?.("#dw-primary-nav button,#tabbar button,[data-dw-more-page]");
          if (otherNav) {
            delete doc.body.dataset.debtwizardPage;
            const screen = doc.getElementById("screen");
            if (screen) screen.dataset.transactionsShell = "";
          }
        }, true);
      }

      host.addEventListener("load", () => {
        try { install(host.contentDocument); }
        catch (error) { console.error("Transactions navigation could not be installed.", error); }
      });
    })();
  </script>
</body>
</html>
