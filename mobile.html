<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#d8f4f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>DebtWizard</title>
  <style>
    :root{--navy:#0d5069;--teal:#21b8d3;--teal-dark:#087895;--mint:#dcf6f8;--line:#dcebed;--ink:#344248;--muted:#7c8c92;--green:#26914c;--red:#d9534f;--yellow:#ffc942;--bg:#f7fbfc}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}button,input,select{font:inherit}button{cursor:pointer}#app{min-height:100dvh;padding-bottom:88px}.hero{padding:22px 18px 26px;background:linear-gradient(180deg,#c9eff4,#e8fbfc);border-bottom:1px solid #d4eef1}.hero h1{margin:0;color:var(--navy);font-size:2.35rem;letter-spacing:-.06em;line-height:1;font-weight:900}.hero p{margin:8px 0 0;color:#18566d;font-size:1rem}.page{max-width:700px;margin:0 auto}.content{padding:16px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 7px 16px rgba(16,72,91,.05)}.summary{display:grid;grid-template-columns:1.1fr .9fr;gap:10px}.summary-primary{padding:15px;border-radius:17px;color:#fff;background:linear-gradient(135deg,#087895,#37c7df)}.summary-primary span{display:block;color:#e7fdff;font-size:.76rem}.summary-primary b{display:block;margin:6px 0 3px;font-size:1.72rem;letter-spacing:-.05em}.summary-primary small{color:#e8fdff}.mini-grid{display:grid;gap:10px}.mini{padding:11px;border-radius:15px}.mini span{display:block;color:var(--muted);font-size:.76rem}.mini b{display:block;margin-top:4px;font-size:1.1rem}.status{margin:14px 0;padding:12px 13px;border-radius:13px;font-weight:800}.status.positive{color:#187341;border:1px solid #caebd5;background:#effaf3}.status.warn{color:#9b3b36;border:1px solid #f1c9c5;background:#fff2f1}.section{margin-top:18px}.section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.section h2{margin:0;color:var(--navy);font-size:1.5rem;letter-spacing:-.045em}.section p{margin:5px 0 0;color:var(--muted);font-size:.83rem;line-height:1.35}.button{min-height:43px;border:0;border-radius:12px;padding:0 14px;color:#fff;background:linear-gradient(135deg,#16afc9,#4ad0e3);font-weight:900;box-shadow:0 7px 16px rgba(21,176,201,.18)}.button.secondary{color:#126f87;border:1px solid #bfe7ee;background:#ecfbfd;box-shadow:none}.button.danger{color:#ae443d;border:1px solid #f3c4bf;background:#fff1ef;box-shadow:none}.rows{overflow:hidden}.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;padding:13px 14px;border-bottom:1px solid #e8f0f1}.row:last-child{border-bottom:0}.row-name{min-width:0;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row-sub{display:block;margin-top:4px;color:var(--muted);font-size:.74rem}.row-value{font-weight:900;text-align:right;white-space:nowrap}.row button{border:0;background:transparent;text-align:left;padding:0;color:inherit}.debt-card{margin-bottom:10px;padding:14px;border-left:3px solid var(--yellow)}.debt-top{display:flex;align-items:center;justify-content:space-between;gap:9px}.debt-title{font-size:1.05rem;font-weight:900}.pill{display:inline-block;padding:4px 7px;border-radius:8px;color:#13738b;background:#e6f9fc;font-size:.68rem;font-weight:900}.debt-metrics{display:grid;grid-template-columns:1.25fr .8fr .8fr;gap:8px;margin-top:13px}.metric span{display:block;color:var(--muted);font-size:.69rem}.metric b{display:block;margin-top:4px;font-size:.98rem}.nav{position:fixed;z-index:100;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(6,minmax(0,1fr));height:78px;padding:7px 2px calc(7px + env(safe-area-inset-bottom,0px));border-top:1px solid #e0e8ea;background:rgba(255,255,255,.97);backdrop-filter:blur(9px)}.nav button{display:grid;place-items:center;gap:3px;min-width:0;border:0;color:#94a0a4;background:transparent;font-size:.59rem;font-weight:800}.nav .icon{font-size:1.25rem;line-height:1}.nav button.active{color:var(--teal-dark)}.tabs{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));margin:14px 0;border:1px solid #b9e4eb;border-radius:12px;overflow:hidden;background:#eafafb}.tabs button{min-height:40px;border:0;color:#48727d;background:transparent;font-weight:850}.tabs button.active{color:#0a637a;background:#fff;box-shadow:0 2px 8px rgba(18,112,137,.12)}.budget-summary{margin-top:-4px}.budget-row{display:grid;grid-template-columns:minmax(0,1fr) 92px;gap:10px;align-items:center;padding:12px 14px;border-bottom:1px solid #e8f0f1}.budget-row:last-child{border-bottom:0}.budget-row input{width:100%;min-height:40px;padding:7px 9px;border:1px solid #d5e3e6;border-radius:10px;font-size:16px;font-weight:800;text-align:right}.budget-row small{display:block;margin-top:4px;color:var(--muted)}.month-nav{display:grid;grid-template-columns:40px minmax(0,1fr) 40px;gap:8px;align-items:center;margin-top:15px}.month-nav button{height:40px;border:1px solid #bce7ed;border-radius:50%;color:#0e728b;background:#fff;font-size:1.5rem}.month-nav div{padding:10px;border:1px solid #bce7ed;border-radius:12px;color:var(--navy);background:#ffffffad;font-weight:900;text-align:center}.modal-backdrop{position:fixed;z-index:200;inset:0;display:flex;align-items:flex-end;background:rgba(24,50,59,.55)}.modal{width:min(100%,700px);max-height:90dvh;overflow:auto;padding:20px 20px calc(24px + env(safe-area-inset-bottom,0px));border-radius:26px 26px 0 0;background:#fff}.modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px}.modal h2{margin:0;font-size:1.35rem}.close{width:36px;height:36px;border:0;color:#77878d;background:transparent;font-size:2rem;line-height:1}.form{display:grid;gap:13px;margin-top:15px}.field{display:grid;gap:6px;color:#617076;font-size:.82rem;font-weight:850}.field input,.field select{min-height:48px;padding:10px 11px;border:1px solid #d6e2e5;border-radius:12px;color:var(--ink);background:#fff;font-size:16px;font-weight:750}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.empty{padding:28px 15px;text-align:center;color:var(--muted)}.empty b{display:block;margin-bottom:7px;color:var(--navy);font-size:1.2rem}.chart{padding:13px}.bar{height:10px;overflow:hidden;border-radius:999px;background:#e6eef0}.bar i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,#15b4ce,#46cfe1)}.footnote{margin:12px 0 0;color:#87969a;font-size:.74rem;line-height:1.4}@media(min-width:560px){.modal-backdrop{align-items:center;justify-content:center;padding:18px}.modal{border-radius:22px}}@media(max-width:390px){.content{padding:13px}.hero{padding-left:14px;padding-right:14px}.debt-metrics{gap:5px}.metric b{font-size:.9rem}.nav button{font-size:.54rem}}
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="modal-root"></div>
  <script>
  (() => {
    const DATA_KEY='debt-calculator-v2', BUDGET_KEY='debtwizard-simple-budget-v1';
    const money=new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'});
    const n=v=>Number.isFinite(parseFloat(v))?parseFloat(v):0;
    const c=v=>Math.round((n(v)+Number.EPSILON)*100)/100;
    const id=p=>`${p}-${Date.now()}-${Math.random().toString(36).slice(2,7)}`;
    const esc=v=>String(v??'').replace(/[&<>'"]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[x]));
    const monthKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const monthLabel=k=>new Date(`${k}-01T12:00:00`).toLocaleDateString('en-US',{month:'long',year:'numeric'});
    const shiftMonth=(k,delta)=>{const [y,m]=k.split('-').map(Number);return monthKey(new Date(y,m-1+delta,1));};
    const read=(key,fallback)=>{try{return JSON.parse(localStorage.getItem(key))||fallback}catch{return fallback}};
    let state=normalize(read(DATA_KEY,{debts:[],payments:[],settings:{}}));
    let page='home', budgetView='planned', budgetMonth=monthKey(new Date());
    function normalize(raw){return {debts:Array.isArray(raw.debts)?raw.debts:[],payments:Array.isArray(raw.payments)?raw.payments:[],settings:{strategy:raw.settings?.strategy||'snowball',extra:Math.max(0,n(raw.settings?.extra)),...raw.settings}}}
    function save(){localStorage.setItem(DATA_KEY,JSON.stringify(state));}
    function active(){return state.debts.filter(d=>n(d.balance)>0.004)}
    function minimums(){return c(active().reduce((s,d)=>s+Math.max(0,n(d.minimum)),0))}
    function totalDebt(){return c(active().reduce((s,d)=>s+n(d.balance),0))}
    function nextDue(d){const now=new Date(),day=Math.max(1,Math.min(28,Math.floor(n(d.dueDay))||1));let x=new Date(now.getFullYear(),now.getMonth(),day);if(x<new Date(now.getFullYear(),now.getMonth(),now.getDate()))x=new Date(now.getFullYear(),now.getMonth()+1,day);return x}
    function debtOrder(){const items=[...active()];return state.settings.strategy==='avalanche'?items.sort((a,b)=>n(b.apr)-n(a.apr)||n(a.balance)-n(b.balance)):items.sort((a,b)=>n(a.balance)-n(b.balance)||n(b.apr)-n(a.apr))}
    function projectedMonths(){let bal=totalDebt(),payment=minimums()+Math.max(0,n(state.settings.extra));if(!bal||payment<=0)return null;let weighted=active().reduce((s,d)=>s+n(d.balance)*n(d.apr),0)/(bal||1)/100/12;let months=0;while(bal>0.01&&months<600){bal=Math.max(0,bal+(bal*weighted)-payment);months++}return months}
    function budget(){const all=read(BUDGET_KEY,{months:{}});if(!all.months[budgetMonth])all.months[budgetMonth]={income:[],categories:defaults(),spent:{}};localStorage.setItem(BUDGET_KEY,JSON.stringify(all));return {all,month:all.months[budgetMonth]}}
    function defaults(){return ['Giving','Emergency Fund','Rent / Mortgage','Utilities','Groceries','Dining Out','Fuel','Insurance','Personal','Subscriptions','Miscellaneous'].map(name=>({id:id('cat'),name,planned:0}))}
    function setBudget(fn){const x=budget();fn(x.month);x.all.months[budgetMonth]=x.month;localStorage.setItem(BUDGET_KEY,JSON.stringify(x.all));}
    function budgetNumbers(){const b=budget().month;const income=c(b.income.reduce((s,x)=>s+n(x.amount),0));const plan=c(b.categories.reduce((s,x)=>s+n(x.planned),0)+minimums()+n(state.settings.extra));const spent=c(Object.values(b.spent||{}).reduce((s,x)=>s+n(x),0));return {income,plan,spent,remaining:c(income-spent),left:c(income-plan)}}
    function hero(title,sub,extra=''){return `<header class="hero"><div class="page"><h1>${title}</h1><p>${sub}</p>${extra}</div></header>`}
    function nav(){const items=[['home','⌂','Home'],['debts','◔','Debts'],['budget','▦','Budget'],['strategy','✦','Strategy'],['plan','▤','Plan'],['track','✓','Track']];return `<nav class="nav">${items.map(x=>`<button data-page="${x[0]}" class="${page===x[0]?'active':''}"><span class="icon">${x[1]}</span><span>${x[2]}</span></button>`).join('')}</nav>`}
    function home(){const months=projectedMonths();return hero('Your plan','A clear view of your debt-free path.')+`<main class="page content"><section class="summary"><div class="summary-primary"><span>Total debt</span><b>${money.format(totalDebt())}</b><small>${active().length} active ${active().length===1?'debt':'debts'}</small></div><div class="mini-grid"><div class="card mini"><span>Minimums</span><b>${money.format(minimums())}</b></div><div class="card mini"><span>Debt-free</span><b>${months?`${months} mo`:'—'}</b></div></div></section><div class="status ${totalDebt()?'positive':'positive'}">${totalDebt()?`Focus debt: ${esc(debtOrder()[0]?.name||'Add a debt to begin')}`:'You are debt-free in this plan.'}</div><section class="section"><div class="section-head"><div><h2>This month</h2><p>Keep the monthly plan in one place.</p></div><button class="button secondary" data-page="budget">Budget</button></div><div class="card rows"><div class="row"><span><span class="row-name">Minimum payments</span><span class="row-sub">Across active debts</span></span><span class="row-value">${money.format(minimums())}</span></div><div class="row"><span><span class="row-name">Extra payoff</span><span class="row-sub">From Strategy</span></span><span class="row-value">${money.format(n(state.settings.extra))}</span></div></div></section></main>`}
    function debts(){const cards=active().length?debtOrder().map((d,i)=>`<article class="card debt-card"><div class="debt-top"><div><div class="debt-title">${esc(d.name||'Unnamed debt')}</div><span class="pill">${esc(d.category||'Debt')}</span></div><button class="button secondary" data-edit-debt="${esc(d.id)}">Edit</button></div><div class="debt-metrics"><div class="metric"><span>Balance</span><b>${money.format(n(d.balance))}</b></div><div class="metric"><span>Minimum</span><b>${money.format(n(d.minimum))}</b></div><div class="metric"><span>APR</span><b>${n(d.apr).toFixed(2)}%</b></div></div>${i===0?'<div class="pill" style="margin-top:12px;background:#fff0c2;color:#825d00">Current focus</div>':''}</article>`).join(''):'<div class="card empty"><b>No debts yet</b>Add your first debt to start tracking balances and payoff progress.</div>';return hero('Debts','Manage all of your debts in one place.')+`<main class="page content"><section class="section" style="margin-top:0"><div class="section-head"><div><h2>Debts (${active().length})</h2><p>Balances, minimums, and APR.</p></div><button class="button" data-action="add-debt">＋ Add</button></div>${cards}</section></main>`}
    function budgetPage(){const x=budgetNumbers(),b=budget().month;const value=budgetView==='planned'?x.plan:budgetView==='spent'?x.spent:x.remaining;const title=budgetView==='planned'?'Planned outflow':budgetView==='spent'?'Spent so far':'Remaining to spend';const rows=b.categories.map(cat=>{const planned=n(cat.planned),spent=n(b.spent?.[cat.id]),shown=budgetView==='planned'?planned:budgetView==='spent'?spent:Math.max(0,planned-spent);return `<div class="budget-row"><span><b>${esc(cat.name)}</b><small>${budgetView==='planned'?'Planned':budgetView==='spent'?'Spent':'Remaining'}</small></span><input data-budget-value="${esc(cat.id)}" data-budget-mode="${budgetView}" inputmode="decimal" value="${shown||''}" placeholder="0.00"></div>`}).join('');return hero('Budget','Give every dollar a job.',`<div class="month-nav"><button data-budget-month="-1">‹</button><div>${monthLabel(budgetMonth)}</div><button data-budget-month="1">›</button></div>`)+`<main class="page content budget-summary"><div class="tabs"><button data-budget-view="planned" class="${budgetView==='planned'?'active':''}">Planned</button><button data-budget-view="spent" class="${budgetView==='spent'?'active':''}">Spent</button><button data-budget-view="remaining" class="${budgetView==='remaining'?'active':''}">Remaining</button></div><section class="summary"><div class="summary-primary"><span>${title}</span><b>${money.format(value)}</b><small>Planned income ${money.format(x.income)}</small></div><div class="mini-grid"><div class="card mini"><span>Debt payments</span><b>${money.format(minimums()+n(state.settings.extra))}</b></div><div class="card mini"><span>${budgetView==='planned'?'Left to budget':budgetView==='spent'?'Income less spent':'Budget left'}</span><b>${money.format(budgetView==='planned'?x.left:budgetView==='spent'?x.remaining:Math.max(0,x.plan-x.spent))}</b></div></div></section><div class="status ${x.left>=0?'positive':'warn'}">${x.left>=0?`${money.format(x.left)} left to budget`:`${money.format(-x.left)} over budget`}</div><section class="section"><div class="section-head"><div><h2>Income</h2><p>Add the money you expect this month.</p></div><button class="button secondary" data-action="add-income">+ Income</button></div><div class="card rows">${b.income.length?b.income.map(i=>`<div class="budget-row"><span><b>${esc(i.name)}</b><small>Planned income</small></span><input data-income-value="${esc(i.id)}" inputmode="decimal" value="${n(i.amount)||''}" placeholder="0.00"></div>`).join(''):'<div class="empty">No income added for this month.</div>'}</div></section><section class="section"><div class="section-head"><div><h2>Monthly plan</h2><p>Debt payments are added automatically from DebtWizard.</p></div><button class="button secondary" data-action="add-category">+ Item</button></div><div class="card">${rows}<div class="budget-row"><span><b>Debt payments</b><small>Minimums + extra payment</small></span><strong>${money.format(minimums()+n(state.settings.extra))}</strong></div></div></section></main>`}
    function strategy(){return hero('Strategy','Optimize your payoff plan.')+`<main class="page content"><section class="card" style="padding:15px"><div class="section-head"><div><h2>Extra payment priority</h2><p>Select the method that sends extra money to a debt first.</p></div></div><div class="tabs"><button data-strategy="snowball" class="${state.settings.strategy==='snowball'?'active':''}">Snowball</button><button data-strategy="avalanche" class="${state.settings.strategy==='avalanche'?'active':''}">Avalanche</button><button data-action="set-extra" class="active">Extra</button></div><div class="runtime-debt" style="margin-top:14px;padding:12px;border:1px solid #cdebf0;border-radius:12px;background:#effbfd;color:#52727c"><b>${state.settings.strategy==='avalanche'?'Debt Avalanche':'Debt Snowball'}</b><br>${state.settings.strategy==='avalanche'?'Prioritizes the highest APR first.':'Prioritizes the smallest balance first.'}<br><br>Extra payment: <b>${money.format(n(state.settings.extra))}</b></div></section><section class="section"><div class="section-head"><div><h2>Paycheck funding</h2><p>Use your actual pay rhythm for planning.</p></div><button class="button secondary" data-action="paycheck">Set up</button></div><div class="card rows"><div class="row"><span><span class="row-name">Funding frequency</span><span class="row-sub">${esc(state.settings.fundingFrequency||'Monthly')}</span></span><span class="row-value">${money.format(n(state.settings.paycheckAmount))}</span></div></div></section></main>`}
    function plan(){const ordered=debtOrder(),months=projectedMonths();return hero('Payoff plan','Your step-by-step debt-free path.')+`<main class="page content"><section class="summary"><div class="summary-primary"><span>Projected debt-free</span><b>${months?`${months} mo`:'—'}</b><small>${money.format(minimums()+n(state.settings.extra))} monthly plan</small></div><div class="card mini"><span>Total interest is estimated</span><b>${money.format(0)}</b></div></section><section class="section"><div class="section-head"><div><h2>Payoff order</h2><p>${state.settings.strategy==='avalanche'?'Highest APR first':'Lowest balance first'}</p></div></div><div class="card rows">${ordered.length?ordered.map((d,i)=>`<div class="row"><span><span class="row-name">Step ${i+1} · ${esc(d.name)}</span><span class="row-sub">${money.format(n(d.balance))} balance · ${n(d.apr).toFixed(2)}% APR</span></span><span class="row-value">${i===0?'Focus':'Minimum'}</span></div>`).join(''):'<div class="empty">Add a debt to build your payoff plan.</div>'}</div></section></main>`}
    function track(){const upcoming=active().map(d=>({d,date:nextDue(d)})).sort((a,b)=>a.date-b.date);return hero('Tracking','Track upcoming debt payments.')+`<main class="page content"><section class="section" style="margin-top:0"><div class="section-head"><div><h2>Upcoming</h2><p>Tap a payment to mark it complete.</p></div></div><div class="card rows">${upcoming.length?upcoming.map(x=>`<button class="row" data-action="record-payment" data-id="${esc(x.d.id)}"><span><span class="row-name">${esc(x.d.name)}</span><span class="row-sub">Due ${x.date.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span></span><span class="row-value">${money.format(n(x.d.minimum))} ›</span></button>`).join(''):'<div class="empty">No upcoming payments yet.</div>'}</div></section><p class="footnote">Estimates only. Always follow the creditor’s actual due date and payment requirements.</p></main>`}
    function render(){const pages={home,debts,budget:budgetPage,strategy,plan,track};document.getElementById('app').innerHTML=(pages[page]||home)()+nav();}
    function modal(title,body){document.getElementById('modal-root').innerHTML=`<div class="modal-backdrop"><section class="modal"><div class="modal-head"><h2>${esc(title)}</h2><button class="close" data-action="close-modal">×</button></div>${body}</section></div>`}
    function debtModal(existing){const d=existing||{name:'',category:'Credit Card',balance:'',apr:'',minimum:'',dueDay:1,creditLimit:''};modal(existing?'Edit debt':'Add a debt',`<form class="form" id="debt-form"><label class="field">Lender / account name<input name="name" value="${esc(d.name)}" required placeholder="Example: Bank of America"></label><label class="field">Category<select name="category">${['Credit Card','Auto Loan','Personal Loan','Medical','Student Loan','Other'].map(x=>`<option ${x===d.category?'selected':''}>${x}</option>`).join('')}</select></label><div class="form-grid"><label class="field">Current balance<input name="balance" type="number" step=".01" inputmode="decimal" value="${n(d.balance)||''}" required></label><label class="field">APR (%)<input name="apr" type="number" step=".01" inputmode="decimal" value="${n(d.apr)||''}" required></label></div><div class="form-grid"><label class="field">Minimum payment<input name="minimum" type="number" step=".01" inputmode="decimal" value="${n(d.minimum)||''}" required></label><label class="field">Due day<input name="dueDay" type="number" min="1" max="28" inputmode="numeric" value="${n(d.dueDay)||1}" required></label></div><label class="field">Credit limit <span style="font-weight:500">optional</span><input name="creditLimit" type="number" step=".01" inputmode="decimal" value="${n(d.creditLimit)||''}"></label><button class="button" type="submit">${existing?'Save debt':'Add debt'}</button>${existing?'<button class="button danger" type="button" data-action="delete-debt" data-id="'+esc(existing.id)+'">Delete debt</button>':''}</form>`)}
    function incomeModal(){modal('Add income',`<form class="form" id="income-form"><label class="field">Income name<input name="name" placeholder="Example: Paycheck" required></label><label class="field">Amount expected this month<input name="amount" type="number" step=".01" inputmode="decimal" required></label><button class="button" type="submit">Add income</button></form>`)}
    function categoryModal(){modal('Add budget item',`<form class="form" id="category-form"><label class="field">Budget item<input name="name" placeholder="Example: Restaurants" required></label><label class="field">Planned amount<input name="amount" type="number" step=".01" inputmode="decimal" required></label><button class="button" type="submit">Add item</button></form>`)}
    document.addEventListener('click',e=>{const p=e.target.closest('[data-page]');if(p){page=p.dataset.page;render();return}const s=e.target.closest('[data-strategy]');if(s){state.settings.strategy=s.dataset.strategy;save();render();return}const v=e.target.closest('[data-budget-view]');if(v){budgetView=v.dataset.budgetView;render();return}const bm=e.target.closest('[data-budget-month]');if(bm){budgetMonth=shiftMonth(budgetMonth,n(bm.dataset.budgetMonth));render();return}const edit=e.target.closest('[data-edit-debt]');if(edit){debtModal(state.debts.find(d=>d.id===edit.dataset.editDebt));return}const a=e.target.closest('[data-action]');if(!a)return;const act=a.dataset.action;if(act==='add-debt')debtModal();if(act==='close-modal')document.getElementById('modal-root').innerHTML='';if(act==='add-income')incomeModal();if(act==='add-category')categoryModal();if(act==='set-extra'){const x=prompt('Monthly extra payment amount',String(n(state.settings.extra)));if(x!==null){state.settings.extra=Math.max(0,n(x));save();render()}}if(act==='paycheck'){const f=prompt('Funding frequency: Monthly, Twice monthly, or Bi-weekly',state.settings.fundingFrequency||'Monthly');if(f!==null){state.settings.fundingFrequency=f;const x=prompt('Amount set aside per paycheck',String(n(state.settings.paycheckAmount)));state.settings.paycheckAmount=Math.max(0,n(x));save();render()}}if(act==='record-payment'){const d=state.debts.find(x=>x.id===a.dataset.id);if(!d)return;const x=prompt(`Record payment to ${d.name}`,String(n(d.minimum)));if(x!==null){const amount=Math.max(0,n(x));d.balance=Math.max(0,c(n(d.balance)-amount));state.payments.push({id:id('pay'),debtId:d.id,amount,date:new Date().toISOString().slice(0,10)});save();render()}}if(act==='delete-debt'){state.debts=state.debts.filter(d=>d.id!==a.dataset.id);save();document.getElementById('modal-root').innerHTML='';render()}});
    document.addEventListener('submit',e=>{if(e.target.id==='debt-form'){e.preventDefault();const v=Object.fromEntries(new FormData(e.target).entries());const existing=state.debts.find(d=>d.id===e.target.dataset.id);const target=existing||{id:id('debt')};Object.assign(target,{name:v.name,category:v.category,balance:c(v.balance),apr:c(v.apr),minimum:c(v.minimum),dueDay:Math.max(1,Math.min(28,Math.floor(n(v.dueDay)||1)),creditLimit:c(v.creditLimit)});if(!existing)state.debts.push(target);save();document.getElementById('modal-root').innerHTML='';render()}if(e.target.id==='income-form'){e.preventDefault();const v=Object.fromEntries(new FormData(e.target).entries());setBudget(b=>b.income.push({id:id('income'),name:v.name,amount:c(v.amount)}));document.getElementById('modal-root').innerHTML='';render()}if(e.target.id==='category-form'){e.preventDefault();const v=Object.fromEntries(new FormData(e.target).entries());setBudget(b=>b.categories.push({id:id('cat'),name:v.name,planned:c(v.amount)}));document.getElementById('modal-root').innerHTML='';render()}});
    document.addEventListener('input',e=>{const id1=e.target.dataset.incomeValue,id2=e.target.dataset.budgetValue;if(!id1&&!id2)return;setBudget(b=>{if(id1){const x=b.income.find(i=>i.id===id1);if(x)x.amount=c(e.target.value)}if(id2){const x=b.categories.find(i=>i.id===id2);if(!x)return;if(e.target.dataset.budgetMode==='planned')x.planned=c(e.target.value);if(e.target.dataset.budgetMode==='spent'){b.spent=b.spent||{};b.spent[id2]=c(e.target.value)}})});
    render();
  })();
  </script>
</body>
</html>
