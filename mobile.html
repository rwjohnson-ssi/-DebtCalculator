<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#cdeff4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>DebtWizard</title>
  <link rel="stylesheet" href="styles-v2.css?v=11">
  <link rel="stylesheet" href="styles-v3.css?v=11">
  <link rel="stylesheet" href="strategy-visual-refresh-v1.css?v=1">
  <link rel="stylesheet" href="debt-entry-compact-v1.css?v=1">
  <link rel="stylesheet" href="strategy-faq-v1.css?v=1">
  <style>
    .budget-edit-backdrop{position:fixed;z-index:89;inset:0;background:rgba(16,35,43,.42);backdrop-filter:blur(2px)}
    .budget-add-bill.budget-edit-popup{position:fixed!important;z-index:90;left:14px;right:14px;top:50%;bottom:auto!important;transform:translateY(-50%);max-height:min(78vh,690px);overflow:auto;border-radius:24px!important;background:#fff!important;box-shadow:0 22px 60px rgba(15,45,58,.32)!important;border:1px solid rgba(15,81,107,.1)!important;padding:20px!important;margin:0!important}
    .budget-add-bill.budget-edit-popup::before{content:"";display:block;width:44px;height:5px;border-radius:999px;background:#d2dade;margin:0 auto 14px}
    .budget-add-bill.budget-edit-popup .budget-card-title{font-size:1.42rem;text-align:center;margin-bottom:14px}
    .budget-add-bill.budget-edit-popup .budget-edit-actions{position:sticky;bottom:0;background:#fff;padding-top:10px}
    .budget-add-bill.budget-edit-popup .budget-edit-actions .btn{min-height:48px}
    .budget-bill-row{cursor:pointer}.budget-bill-row:active{transform:scale(.997)}.budget-bill-amount small{font-weight:850}.budget-note-field textarea{min-height:86px}
  </style>
</head>
<body>
  <div id="app-shell">
    <main id="screen" aria-live="polite"></main>
    <nav id="tabbar" class="tabbar" aria-label="Primary navigation"></nav>
  </div>
  <div id="modal-root"></div>
  <input id="backup-input" type="file" accept="application/json,.json" hidden>
  <script src="track-v3.js?v=11"></script>
  <script src="track-v4.js?v=18"></script>
  <script src="modal-fix.js?v=12"></script>
  <script src="paycheck-planner-v1.js?v=18"></script>
  <script src="paycheck-timing-guide-v2.js?v=19"></script>
  <script src="paycheck-funding-sync-v1.js?v=18"></script>
  <script src="paycheck-track-open-v1.js?v=18"></script>
  <script src="paycheck-form-layout-fix-v3.js?v=20"></script>
  <script src="paycheck-form-overlap-fix-v4.js?v=21"></script>
  <script src="debt-entry-mobile-v2.js?v=17"></script>
  <script src="amortization-v1.js?v=11"></script>
  <script src="transaction-details-v1.js?v=11"></script>
  <script src="utilization-v1.js?v=12"></script>
  <script src="utilization-reference-v3.js?v=15"></script>
  <script src="utilization-detail-fix-v4.js?v=16"></script>
  <script src="bootstrap-v2.js?v=23" defer></script>
  <script src="strategy-faq-v1.js?v=1" defer></script>
  <script>
    (() => {
      const closeBudgetPopup = () => document.querySelector('.budget-add-bill.budget-edit-popup [data-act="close-budget-bill"]')?.click();
      const syncBudgetPopup = () => {
        const editor = [...document.querySelectorAll('.budget-add-bill')].find(card => card.querySelector('.budget-edit-actions'));
        document.querySelectorAll('.budget-add-bill.budget-edit-popup').forEach(card => { if (card !== editor) card.classList.remove('budget-edit-popup'); });
        let backdrop = document.querySelector('.budget-edit-backdrop');
        if (editor) {
          editor.classList.add('budget-edit-popup');
          if (!backdrop) {
            backdrop = document.createElement('button');
            backdrop.type = 'button';
            backdrop.className = 'budget-edit-backdrop';
            backdrop.setAttribute('aria-label', 'Close budget item editor');
            backdrop.addEventListener('click', closeBudgetPopup);
            document.body.appendChild(backdrop);
          }
        } else if (backdrop) {
          backdrop.remove();
        }
      };
      new MutationObserver(syncBudgetPopup).observe(document.body, { childList: true, subtree: true });
      document.addEventListener('click', () => setTimeout(syncBudgetPopup, 0));
      document.addEventListener('keyup', event => { if (event.key === 'Escape') closeBudgetPopup(); });
      window.addEventListener('load', syncBudgetPopup);
    })();
  </script>
</body>
</html>
