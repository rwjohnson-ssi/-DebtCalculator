    .edp-cat-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:8px}.edp-cat-title{font-size:1.14rem;font-weight:900;color:#263137}.edp-cat-total{font-weight:900;color:#58666c}.edp-item-row{width:100%;border:0;background:#fff;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;text-align:left;padding:13px 0;border-bottom:1px solid var(--line,#e5ecee)}.edp-item-row:last-of-type{border-bottom:0}.edp-item-row strong{display:block;color:#263137;font-size:1rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.edp-item-row small{display:block;color:#8a979d;font-size:.78rem;margin-top:3px}.edp-amount{text-align:right;font-size:1.05rem;font-weight:900;color:#263137}.edp-amount small{display:block;color:#0f7893;font-size:.72rem;font-weight:850;margin-top:3px}.edp-add{border:0;background:transparent;color:#0079a8;font-size:1rem;font-weight:800;padding:13px 0 0;text-align:left}.edp-empty{color:#8a979d;font-size:.9rem;line-height:1.35;margin:8px 0}.edp-hidden{display:none!important}.edp-field{display:grid;grid-template-columns:minmax(0,1fr) 148px;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line,#e5ecee)}.edp-field span{color:#59666b;font-size:1rem;font-weight:800}.edp-field input,.edp-field select{width:100%;min-height:44px;border:1px solid #dce6e8;border-radius:12px;padding:9px 10px;color:#334449;background:#fff;text-align:right;font-size:16px;font-weight:850}.edp-field select{text-align:left}.edp-note{display:grid;gap:7px;padding:12px 0}.edp-note span{color:#59666b;font-size:1rem;font-weight:800}.edp-note textarea{width:100%;min-height:88px;border:1px solid #dce6e8;border-radius:12px;padding:10px;color:#334449;background:#fff;font-size:16px;font-weight:700;resize:vertical}.edp-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;position:sticky;bottom:0;background:#fff;padding-top:12px}.edp-actions .danger{grid-column:1 / -1}.edp-actions .btn{min-height:48px}.edp-actions .secondary{background:#eaf9fc;color:#0f7893}.edp-actions .danger{background:#fff0ef;color:#bd4337;border:1px solid #ffd3cf}
    .edp-due-select button,.legacy-due-button{width:100%;min-height:44px;border:1px solid #dce6e8;border-radius:12px;background:#fff;color:#0079a8;text-align:right;font-size:16px;font-weight:900;padding:9px 10px}.edp-date-popup{position:fixed;z-index:120;inset:0;background:#f6f7f8;padding:18px 14px calc(20px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column;overflow:auto}.edp-date-popup::before{content:"";width:44px;height:5px;border-radius:999px;background:#9ea8ad;margin:8px auto 12px}.edp-date-top{position:relative;text-align:center;font-size:1.26rem;font-weight:900;color:#222;margin-bottom:20px}.edp-date-close{position:absolute;right:4px;top:-12px;border:0;background:transparent;color:#222;font-size:2.5rem;line-height:1;padding:8px}.edp-date-card{background:#fff;border-radius:18px;box-shadow:0 10px 28px rgba(25,43,52,.08);overflow:hidden}.edp-date-row{width:100%;border:0;background:#fff;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;text-align:left;padding:17px 18px;font-size:1.05rem;color:#1f2b31}.edp-date-row.open{background:#eaf6ff}.edp-date-value{color:#0079a8;font-weight:800}.edp-calendar{padding:22px 18px 18px;border-top:1px solid #e5ecee}.edp-cal-title{margin:0 0 18px;color:#20272c;font-size:1.85rem;line-height:1;font-weight:900}.edp-week,.edp-days{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;align-items:center}.edp-week span{color:#566168;font-size:.92rem;font-weight:700;padding:8px 0}.edp-day{height:44px;border:0;border-radius:999px;background:transparent;color:#0079a8;font-size:1.2rem;font-weight:800}.edp-day.selected{background:#004a75;color:#fff}.edp-day.blank{visibility:hidden}.edp-switch-row{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:12px;padding:17px 18px;border-top:1px solid #e5ecee}.edp-switch-row strong{display:block;font-size:1.04rem;color:#222}.edp-switch-row small{display:block;margin-top:3px;color:#444;font-size:.9rem;line-height:1.2}.edp-switch{width:52px;height:31px;border:0;border-radius:999px;background:#b8c1c6;position:relative}.edp-switch::after{content:"";position:absolute;width:27px;height:27px;left:2px;top:2px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.18)}.edp-switch.on{background:#004a75}.edp-switch.on::after{left:23px}.edp-date-save{margin-top:auto;width:100%;min-height:58px;border:0;border-radius:13px;background:#004a75;color:#fff;font-size:1.22rem;font-weight:900}.edp-date-save:disabled{background:#9fb3c2;color:#edf4f7}

  <script>
    (() => {
      const closeBudgetPopup = () => document.querySelector('.budget-add-bill.budget-edit-popup [data-act="close-budget-bill"]')?.click();
      const syncBudgetPopup = () => {
        const editor = [...document.querySelectorAll('.budget-add-bill')].find(card => card.querySelector('.budget-edit-actions'));
        document.querySelectorAll('.budget-add-bill.budget-edit-popup').forEach(card => { if (card !== editor) card.classList.remove('budget-edit-popup'); });
        let backdrop = document.querySelector('.budget-edit-backdrop');
        if (editor) {
          editor.classList.add('budget-edit-popup');
          if (!backdrop) {
            backdrop = document.createElement('button');
            backdrop.type = 'button';
            backdrop.className = 'budget-edit-backdrop';
            backdrop.setAttribute('aria-label', 'Close budget item editor');
            backdrop.addEventListener('click', closeBudgetPopup);
            document.body.appendChild(backdrop);
          }
        } else if (backdrop) {
          backdrop.remove();
        }
      };
      new MutationObserver(syncBudgetPopup).observe(document.body, { childList: true, subtree: true });
      document.addEventListener('click', () => setTimeout(syncBudgetPopup, 0));
      document.addEventListener('keyup', event => { if (event.key === 'Escape') closeBudgetPopup(); });
      window.addEventListener('load', syncBudgetPopup);
    })();
  </script>
  <script>
    (() => {
      const STORE = 'debt-calculator-v2';
      const incomeTypes = [['paycheck','Paycheck'],['secondPaycheck','Second paycheck'],['sideIncome','Side income'],['otherIncome','Other income']];
      const categories = [['housing','Housing'],['utilities','Utilities'],['food','Food'],['transportation','Transportation'],['insurance','Insurance'],['subscriptions','Subscriptions'],['savings','Savings'],['giving','Giving'],['personal','Personal'],['other','Other']];
      const incomeLabels = Object.fromEntries(incomeTypes);
      const categoryLabels = Object.fromEntries(categories);
      const esc = value => String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
      const num = value => Number.isFinite(Number.parseFloat(value)) ? Number.parseFloat(value) : 0;
      const money = value => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(num(value));
      const uid = () => `item-${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`;
      const monthNames = { january:'01', february:'02', march:'03', april:'04', may:'05', june:'06', july:'07', august:'08', september:'09', october:'10', november:'11', december:'12' };
      const thisMonth = () => { const date = new Date(); return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`; };
      const selectedMonth = () => {
        const text = document.querySelector('.hero-title')?.textContent?.trim() || '';
        const match = text.match(/^([A-Za-z]+)\s+(20\d{2})$/);
        return match && monthNames[match[1].toLowerCase()] ? `${match[2]}-${monthNames[match[1].toLowerCase()]}` : thisMonth();
      };
      const monthParts = () => selectedMonth().split('-').map(Number);
      const monthLabel = () => { const [year, month] = monthParts(); return new Date(year, month - 1, 1).toLocaleDateString('en-US', { month:'long', year:'numeric' }); };
      const dueSuffix = day => { const value = Math.max(1, Math.min(31, Math.floor(num(day)) || 1)); const suffix = value % 10 === 1 && value % 100 !== 11 ? 'st' : value % 10 === 2 && value % 100 !== 12 ? 'nd' : value % 10 === 3 && value % 100 !== 13 ? 'rd' : 'th'; return `${value}${suffix}`; };
      const fullDueLabel = day => day ? `${new Date(monthParts()[0], monthParts()[1] - 1, Math.max(1, num(day))).toLocaleDateString('en-US',{month:'long'})} ${dueSuffix(day)}` : 'Select Date';
      const load = () => { try { return JSON.parse(localStorage.getItem(STORE)) || {}; } catch { return {}; } };
      const saveState = state => localStorage.setItem(STORE, JSON.stringify(state));
      const cleanIncomeItems = items => Array.isArray(items) ? items.map(item => ({ id:String(item.id||uid()), name:String(item.name||'').trim(), type:incomeLabels[item.type] ? item.type : 'otherIncome', amount:Math.max(0,num(item.amount)), payDay:Math.max(0,Math.min(31,Math.floor(num(item.payDay ?? item.dueDay)))), note:String(item.note||'') })).filter(item => item.name && item.amount > .004) : [];
      const cleanBills = bills => Array.isArray(bills) ? bills.map(item => ({ id:String(item.id||uid()), name:String(item.name||'').trim(), category:categoryLabels[item.category] ? item.category : 'other', amount:Math.max(0,num(item.amount)), dueDay:Math.max(0,Math.min(31,Math.floor(num(item.dueDay)))), note:String(item.note||'') })).filter(item => item.name && item.amount > .004) : [];
      const firstDay = value => String(value || '').split(/[,\s]+/).map(item => Math.floor(num(item))).find(day => day >= 1 && day <= 31) || 0;
      function ensureBudget(state) {
        state.settings = state.settings && typeof state.settings === 'object' ? state.settings : {};
        state.settings.monthlyBudgets = state.settings.monthlyBudgets && typeof state.settings.monthlyBudgets === 'object' ? state.settings.monthlyBudgets : {};
        const month = selectedMonth();
        const budget = state.settings.monthlyBudgets[month] || (state.settings.monthlyBudgets[month] = { incomeSources:{}, budgetCategories:{}, bills:[], schedule:{ buffer:0, income:{}, budget:{} } });
        budget.incomeSources = budget.incomeSources && typeof budget.incomeSources === 'object' ? budget.incomeSources : {};
        budget.budgetCategories = budget.budgetCategories && typeof budget.budgetCategories === 'object' ? budget.budgetCategories : {};
        budget.bills = cleanBills(budget.bills);
        const defaultIncomeItems = incomeTypes.map(([key,label]) => ({ id: uid(), name: label, type: key, amount: Math.max(0,num(budget.incomeSources[key])), payDay: firstDay(budget.schedule?.income?.[key]), note: '' })).filter(item => item.amount > .004);
        budget.incomeItems = cleanIncomeItems(Array.isArray(budget.incomeItems) ? budget.incomeItems : defaultIncomeItems).map(item => item.payDay ? item : { ...item, payDay: firstDay(budget.schedule?.income?.[item.type]) });
        const movedCategories = [];
        categories.forEach(([key,label]) => {
          const amount = Math.max(0,num(budget.budgetCategories[key]));
          if (amount > .004 && !budget.bills.some(item => item.category === key && item.name === label)) movedCategories.push({ id: uid(), name: label, category: key, amount, dueDay: 0, note: '' });
        });
        if (movedCategories.length) budget.bills = cleanBills([...budget.bills, ...movedCategories]);
        syncTotals(state, budget);
        return { state, budget, month };
      }
      function syncTotals(state, budget) {
        const incomeSources = Object.fromEntries(incomeTypes.map(([key]) => [key, 0]));
        budget.incomeItems = cleanIncomeItems(budget.incomeItems);
        (budget.incomeItems || []).forEach(item => { const key = incomeLabels[item.type] ? item.type : 'otherIncome'; incomeSources[key] += Math.max(0,num(item.amount)); });
        budget.incomeSources = incomeSources;
        budget.budgetCategories = Object.fromEntries(categories.map(([key]) => [key, 0]));
        budget.bills = cleanBills(budget.bills);
        budget.schedule = budget.schedule && typeof budget.schedule === 'object' ? budget.schedule : { buffer:0, income:{}, budget:{} };
        budget.schedule.income = Object.fromEntries(incomeTypes.map(([key]) => [key, budget.incomeItems.filter(item => item.type === key && item.payDay > 0).map(item => item.payDay).join(', ')]));
        state.settings.incomeSources = incomeSources;
        state.settings.budgetCategories = budget.budgetCategories;
        state.settings.budgetBills = budget.bills;
        state.settings.budgetSchedule = budget.schedule;
      }
      const sectionByTitle = title => [...document.querySelectorAll('.section')].find(section => (section.querySelector('.section-title')?.textContent || '').trim().startsWith(title));
      const hiddenInputs = (prefix, values) => Object.entries(values).map(([key,value]) => `<input type="hidden" name="${prefix}-${key}" value="${num(value)}">`).join('');
      const itemRow = (item, kind) => `<button type="button" class="edp-item-row" data-edp-act="edit" data-kind="${kind}" data-id="${esc(item.id)}"><span><strong>${esc(item.name)}</strong><small>${kind === 'income' ? `${incomeLabels[item.type] || 'Income'}${item.payDay ? ` · Pay ${fullDueLabel(item.payDay)}` : ''}` : `${categoryLabels[item.category] || 'Other'}${item.dueDay ? ` · Due ${item.dueDay}` : ''}`}${item.note ? ` · ${esc(item.note)}` : ''}</small></span><span class="edp-amount">${money(item.amount)}<small>Edit ›</small></span></button>`;
      function renderEnhancements() {
        const budgetForm = document.getElementById('budget-form');
        if (!budgetForm || !document.querySelector('.tab-btn.active[data-page="budget"]')) return;
        const { state, budget } = ensureBudget(load());
        saveState(state);
        const incomeSection = sectionByTitle('Income');
        if (incomeSection && !incomeSection.dataset.edpPatched) {
          incomeSection.dataset.edpPatched = '1';
          incomeSection.querySelector('.budget-section-total')?.replaceChildren(document.createTextNode(money((budget.incomeItems || []).reduce((sum,item)=>sum+num(item.amount),0))));
          const card = incomeSection.querySelector('.budget-card');
          if (card) card.innerHTML = `${hiddenInputs('income', budget.incomeSources)}${(budget.incomeItems || []).length ? budget.incomeItems.map(item => itemRow(item,'income')).join('') : '<p class="edp-empty">Add paychecks, side income, or other money coming in.</p>'}<button type="button" class="edp-add" data-edp-act="add" data-kind="income">Add income</button>`;
        }
        const assignedSection = sectionByTitle('Assigned categories');
        if (assignedSection && !assignedSection.dataset.edpPatched) {
          assignedSection.dataset.edpPatched = '1';
          const categoryCards = categories.map(([key,label]) => {
            const items = budget.bills.filter(item => item.category === key);
            const total = items.reduce((sum,item)=>sum+num(item.amount),0);
            return `<article class="edp-card"><div class="edp-cat-head"><span class="edp-cat-title">${label}</span><span class="edp-cat-total">${money(total)}</span></div>${items.length ? items.map(item => itemRow(item,'expense')).join('') : '<p class="edp-empty">No items yet.</p>'}<button type="button" class="edp-add" data-edp-act="add" data-kind="expense" data-category="${key}">Add item</button></article>`;
          }).join('');
          assignedSection.innerHTML = `<div class="section-head"><h2 class="section-title" style="margin:0">Assigned categories</h2><span class="budget-section-total">${money(budget.bills.reduce((sum,item)=>sum+num(item.amount),0))}</span></div>${hiddenInputs('budget', budget.budgetCategories)}${categoryCards}`;
        }
        const billsSection = sectionByTitle('Bills');
        if (billsSection) billsSection.classList.add('edp-hidden');
        const cashFlowSection = sectionByTitle('Cash-flow schedule');
        const incomeDatesCard = [...(cashFlowSection?.querySelectorAll('.budget-card') || [])].find(card => (card.querySelector('.budget-card-title')?.textContent || '').trim() === 'Income dates');
        incomeDatesCard?.remove();
      }
      function openDueDatePicker(currentDay, onSave, title = 'Due Date') {
        let selectedDay = Math.max(0, Math.min(31, Math.floor(num(currentDay))));
        let expanded = false;
        let repeat = true;
        let remind = false;
        const sheet = document.createElement('section');
        sheet.className = 'edp-date-popup';
        const [year, month] = monthParts();
        const maxDay = new Date(year, month, 0).getDate();
        const renderDays = () => {
          const first = new Date(year, month - 1, 1).getDay();
          const cells = [];
          for (let i = 0; i < first; i++) cells.push('<span class="edp-day blank"></span>');
          for (let day = 1; day <= maxDay; day++) cells.push(`<button type="button" class="edp-day ${day === selectedDay ? 'selected' : ''}" data-day="${day}">${day}</button>`);
          return cells.join('');
        };
        const paint = () => {
          sheet.innerHTML = `<div class="edp-date-top">${title}<button type="button" class="edp-date-close" aria-label="Close date picker">×</button></div><article class="edp-date-card"><button type="button" class="edp-date-row ${expanded ? 'open' : ''}" data-date-toggle><span>Date</span><span class="edp-date-value">${selectedDay ? dueSuffix(selectedDay) : 'Select Date'} ${expanded ? '⌃' : '⌄'}</span></button>${expanded ? `<div class="edp-calendar"><h3 class="edp-cal-title">${monthLabel()}</h3><div class="edp-week"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div><div class="edp-days">${renderDays()}</div></div>` : ''}<div class="edp-switch-row"><strong>Repeat Monthly</strong><button type="button" class="edp-switch ${repeat ? 'on' : ''}" data-repeat aria-label="Repeat monthly"></button></div><div class="edp-switch-row"><span><strong>Remind Me</strong><small>We'll notify you three days before it's due.</small></span><button type="button" class="edp-switch ${remind ? 'on' : ''}" data-remind aria-label="Remind me"></button></div></article><button type="button" class="edp-date-save" ${selectedDay ? '' : 'disabled'}>Save</button>`;
        };
        sheet.addEventListener('click', event => {
          if (event.target.closest('.edp-date-close')) return sheet.remove();
          if (event.target.closest('[data-date-toggle]')) { expanded = !expanded; paint(); return; }
          if (event.target.closest('[data-repeat]')) { repeat = !repeat; paint(); return; }
          if (event.target.closest('[data-remind]')) { remind = !remind; paint(); return; }
          const dayButton = event.target.closest('[data-day]');
          if (dayButton) { selectedDay = Math.max(1, Math.min(maxDay, Math.floor(num(dayButton.dataset.day)))); paint(); return; }
          if (event.target.closest('.edp-date-save') && selectedDay) { onSave(selectedDay); sheet.remove(); }
        });
        paint();
        document.body.appendChild(sheet);
      }
      function openPopup(kind, id = '', category = '') {
        const { state, budget } = ensureBudget(load());
        const isIncome = kind === 'income';
        const items = isIncome ? (budget.incomeItems || []) : budget.bills;
        const item = items.find(entry => entry.id === id) || { id:'', name:'', amount:'', type:'paycheck', category: category || 'housing', payDay:'', dueDay:'', note:'' };
        const typeOptions = (isIncome ? incomeTypes : categories).map(([key,label]) => `<option value="${key}" ${(isIncome ? item.type : item.category) === key ? 'selected' : ''}>${label}</option>`).join('');
        const dateField = isIncome ? `<label class="edp-field edp-due-select"><span>Pay date</span><button type="button" id="edp-due-button" data-edp-due-open data-date-title="Pay Date">${item.payDay ? fullDueLabel(item.payDay) : 'Select Date'}</button><input id="edp-due" type="hidden" value="${num(item.payDay) || ''}"></label>` : `<label class="edp-field edp-due-select"><span>Due date</span><button type="button" id="edp-due-button" data-edp-due-open data-date-title="Due Date">${item.dueDay ? fullDueLabel(item.dueDay) : 'Select Date'}</button><input id="edp-due" type="hidden" value="${num(item.dueDay) || ''}"></label>`;
        const backdrop = document.createElement('button');
        backdrop.type = 'button'; backdrop.className = 'edp-backdrop'; backdrop.setAttribute('aria-label','Close editor');
        const popup = document.createElement('section');
        popup.className = 'edp-popup';
        popup.innerHTML = `<h3 class="edp-title">${id ? 'Edit' : 'Add'} ${isIncome ? 'income' : 'item'}</h3><label class="edp-field"><span>Name</span><input id="edp-name" value="${esc(item.name)}" placeholder="${isIncome ? 'Paycheck' : 'Rent'}"></label><label class="edp-field"><span>${isIncome ? 'Income type' : 'Category'}</span><select id="edp-type">${typeOptions}</select></label><label class="edp-field"><span>Amount</span><input id="edp-amount" type="number" min="0" step="0.01" inputmode="decimal" value="${num(item.amount) || ''}" placeholder="0.00"></label>${dateField}<label class="edp-note"><span>Notes</span><textarea id="edp-note" placeholder="Optional note">${esc(item.note || '')}</textarea></label><div class="edp-actions"><button type="button" class="btn" data-edp-save>Save</button><button type="button" class="btn secondary" data-edp-close>Cancel</button>${id ? '<button type="button" class="btn danger" data-edp-delete>Delete</button>' : ''}</div>`;
        const close = () => { backdrop.remove(); popup.remove(); };
        backdrop.addEventListener('click', close); popup.querySelector('[data-edp-close]').addEventListener('click', close);
        popup.querySelector('[data-edp-due-open]')?.addEventListener('click', event => openDueDatePicker(document.getElementById('edp-due')?.value, day => { document.getElementById('edp-due').value = day; document.getElementById('edp-due-button').textContent = fullDueLabel(day); }, event.currentTarget.dataset.dateTitle || 'Due Date'));
        popup.querySelector('[data-edp-save]').addEventListener('click', () => {
          const name = document.getElementById('edp-name').value.trim(); const amount = Math.max(0,num(document.getElementById('edp-amount').value));
          if (!name || amount <= .004) return;
          const selectedDay = Math.max(0,Math.min(31,Math.floor(num(document.getElementById('edp-due').value))));
          const next = { id: id || uid(), name, amount, note: document.getElementById('edp-note').value.trim() };
          if (isIncome) { next.type = document.getElementById('edp-type').value; next.payDay = selectedDay; budget.incomeItems = cleanIncomeItems([...(budget.incomeItems || []).filter(entry => entry.id !== next.id), next]); }
          else { next.category = document.getElementById('edp-type').value; next.dueDay = selectedDay; budget.bills = cleanBills([...(budget.bills || []).filter(entry => entry.id !== next.id), next]); }
          syncTotals(state,budget); saveState(state); location.reload();
        });
        popup.querySelector('[data-edp-delete]')?.addEventListener('click', () => { if (isIncome) budget.incomeItems = cleanIncomeItems((budget.incomeItems || []).filter(entry => entry.id !== id)); else budget.bills = cleanBills(budget.bills).filter(entry => entry.id !== id); syncTotals(state,budget); saveState(state); location.reload(); });
        document.body.append(backdrop,popup);
      }
      function patchLegacyDueInputs() {
        document.querySelectorAll('#edit-bill-due,#new-bill-due').forEach(input => {
          if (input.dataset.edpDuePatched === '1') return;
          input.dataset.edpDuePatched = '1';
          input.type = 'hidden';
          const label = input.closest('label');
          label?.querySelector('span')?.replaceChildren(document.createTextNode('Due date'));
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'legacy-due-button';
          button.textContent = fullDueLabel(input.value);
          button.addEventListener('click', event => {
            event.preventDefault();
            event.stopPropagation();
            openDueDatePicker(input.value, day => {
              input.value = day;
              button.textContent = fullDueLabel(day);
              input.dispatchEvent(new Event('input', { bubbles:true }));
              input.dispatchEvent(new Event('change', { bubbles:true }));
            });
          });
          input.insertAdjacentElement('afterend', button);
        });
      }
      document.addEventListener('click', event => {
        const button = event.target.closest('[data-edp-act]');
        if (!button) return;
        event.preventDefault(); event.stopPropagation();
        openPopup(button.dataset.kind, button.dataset.id || '', button.dataset.category || '');
      }, true);
      const refresh = () => { renderEnhancements(); patchLegacyDueInputs(); };
      new MutationObserver(() => setTimeout(refresh, 0)).observe(document.body, { childList:true, subtree:true });
      window.addEventListener('load', () => setTimeout(refresh, 500));
      document.addEventListener('click', () => setTimeout(refresh, 0));
    })();
  </script>
  <script>
    (() => {
      "use strict";
      const formatMoney = new Intl.NumberFormat("en-US", { style:"currency", currency:"USD" });
      const number = input => Number.isFinite(Number.parseFloat(String(input ?? "").replace(/[^0-9.-]/g, ""))) ? Number.parseFloat(String(input ?? "").replace(/[^0-9.-]/g, "")) : 0;
      const cents = input => Math.max(0, Math.round((number(input) + Number.EPSILON) * 100) / 100);
      const locks = new WeakSet();

      function amountInput(sheet) {
        return [...sheet.querySelectorAll(".dw-tx-field")].find(field => field.querySelector("span")?.textContent?.trim() === "Amount")?.querySelector("input") || null;
      }

      function transactionAmount(sheet) {
        const input = amountInput(sheet);
        return cents(input?.dataset.rawValue || input?.value);
      }

      function selectedItems(sheet) {
        try {
          const parsed = JSON.parse(sheet.dataset.budgetItems || "[]");
          return Array.isArray(parsed) ? parsed.map(item => ({ ...item, id:String(item.id || ""), name:String(item.name || "Budget item"), amount:cents(item.amount) })).filter(item => item.id) : [];
        } catch { return []; }
      }

      function allocationInputs(sheet) {
        const mainAmount = amountInput(sheet);
        return [...sheet.querySelectorAll("input")].filter(input => {
          if (input === mainAmount || input.type === "date" || input.type === "hidden" || input.type === "search") return false;
          const label = input.closest(".dw-tx-field")?.querySelector("span")?.textContent?.trim() || "";
          return !["Date","Amount","Merchant","Source","Check #"].includes(label);
        });
      }

      function inputForItem(sheet, item, index, used) {
        const inputs = allocationInputs(sheet);
        const named = inputs.find(input => {
          if (used.has(input)) return false;
          let node = input.parentElement;
          while (node && node !== sheet) {
            if ((node.textContent || "").includes(item.name)) return true;
            node = node.parentElement;
          }
          return false;
        });
        const input = named || inputs.find(candidate => !used.has(candidate)) || inputs[index];
        if (input) used.add(input);
        return input || null;
      }

      function setInputAmount(input, amount, automatic) {
        if (!input) return;
        const text = amount > .004 ? amount.toFixed(2) : "";
        input.value = text;
        input.dataset.rawValue = text;
        input.readOnly = automatic;
        input.dataset.dwAutoAllocation = automatic ? "true" : "false";
        input.setAttribute("aria-label", automatic ? "Transaction amount automatically assigned" : "Split amount");
      }

      function updateRemaining(sheet, total, items) {
        const assigned = cents(items.reduce((sum, item) => sum + cents(item.amount), 0));
        const remaining = cents(Math.max(0, total - assigned));
        [...sheet.querySelectorAll("*")].filter(node => node.children.length === 0 && /Left to Split/i.test(node.textContent || "")).forEach(node => {
          node.textContent = `${formatMoney.format(remaining)} Left to Split`;
        });
      }

      function enforceDone(sheet, total, items) {
        const done = sheet.querySelector(".dw-tx-done");
        if (!done) return;
        const assigned = cents(items.reduce((sum, item) => sum + cents(item.amount), 0));
        const allEntered = items.length === 1 ? items[0].amount > .004 : items.length > 1 && items.every(item => item.amount > .004);
        const ready = total > .004 && allEntered && Math.abs(total - assigned) <= .004;
        done.classList.toggle("dw-save-ready", ready);
        done.setAttribute("aria-disabled", ready ? "false" : "true");
        done.setAttribute("tabindex", ready ? "0" : "-1");
      }

      function readSplitInputs(sheet, items) {
        const used = new Set();
        return items.map((item, index) => {
          const input = inputForItem(sheet, item, index, used);
          return { ...item, amount:cents(input?.dataset.rawValue || input?.value || item.amount) };
        });
      }

      function syncAllocations(sheet = document.querySelector(".dw-tx-sheet"), fromInput = false) {
        if (!sheet || locks.has(sheet)) return;
        const total = transactionAmount(sheet);
        let items = selectedItems(sheet);
        const previousCount = Number(sheet.dataset.dwAllocationCount || 0);
        if (!items.length) {
          if (sheet.dataset.dwAllocationCount !== "0") sheet.dataset.dwAllocationCount = "0";
          enforceDone(sheet, total, items);
          return;
        }

        if (items.length === 1) {
          items[0].amount = total;
        } else if (previousCount <= 1 && !fromInput) {
          items = items.map(item => ({ ...item, amount:0 }));
        } else if (fromInput) {
          items = readSplitInputs(sheet, items);
        }

        locks.add(sheet);
        const countText = String(items.length);
        const serialized = JSON.stringify(items);
        if (sheet.dataset.dwAllocationCount !== countText) sheet.dataset.dwAllocationCount = countText;
        if (sheet.dataset.budgetItems !== serialized) sheet.dataset.budgetItems = serialized;
        const used = new Set();
        items.forEach((item, index) => setInputAmount(inputForItem(sheet, item, index, used), item.amount, items.length === 1));
        updateRemaining(sheet, total, items);
        enforceDone(sheet, total, items);
        queueMicrotask(() => locks.delete(sheet));
      }

      function scheduleSync(fromInput = false) {
        [0,40,100,180].forEach(delay => setTimeout(() => syncAllocations(document.querySelector(".dw-tx-sheet"), fromInput), delay));
      }

      document.addEventListener("input", event => {
        const sheet = event.target.closest?.(".dw-tx-sheet");
        if (!sheet) return;
        scheduleSync(event.target !== amountInput(sheet));
      }, true);
      document.addEventListener("change", event => {
        const sheet = event.target.closest?.(".dw-tx-sheet");
        if (sheet) scheduleSync(event.target !== amountInput(sheet));
      }, true);
      document.addEventListener("click", event => {
        if (event.target.closest?.("[data-dw-selector-done],[data-dw-remove-selected],[data-dw-budget-item],.dw-tx-budget-row,[data-edp-trans-add]")) scheduleSync(false);
      }, true);

      new MutationObserver(mutations => {
        if (mutations.some(mutation => mutation.type === "childList" || mutation.attributeName === "data-budget-items")) scheduleSync(false);
      }).observe(document.body, { childList:true, subtree:true, attributes:true, attributeFilter:["data-budget-items"] });

      window.addEventListener("load", () => scheduleSync(false));
    })();
  </script>
